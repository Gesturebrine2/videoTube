<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#0a0a0a">
    <title>Xplitleaks - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #ff0050;
            --secondary: #00f2ea;
            --dark: #0a0a0a;
            --darker: #050505;
            --card: #1a1a1a;
            --text: #ffffff;
            --text-muted: #888888;
            --border: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--darker);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* ==================== HEADER ==================== */
        .header {
            background: var(--dark);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .search-bar {
            flex: 1;
            max-width: 600px;
            display: flex;
            gap: 0.5rem;
        }

        .search-bar input {
            flex: 1;
            padding: 0.75rem 1rem;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 8px;
            font-size: 0.95rem;
        }

        .search-bar input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .search-bar button {
            padding: 0.75rem 1.5rem;
            background: var(--primary);
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .search-bar button:hover {
            background: var(--secondary);
        }

        .header-links {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .header-links a {
            padding: 0.5rem 1rem;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s;
        }

        .header-links a:hover {
            background: var(--primary);
            border-color: var(--primary);
        }

        /* ==================== CONTAINER ==================== */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* ==================== SHORTS SECTION ==================== */
        .shorts-section {
            margin: 2rem 0 3rem;
            position: relative;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .section-title i {
            color: var(--primary);
        }

        .view-all-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
        }

        .view-all-link:hover {
            color: var(--secondary);
        }

        .shorts-carousel-wrapper {
            position: relative;
        }

        .shorts-carousel {
            display: flex;
            gap: 1rem;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            padding-bottom: 1rem;
            -webkit-overflow-scrolling: touch;
        }

        .shorts-carousel::-webkit-scrollbar {
            height: 8px;
        }

        .shorts-carousel::-webkit-scrollbar-track {
            background: var(--dark);
            border-radius: 4px;
        }

        .shorts-carousel::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .shorts-carousel::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        .short-card {
            flex: 0 0 auto;
            width: 180px;
            scroll-snap-align: start;
            position: relative;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s;
            text-decoration: none;
            color: var(--text);
        }

        .short-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 5px 20px rgba(255, 0, 80, 0.3);
        }

        .short-thumbnail {
            width: 100%;
            height: 320px;
            object-fit: cover;
            background: var(--dark);
            position: relative;
        }

        .short-duration {
            position: absolute;
            bottom: 0.5rem;
            right: 0.5rem;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .short-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 1rem;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .short-card:hover .short-overlay {
            opacity: 1;
        }

        .short-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .short-meta {
            display: flex;
            gap: 0.75rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .short-meta span {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .short-meta i {
            color: var(--primary);
        }

        .play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: rgba(255, 0, 80, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            opacity: 0;
            transition: all 0.3s;
        }

        .short-card:hover .play-overlay {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.1);
        }

        .scroll-indicator {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            background: rgba(255, 0, 80, 0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 10;
            border: none;
            color: white;
        }

        .shorts-carousel-wrapper:hover .scroll-indicator {
            opacity: 1;
        }

        .scroll-indicator.left {
            left: 0;
        }

        .scroll-indicator.right {
            right: 0;
        }

        .scroll-indicator:hover {
            background: var(--primary);
        }

        /* ==================== VIDEOS SECTION ==================== */
        .videos-section {
            margin: 3rem 0;
        }

        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .video-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s;
            text-decoration: none;
            color: var(--text);
        }

        .video-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 5px 20px rgba(255, 0, 80, 0.2);
        }

        .video-card-thumbnail {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: var(--dark);
            position: relative;
        }

        .video-card-duration {
            position: absolute;
            bottom: 0.5rem;
            right: 0.5rem;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .video-card-info {
            padding: 1rem;
        }

        .video-card-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }

        .video-card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .video-card-meta span {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        /* ==================== CATEGORIES ==================== */
        .categories-section {
            margin: 2rem 0;
        }

        .categories-list {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .category-btn {
            padding: 0.5rem 1rem;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .category-btn:hover, .category-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        /* ==================== LOADING & ERROR STATES ==================== */
        .loading-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-state {
            text-align: center;
            padding: 4rem 2rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-muted);
        }

        .error-state i {
            font-size: 4rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .hidden {
            display: none !important;
        }

        /* ==================== RESPONSIVE ==================== */
        @media (max-width: 1024px) {
            .container {
                padding: 1rem;
            }

            .search-bar {
                order: 3;
                width: 100%;
                max-width: 100%;
            }
        }

        @media (max-width: 768px) {
            .header {
                padding: 1rem;
            }

            .short-card {
                width: 150px;
            }

            .short-thumbnail {
                height: 266px;
            }

            .videos-grid {
                grid-template-columns: 1fr;
            }

            .scroll-indicator {
                display: none !important;
            }

            .header-links {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- ==================== HEADER ==================== -->
    <header class="header">
        <div class="logo">Xplitleaks</div>
        
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search videos..." onkeypress="handleSearchKeypress(event)">
            <button onclick="searchVideos()">
                <i class="fas fa-search"></i> Search
            </button>
        </div>

        <div class="header-links">
            <!-- Admin Link Removed for Public Frontend -->
            <a href="shorts.html">
                <i class="fas fa-mobile-alt"></i> Shorts
            </a>
        </div>
    </header>

    <!-- ==================== MAIN CONTENT ==================== -->
    <div class="container">
        <!-- Categories Section -->
        <section class="categories-section">
            <div class="categories-list" id="categoriesList">
                <button class="category-btn active" onclick="filterByCategory('all')">All</button>
                <button class="category-btn" onclick="filterByCategory('amateur')">Amateur</button>
                <button class="category-btn" onclick="filterByCategory('teen')">Teen</button>
                <button class="category-btn" onclick="filterByCategory('mature')">Mature</button>
                <button class="category-btn" onclick="filterByCategory('interracial')">Interracial</button>
                <button class="category-btn" onclick="filterByCategory('anal')">Anal</button>
                <button class="category-btn" onclick="filterByCategory('lesbian')">Lesbian</button>
                <button class="category-btn" onclick="filterByCategory('homemade')">Homemade</button>
                <button class="category-btn" onclick="filterByCategory('bbc')">BBC</button>
            </div>
        </section>

        <!-- Shorts Section (FIRST) -->
        <section class="shorts-section">
            <div class="section-header">
                <h2 class="section-title">
                    <i class="fas fa-mobile-alt"></i>
                    Trending Shorts
                </h2>
                <a href="shorts.html" class="view-all-link">
                    View All <i class="fas fa-arrow-right"></i>
                </a>
            </div>

            <div class="shorts-carousel-wrapper">
                <button class="scroll-indicator left" onclick="scrollShorts('left')">
                    <i class="fas fa-chevron-left"></i>
                </button>

                <div class="shorts-carousel" id="shortsCarousel">
                    <div class="loading-state">
                        <div class="loading-spinner"></div>
                        <p>Loading shorts...</p>
                    </div>
                </div>

                <button class="scroll-indicator right" onclick="scrollShorts('right')">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </section>

        <!-- Videos Section -->
        <section class="videos-section">
            <div class="section-header">
                <h2 class="section-title">
                    <i class="fas fa-video"></i>
                    <span id="sectionTitleText">Latest Videos</span>
                </h2>
            </div>

            <div class="videos-grid" id="videosGrid">
                <div class="loading-state" style="grid-column: 1/-1;">
                    <div class="loading-spinner"></div>
                    <p>Loading videos...</p>
                </div>
            </div>
        </section>
    </div>

    <script>
        // ==================== CONFIGURATION ====================
        const CONFIG = {
            apiEndpoint: 'https://xplitleaks-api.dylancoral.workers.dev/api'
        };

        // ==================== STATE ====================
        let allVideos = [];
        let currentCategory = 'all';

        // ==================== INITIALIZATION ====================
        document.addEventListener('DOMContentLoaded', () => {
            loadShorts();
            loadVideos();
        });

        // ==================== LOAD SHORTS ====================
        async function loadShorts() {
            try {
                const response = await fetch(`${CONFIG.apiEndpoint}/shorts?limit=15`);
                const shorts = await response.json();

                const carousel = document.getElementById('shortsCarousel');

                if (shorts && shorts.length > 0) {
                    carousel.innerHTML = shorts.map(short => createShortCard(short)).join('');
                } else {
                    carousel.innerHTML = `
                        <div class="error-state" style="width: 100%;">
                            <i class="fas fa-video"></i>
                            <p>No shorts available yet</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Load shorts error:', error);
                document.getElementById('shortsCarousel').innerHTML = `
                    <div class="error-state" style="width: 100%;">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>Failed to load shorts</p>
                    </div>
                `;
            }
        }

        function createShortCard(short) {
            return `
                <a href="shorts.html?id=${short.numericId}" class="short-card">
                    <img src="${short.thumbnail || ''}" 
                         alt="${short.title}" 
                         class="short-thumbnail"
                         onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22180%22 height=%22320%22%3E%3Crect fill=%22%23333%22 width=%22180%22 height=%22320%22/%3E%3Ctext fill=%22%23888%22 x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22%3ENo%20Thumbnail%3C/text%3E%3C/svg%3E'">
                    
                    <span class="short-duration">${short.duration || '0:00'}</span>
                    
                    <div class="play-overlay">
                        <i class="fas fa-play"></i>
                    </div>
                    
                    <div class="short-overlay">
                        <div class="short-title">${short.title}</div>
                        <div class="short-meta">
                            <span><i class="fas fa-eye"></i> ${formatNumber(short.views || 0)}</span>
                            <span><i class="fas fa-heart"></i> ${formatNumber(short.likes || 0)}</span>
                        </div>
                    </div>
                </a>
            `;
        }

        function scrollShorts(direction) {
            const carousel = document.getElementById('shortsCarousel');
            const scrollAmount = direction === 'left' ? -400 : 400;
            carousel.scrollBy({ left: scrollAmount, behavior: 'smooth' });
        }

        // ==================== LOAD VIDEOS ====================
        async function loadVideos(category = 'all') {
            try {
                let url = `${CONFIG.apiEndpoint}/videos?limit=20`;
                
                if (category !== 'all') {
                    url += `&category=${category}`;
                }

                const response = await fetch(url);
                const videos = await response.json();

                allVideos = videos || [];
                const grid = document.getElementById('videosGrid');

                if (allVideos.length > 0) {
                    grid.innerHTML = allVideos.map(video => createVideoCard(video)).join('');
                } else {
                    grid.innerHTML = `
                        <div class="error-state" style="grid-column: 1/-1;">
                            <i class="fas fa-video"></i>
                            <p>No videos found</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Load videos error:', error);
                document.getElementById('videosGrid').innerHTML = `
                    <div class="error-state" style="grid-column: 1/-1;">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>Failed to load videos</p>
                    </div>
                `;
            }
        }

        function createVideoCard(video) {
            return `
                <a href="video.html?id=${video.numericId || video.id}" class="video-card">
                    <img src="${video.thumbnail || ''}" 
                         alt="${video.title}" 
                         class="video-card-thumbnail"
                         onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22280%22 height=%22180%22%3E%3Crect fill=%22%23333%22 width=%22280%22 height=%22180%22/%3E%3Ctext fill=%22%23888%22 x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22%3ENo%20Thumbnail%3C/text%3E%3C/svg%3E'">
                    
                    <span class="video-card-duration">${video.duration || '0:00'}</span>
                    
                    <div class="video-card-info">
                        <h3 class="video-card-title">${video.title}</h3>
                        <div class="video-card-meta">
                            <span><i class="fas fa-eye"></i> ${formatNumber(video.views || 0)}</span>
                            <span><i class="fas fa-clock"></i> ${video.uploadDate || 'N/A'}</span>
                        </div>
                    </div>
                </a>
            `;
        }

        // ==================== CATEGORY FILTER ====================
        function filterByCategory(category) {
            currentCategory = category;
            
            // Update active button
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Update title
            const titleText = category === 'all' ? 'Latest Videos' : 
                            category.charAt(0).toUpperCase() + category.slice(1) + ' Videos';
            document.getElementById('sectionTitleText').textContent = titleText;

            // Load videos
            loadVideos(category);
        }

        // ==================== SEARCH ====================
        function handleSearchKeypress(event) {
            if (event.key === 'Enter') {
                searchVideos();
            }
        }

        async function searchVideos() {
            const query = document.getElementById('searchInput').value.trim();
            
            if (!query) {
                loadVideos(currentCategory);
                return;
            }

            try {
                const response = await fetch(`${CONFIG.apiEndpoint}/videos?search=${encodeURIComponent(query)}&limit=20`);
                const videos = await response.json();

                const grid = document.getElementById('videosGrid');

                if (videos && videos.length > 0) {
                    grid.innerHTML = videos.map(video => createVideoCard(video)).join('');
                    document.getElementById('sectionTitleText').textContent = `Search Results for "${query}"`;
                } else {
                    grid.innerHTML = `
                        <div class="error-state" style="grid-column: 1/-1;">
                            <i class="fas fa-search"></i>
                            <p>No videos found matching "${query}"</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Search error:', error);
                alert('Search failed. Please try again.');
            }
        }

        // ==================== UTILITY ====================
        function formatNumber(num) {
            if (num >= 1000000) {
                return (num / 1000000).toFixed(1) + 'M';
            } else if (num >= 1000) {
                return (num / 1000).toFixed(1) + 'K';
            }
            return num.toString();
        }
    </script>
</body>
</html>
