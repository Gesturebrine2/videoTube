<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#0a0a0a">
    <title>Xplitleaks - Home</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#ff0050',
                        secondary: '#00f2ea',
                        dark: '#0a0a0a',
                        darker: '#050505',
                        card: '#1a1a1a',
                        border: '#333333',
                        muted: '#888888'
                    }
                }
            }
        }
    </script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #ff0050;
        }
        
        * {
            transition-property: background-color, border-color, color, fill, stroke;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            transition-duration: 150ms;
        }
        
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        @keyframes gradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .animate-gradient {
            background-size: 200% 200%;
            animation: gradient 3s ease infinite;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-slide-down {
            animation: slideDown 0.3s ease-out;
        }
    </style>
</head>
<body class="bg-darker text-white font-sans antialiased min-h-screen">

    <!-- ==================== HEADER ==================== -->
    <header class="bg-dark border-b border-border sticky top-0 z-50">
        <div class="px-4 py-3 flex justify-between items-center">
            <!-- Left: Menu & Logo -->
            <div class="flex items-center gap-3">
                <!-- Mobile Menu Button -->
                <button onclick="toggleMenu()" class="lg:hidden p-2 hover:bg-card rounded-lg transition-colors">
                    <i class="fas fa-bars text-xl"></i>
                </button>
                
                <!-- Logo -->
                <h1 class="text-xl md:text-2xl font-bold bg-gradient-to-r from-primary via-purple-500 to-secondary bg-clip-text text-transparent animate-gradient">
                    Xplitleaks
                </h1>
            </div>
            
            <!-- Right: Search & Shorts -->
            <div class="flex items-center gap-2">
                <!-- Search Toggle (Mobile) -->
                <button onclick="toggleSearch()" class="lg:hidden p-2 hover:bg-card rounded-lg transition-colors">
                    <i class="fas fa-search text-lg"></i>
                </button>
                
                <!-- Shorts Button -->
                <a href="shorts.html" class="inline-flex items-center gap-2 px-3 md:px-4 py-2 bg-card border border-border rounded-lg text-xs md:text-sm font-medium hover:bg-primary hover:border-primary transition-all">
                    <i class="fas fa-mobile-alt"></i>
                    <span class="hidden sm:inline">Shorts</span>
                </a>
            </div>
        </div>
        
        <!-- Mobile Search & Categories Dropdown -->
        <div id="mobileSearchDropdown" class="hidden lg:hidden border-t border-border bg-dark px-4 py-3 animate-slide-down">
            <!-- Search Bar -->
            <div class="flex gap-2 mb-3">
                <div class="relative flex-1">
                    <input 
                        type="text" 
                        id="searchInput" 
                        placeholder="Search videos..." 
                        class="w-full px-4 py-2.5 bg-card border border-border rounded-lg text-sm text-white placeholder-muted focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20"
                    >
                </div>
                <button 
                    onclick="handleSearch()" 
                    class="px-4 py-2.5 bg-primary border border-primary rounded-lg text-sm font-semibold hover:bg-primary/90 transition-all"
                >
                    <i class="fas fa-search"></i>
                </button>
            </div>
            
            <!-- Category Tags -->
            <div class="flex flex-wrap gap-2">
                <button onclick="filterCategory('all')" class="category-btn active px-3 py-1.5 bg-primary border border-primary rounded-full text-xs font-medium transition-all">
                    All
                </button>
                <button onclick="filterCategory('amateur')" class="category-btn px-3 py-1.5 bg-card border border-border rounded-full text-xs font-medium text-muted hover:border-primary hover:text-primary transition-all">
                    Amateur
                </button>
                <button onclick="filterCategory('teen')" class="category-btn px-3 py-1.5 bg-card border border-border rounded-full text-xs font-medium text-muted hover:border-primary hover:text-primary transition-all">
                    Teen
                </button>
                <button onclick="filterCategory('mature')" class="category-btn px-3 py-1.5 bg-card border border-border rounded-full text-xs font-medium text-muted hover:border-primary hover:text-primary transition-all">
                    Mature
                </button>
                <button onclick="filterCategory('interracial')" class="category-btn px-3 py-1.5 bg-card border border-border rounded-full text-xs font-medium text-muted hover:border-primary hover:text-primary transition-all">
                    Interracial
                </button>
                <button onclick="filterCategory('anal')" class="category-btn px-3 py-1.5 bg-card border border-border rounded-full text-xs font-medium text-muted hover:border-primary hover:text-primary transition-all">
                    Anal
                </button>
                <button onclick="filterCategory('lesbian')" class="category-btn px-3 py-1.5 bg-card border border-border rounded-full text-xs font-medium text-muted hover:border-primary hover:text-primary transition-all">
                    Lesbian
                </button>
                <button onclick="filterCategory('homemade')" class="category-btn px-3 py-1.5 bg-card border border-border rounded-full text-xs font-medium text-muted hover:border-primary hover:text-primary transition-all">
                    Homemade
                </button>
                <button onclick="filterCategory('bbc')" class="category-btn px-3 py-1.5 bg-card border border-border rounded-full text-xs font-medium text-muted hover:border-primary hover:text-primary transition-all">
                    BBC
                </button>
            </div>
        </div>
    </header>

    <!-- ==================== SIDEBAR MENU (Mobile) ==================== -->
    <div id="sidebarMenu" class="fixed inset-0 z-[60] hidden">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="toggleMenu()"></div>
        
        <!-- Sidebar -->
        <div class="absolute left-0 top-0 h-full w-64 bg-card border-r border-border transform -translate-x-full transition-transform duration-300" id="sidebarContent">
            <div class="p-4 border-b border-border flex justify-between items-center">
                <h2 class="text-lg font-bold">Menu</h2>
                <button onclick="toggleMenu()" class="p-2 hover:bg-dark rounded-lg">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <nav class="p-4 space-y-2">
                <a href="index.html" class="flex items-center gap-3 px-4 py-3 bg-primary/10 border border-primary rounded-lg text-primary font-medium">
                    <i class="fas fa-home"></i>
                    <span>Home</span>
                </a>
                <a href="shorts.html" class="flex items-center gap-3 px-4 py-3 hover:bg-dark rounded-lg transition-colors">
                    <i class="fas fa-mobile-alt"></i>
                    <span>Shorts</span>
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 hover:bg-dark rounded-lg transition-colors">
                    <i class="fas fa-fire"></i>
                    <span>Trending</span>
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 hover:bg-dark rounded-lg transition-colors">
                    <i class="fas fa-clock"></i>
                    <span>Latest</span>
                </a>
            </nav>
            
            <div class="p-4 border-t border-border">
                <h3 class="text-sm font-semibold text-muted mb-3">Categories</h3>
                <div class="space-y-2">
                    <button onclick="filterCategory('all'); toggleMenu()" class="w-full text-left px-4 py-2 hover:bg-dark rounded-lg transition-colors text-sm">
                        All Videos
                    </button>
                    <button onclick="filterCategory('amateur'); toggleMenu()" class="w-full text-left px-4 py-2 hover:bg-dark rounded-lg transition-colors text-sm">
                        Amateur
                    </button>
                    <button onclick="filterCategory('teen'); toggleMenu()" class="w-full text-left px-4 py-2 hover:bg-dark rounded-lg transition-colors text-sm">
                        Teen
                    </button>
                    <button onclick="filterCategory('mature'); toggleMenu()" class="w-full text-left px-4 py-2 hover:bg-dark rounded-lg transition-colors text-sm">
                        Mature
                    </button>
                    <button onclick="filterCategory('interracial'); toggleMenu()" class="w-full text-left px-4 py-2 hover:bg-dark rounded-lg transition-colors text-sm">
                        Interracial
                    </button>
                    <button onclick="filterCategory('anal'); toggleMenu()" class="w-full text-left px-4 py-2 hover:bg-dark rounded-lg transition-colors text-sm">
                        Anal
                    </button>
                    <button onclick="filterCategory('lesbian'); toggleMenu()" class="w-full text-left px-4 py-2 hover:bg-dark rounded-lg transition-colors text-sm">
                        Lesbian
                    </button>
                    <button onclick="filterCategory('homemade'); toggleMenu()" class="w-full text-left px-4 py-2 hover:bg-dark rounded-lg transition-colors text-sm">
                        Homemade
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== MAIN CONTENT ==================== -->
    <main class="max-w-7xl mx-auto px-4 py-6 space-y-8">
        
        <!-- Desktop Search & Categories (Hidden on Mobile) -->
        <section class="hidden lg:block space-y-4">
            <!-- Search Bar -->
            <div class="flex gap-3">
                <div class="relative flex-1">
                    <input 
                        type="text" 
                        id="searchInputDesktop" 
                        placeholder="Search videos..." 
                        class="w-full px-4 py-3 bg-card border border-border rounded-lg text-white placeholder-muted focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all"
                    >
                    <i class="fas fa-search absolute right-4 top-1/2 -translate-y-1/2 text-muted"></i>
                </div>
                <button 
                    onclick="handleSearchDesktop()" 
                    class="px-6 py-3 bg-primary border border-primary rounded-lg font-semibold hover:bg-primary/90 hover:scale-105 transition-all flex items-center gap-2"
                >
                    <i class="fas fa-search"></i>
                    <span>Search</span>
                </button>
            </div>
            
            <!-- Category Filters -->
            <div class="flex flex-wrap gap-2">
                <button onclick="filterCategory('all')" class="category-btn-desktop active px-4 py-2 bg-primary border border-primary rounded-full text-sm font-medium transition-all hover:scale-105">
                    All
                </button>
                <button onclick="filterCategory('amateur')" class="category-btn-desktop px-4 py-2 bg-card border border-border rounded-full text-sm font-medium text-muted hover:border-primary hover:text-primary transition-all">
                    Amateur
                </button>
                <button onclick="filterCategory('teen')" class="category-btn-desktop px-4 py-2 bg-card border border-border rounded-full text-sm font-medium text-muted hover:border-primary hover:text-primary transition-all">
                    Teen
                </button>
                <button onclick="filterCategory('mature')" class="category-btn-desktop px-4 py-2 bg-card border border-border rounded-full text-sm font-medium text-muted hover:border-primary hover:text-primary transition-all">
                    Mature
                </button>
                <button onclick="filterCategory('interracial')" class="category-btn-desktop px-4 py-2 bg-card border border-border rounded-full text-sm font-medium text-muted hover:border-primary hover:text-primary transition-all">
                    Interracial
                </button>
                <button onclick="filterCategory('anal')" class="category-btn-desktop px-4 py-2 bg-card border border-border rounded-full text-sm font-medium text-muted hover:border-primary hover:text-primary transition-all">
                    Anal
                </button>
                <button onclick="filterCategory('lesbian')" class="category-btn-desktop px-4 py-2 bg-card border border-border rounded-full text-sm font-medium text-muted hover:border-primary hover:text-primary transition-all">
                    Lesbian
                </button>
                <button onclick="filterCategory('homemade')" class="category-btn-desktop px-4 py-2 bg-card border border-border rounded-full text-sm font-medium text-muted hover:border-primary hover:text-primary transition-all">
                    Homemade
                </button>
                <button onclick="filterCategory('bbc')" class="category-btn-desktop px-4 py-2 bg-card border border-border rounded-full text-sm font-medium text-muted hover:border-primary hover:text-primary transition-all">
                    BBC
                </button>
            </div>
        </section>

        <!-- ==================== TRENDING SHORTS ==================== -->
        <section class="space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-xl md:text-2xl font-bold flex items-center gap-2">
                    <i class="fas fa-mobile-alt text-primary"></i>
                    Trending Shorts
                </h2>
                <a href="shorts.html" class="text-primary hover:text-secondary font-medium flex items-center gap-1 text-sm md:text-base transition-colors">
                    View All
                    <i class="fas fa-arrow-right"></i>
                </a>
            </div>
            
            <!-- Shorts Grid -->
            <div id="trendingShorts" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
                <!-- Loading State -->
                <div class="col-span-full flex justify-center py-12">
                    <div class="flex flex-col items-center gap-3 text-muted">
                        <div class="w-12 h-12 border-4 border-white/10 border-t-primary rounded-full animate-spin"></div>
                        <p>Loading shorts...</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- ==================== LATEST VIDEOS ==================== -->
        <section class="space-y-4">
            <h2 class="text-xl md:text-2xl font-bold flex items-center gap-2">
                <i class="fas fa-video text-primary"></i>
                Latest Videos
            </h2>
            
            <!-- Videos Grid -->
            <div id="latestVideos" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6">
                <!-- Loading State -->
                <div class="col-span-full flex justify-center py-12">
                    <div class="flex flex-col items-center gap-3 text-muted">
                        <div class="w-12 h-12 border-4 border-white/10 border-t-primary rounded-full animate-spin"></div>
                        <p>Loading videos...</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- ==================== TOAST NOTIFICATIONS ==================== -->
    <div id="toastContainer" class="fixed top-24 right-5 z-[9999] flex flex-col gap-3"></div>

    <script>
        // ==================== CONFIGURATION ====================
        const CONFIG = {
            apiEndpoint: 'https://xplitleaks-api.dylancoral.workers.dev/api',
            sessionId: localStorage.getItem('sessionId') || generateSessionId()
        };
        localStorage.setItem('sessionId', CONFIG.sessionId);

        let currentCategory = 'all';

        // ==================== INITIALIZATION ====================
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🚀 Page loaded, initializing...');
            loadTrendingShorts();
            loadLatestVideos();
            
            // Search on Enter key
            document.getElementById('searchInput')?.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleSearch();
            });
            document.getElementById('searchInputDesktop')?.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleSearchDesktop();
            });
        });

        function generateSessionId() {
            return 'sess_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
        }

        // ==================== MOBILE MENU ====================
        function toggleMenu() {
            const menu = document.getElementById('sidebarMenu');
            const content = document.getElementById('sidebarContent');
            
            if (menu.classList.contains('hidden')) {
                menu.classList.remove('hidden');
                setTimeout(() => {
                    content.classList.remove('-translate-x-full');
                }, 10);
            } else {
                content.classList.add('-translate-x-full');
                setTimeout(() => {
                    menu.classList.add('hidden');
                }, 300);
            }
        }

        // ==================== MOBILE SEARCH ====================
        function toggleSearch() {
            const dropdown = document.getElementById('mobileSearchDropdown');
            dropdown.classList.toggle('hidden');
        }

        // ==================== SEARCH ====================
        function handleSearch() {
            const query = document.getElementById('searchInput').value.trim();
            if (query) {
                window.location.href = `index.html?search=${encodeURIComponent(query)}`;
            }
        }

        function handleSearchDesktop() {
            const query = document.getElementById('searchInputDesktop').value.trim();
            if (query) {
                window.location.href = `index.html?search=${encodeURIComponent(query)}`;
            }
        }

        // ==================== CATEGORY FILTER ====================
        function filterCategory(category) {
            currentCategory = category;
            
            // Update mobile buttons
            document.querySelectorAll('#mobileSearchDropdown .category-btn').forEach(btn => {
                btn.classList.remove('bg-primary', 'border-primary', 'text-white');
                btn.classList.add('bg-card', 'border-border', 'text-muted');
            });
            
            // Update desktop buttons
            document.querySelectorAll('.category-btn-desktop').forEach(btn => {
                btn.classList.remove('bg-primary', 'border-primary', 'text-white');
                btn.classList.add('bg-card', 'border-border', 'text-muted');
            });
            
            // Highlight active button
            const mobileBtn = Array.from(document.querySelectorAll('#mobileSearchDropdown .category-btn'))
                .find(btn => btn.textContent.toLowerCase().includes(category) || (category === 'all' && btn.textContent === 'All'));
            const desktopBtn = Array.from(document.querySelectorAll('.category-btn-desktop'))
                .find(btn => btn.textContent.toLowerCase().includes(category) || (category === 'all' && btn.textContent === 'All'));
            
            if (mobileBtn) {
                mobileBtn.classList.remove('bg-card', 'border-border', 'text-muted');
                mobileBtn.classList.add('bg-primary', 'border-primary', 'text-white');
            }
            if (desktopBtn) {
                desktopBtn.classList.remove('bg-card', 'border-border', 'text-muted');
                desktopBtn.classList.add('bg-primary', 'border-primary', 'text-white');
            }
            
            // Reload content
            if (category === 'all') {
                loadLatestVideos();
            } else {
                loadVideosByCategory(category);
            }
        }

        // ==================== LOAD TRENDING SHORTS ====================
        async function loadTrendingShorts() {
            const container = document.getElementById('trendingShorts');
            
            try {
                const response = await fetch(`${CONFIG.apiEndpoint}/shorts?limit=10`);
                const shorts = await response.json();
                
                if (shorts && shorts.length > 0) {
                    container.innerHTML = shorts.map(short => createShortCard(short)).join('');
                } else {
                    container.innerHTML = `
                        <div class="col-span-full text-center py-12 text-muted">
                            <i class="fas fa-video text-4xl mb-3"></i>
                            <p>No shorts available</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Load shorts error:', error);
                container.innerHTML = `
                    <div class="col-span-full text-center py-12 text-muted">
                        <i class="fas fa-exclamation-triangle text-4xl mb-3"></i>
                        <p>Failed to load shorts</p>
                    </div>
                `;
            }
        }

        // ==================== LOAD LATEST VIDEOS ====================
        async function loadLatestVideos() {
            const container = document.getElementById('latestVideos');
            
            try {
                const response = await fetch(`${CONFIG.apiEndpoint}/videos?limit=12`);
                const videos = await response.json();
                
                if (videos && videos.length > 0) {
                    container.innerHTML = videos.map(video => createVideoCard(video)).join('');
                } else {
                    container.innerHTML = `
                        <div class="col-span-full text-center py-12 text-muted">
                            <i class="fas fa-video text-4xl mb-3"></i>
                            <p>No videos available</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Load videos error:', error);
                container.innerHTML = `
                    <div class="col-span-full text-center py-12 text-muted">
                        <i class="fas fa-exclamation-triangle text-4xl mb-3"></i>
                        <p>Failed to load videos</p>
                    </div>
                `;
            }
        }

        // ==================== LOAD VIDEOS BY CATEGORY ====================
        async function loadVideosByCategory(category) {
            const container = document.getElementById('latestVideos');
            
            try {
                const response = await fetch(`${CONFIG.apiEndpoint}/videos?limit=20`);
                let videos = await response.json();
                
                if (videos && videos.length > 0) {
                    videos = videos.filter(v => {
                        const tags = JSON.parse(v.tags || '[]');
                        return v.category?.toLowerCase() === category || tags.includes(category);
                    });
                    
                    if (videos.length > 0) {
                        container.innerHTML = videos.map(video => createVideoCard(video)).join('');
                    } else {
                        container.innerHTML = `
                            <div class="col-span-full text-center py-12 text-muted">
                                <i class="fas fa-video text-4xl mb-3"></i>
                                <p>No videos found in this category</p>
                            </div>
                        `;
                    }
                }
            } catch (error) {
                console.error('Load category videos error:', error);
                showToast('Failed to load videos', 'error');
            }
        }

        // ==================== CREATE SHORT CARD ====================
        function createShortCard(short) {
            return `
                <a href="shorts.html?id=${short.numericId}" class="group block bg-card border border-border rounded-xl overflow-hidden hover:border-primary hover:-translate-y-1 transition-all">
                    <div class="relative aspect-[9/16]">
                        <img src="${short.thumbnail || ''}" 
                            alt="${short.title}" 
                            class="w-full h-full object-cover"
                            onerror="this.onerror=null; this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxODAiIGhlaWdodD0iMzIwIj48cmVjdCBmaWxsPSIjMzMzIiB3aWR0aD0iMTgwIiBoZWlnaHQ9IjMyMCIvPjx0ZXh0IGZpbGw9IiM4ODgiIHg9IjUwJSIgeT0iNTAlIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBkeT0iLjNlbSI+Tm8gVGh1bWJuYWlsPC90ZXh0Pjwvc3ZnPg=='">
                        <span class="absolute bottom-2 right-2 bg-black/80 text-white px-2 py-1 rounded text-xs font-semibold">
                            ${short.duration || '0:00'}
                        </span>
                        <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-4">
                            <div class="text-sm font-semibold line-clamp-2">${short.title}</div>
                        </div>
                        <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                            <div class="w-12 h-12 bg-primary/90 rounded-full flex items-center justify-center text-xl">
                                <i class="fas fa-play ml-1"></i>
                            </div>
                        </div>
                    </div>
                </a>
            `;
        }

        // ==================== CREATE VIDEO CARD ====================
        function createVideoCard(video) {
            return `
                <a href="video.html?id=${video.numericId || video.id}" class="group block bg-card border border-border rounded-xl overflow-hidden hover:border-primary hover:-translate-y-1 transition-all">
                    <div class="relative aspect-video">
                        <img src="${video.thumbnail || ''}" 
                            alt="${video.title}" 
                            class="w-full h-full object-cover"
                            onerror="this.onerror=null; this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyODAiIGhlaWdodD0iMTgwIj48cmVjdCBmaWxsPSIjMzMzIiB3aWR0aD0iMjgwIiBoZWlnaHQ9IjE4MCIvPjx0ZXh0IGZpbGw9IiM4ODgiIHg9IjUwJSIgeT0iNTAlIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBkeT0iLjNlbSI+Tm8gVGh1bWJuYWlsPC90ZXh0Pjwvc3ZnPg=='">
                        <span class="absolute bottom-2 right-2 bg-black/80 text-white px-2 py-1 rounded text-xs font-semibold">
                            ${video.duration || '0:00'}
                        </span>
                    </div>
                    <div class="p-4">
                        <h3 class="font-semibold mb-2 line-clamp-2 group-hover:text-primary transition-colors">${video.title}</h3>
                        <div class="flex items-center gap-3 text-sm text-muted">
                            <span class="flex items-center gap-1">
                                <i class="fas fa-eye text-xs"></i>
                                ${formatNumber(video.views || 0)}
                            </span>
                            <span>•</span>
                            <span>${video.uploadDate || 'N/A'}</span>
                        </div>
                    </div>
                </a>
            `;
        }

        // ==================== TOAST NOTIFICATIONS ====================
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            
            const colors = {
                success: 'border-success',
                error: 'border-danger',
                info: 'border-primary'
            };
            
            const icons = {
                success: 'fa-check-circle text-success',
                error: 'fa-exclamation-circle text-danger',
                info: 'fa-info-circle text-primary'
            };
            
            toast.className = `bg-card border-l-4 ${colors[type]} border border-border rounded-lg shadow-lg p-4 flex items-center gap-3 min-w-[280px] animate-[slideInRight_0.3s_ease-out]`;
            
            toast.innerHTML = `
                <i class="fas ${icons[type]} text-xl"></i>
                <span class="flex-1 text-sm">${message}</span>
                <button onclick="this.parentElement.remove()" class="text-muted hover:text-white">
                    <i class="fas fa-times"></i>
                </button>
            `;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // ==================== UTILITIES ====================
        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideInRight {
                from { opacity: 0; transform: translateX(100%); }
                to { opacity: 1; transform: translateX(0); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
