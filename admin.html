<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Shorts - Xplitleaks</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #ff0050;
            --secondary: #00f2ea;
            --dark: #0a0a0a;
            --darker: #050505;
            --card: #1a1a1a;
            --text: #ffffff;
            --text-muted: #888888;
            --border: #333333;
            --success: #00d084;
            --warning: #ffab00;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--darker);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            overscroll-behavior: none;
        }

        /* ==================== SHORTS CONTAINER ==================== */
        .shorts-container {
            height: 100vh;
            width: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        .shorts-container::-webkit-scrollbar {
            display: none;
        }

        /* ==================== SHORT VIDEO CARD ==================== */
        .short-video {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            background: var(--dark);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-player {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: var(--darker);
        }

        /* ==================== OVERLAY UI ==================== */
        .video-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 2rem 1rem 1rem;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            pointer-events: none;
            z-index: 5;
        }

        .video-info {
            pointer-events: auto;
            margin-bottom: 1rem;
            max-width: 70%;
        }

        .video-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        .video-meta {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.9rem;
            color: var(--text-muted);
            flex-wrap: wrap;
        }

        .video-category {
            background: var(--primary);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: capitalize;
        }

        .video-tag {
            color: var(--secondary);
            font-weight: 500;
        }

        /* ==================== ACTION BUTTONS (RIGHT SIDE) ==================== */
        .action-buttons {
            position: absolute;
            right: 0.75rem;
            bottom: 100px;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            pointer-events: auto;
            z-index: 10;
            align-items: center;
        }

        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.35rem;
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .action-btn .icon-wrapper {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid transparent;
        }

        .action-btn:hover .icon-wrapper {
            background: rgba(255,255,255,0.25);
            transform: scale(1.1);
        }

        .action-btn:active .icon-wrapper {
            transform: scale(0.95);
        }

        /* Like Button Animations */
        .action-btn.liked .icon-wrapper {
            background: var(--primary);
            color: white;
            border-color: rgba(255,255,255,0.3);
            animation: likePulse 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes likePulse {
            0% { transform: scale(1); }
            30% { transform: scale(1.3); }
            50% { transform: scale(0.95); }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .action-btn.liked i {
            animation: heartBeat 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.2); }
            50% { transform: scale(0.9); }
            75% { transform: scale(1.1); }
        }

        /* Share Button Animation */
        .action-btn.shared .icon-wrapper {
            background: var(--success);
            animation: sharePop 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes sharePop {
            0% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.3) rotate(15deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        /* Count Animation */
        .action-btn .count {
            font-size: 0.8rem;
            font-weight: 600;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
            transition: all 0.3s;
        }

        .action-btn .count.updated {
            animation: countPop 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--primary);
        }

        @keyframes countPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); color: var(--primary); }
            100% { transform: scale(1); }
        }

        /* Particle Effects */
        .particle {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            animation: particleFloat 1s ease-out forwards;
        }

        @keyframes particleFloat {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0);
            }
        }

        /* Heart Burst Effect */
        .heart-burst {
            position: absolute;
            font-size: 1.5rem;
            color: var(--primary);
            pointer-events: none;
            animation: heartBurst 0.8s ease-out forwards;
        }

        @keyframes heartBurst {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(0.5);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(1.5);
            }
        }

        /* ==================== TOP NAVIGATION ==================== */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            pointer-events: none;
        }

        .top-nav > * {
            pointer-events: auto;
        }

        .back-btn,
        .search-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .back-btn:hover,
        .search-btn:hover {
            background: var(--primary);
            transform: scale(1.1);
        }

        .back-btn:active,
        .search-btn:active {
            transform: scale(0.95);
        }

        /* ==================== LOADING STATES ==================== */
        .loading-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--darker);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--text-muted);
            font-size: 1rem;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .error-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--darker);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 2rem;
            text-align: center;
        }

        .error-container.active {
            display: flex;
        }

        .error-icon {
            font-size: 4rem;
            color: var(--danger);
            margin-bottom: 1rem;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .error-title {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .error-message {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .retry-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            color: white;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 0, 80, 0.4);
        }

        .retry-btn:active {
            transform: translateY(0);
        }

        /* ==================== PROGRESS BAR ==================== */
        .video-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: rgba(255,255,255,0.2);
            z-index: 20;
        }

        .video-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            width: 0%;
            transition: width 0.1s linear;
            box-shadow: 0 0 10px rgba(255, 0, 80, 0.5);
        }

        /* ==================== PLAY/PAUSE INDICATOR ==================== */
        .play-pause-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            color: white;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            z-index: 15;
        }

        .play-pause-indicator.visible {
            opacity: 1;
            animation: indicatorPulse 0.5s ease-out;
        }

        @keyframes indicatorPulse {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        /* ==================== SHARE MODAL ==================== */
        .share-modal {
            position: fixed;
            bottom: -100%;
            left: 0;
            right: 0;
            background: var(--card);
            border-radius: 20px 20px 0 0;
            padding: 1.5rem;
            z-index: 2000;
            transition: bottom 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 -5px 30px rgba(0,0,0,0.5);
        }

        .share-modal.active {
            bottom: 0;
        }

        .share-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .share-modal-title {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .share-modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
            padding: 0.5rem;
        }

        .share-modal-close:hover {
            color: var(--text);
            transform: rotate(90deg);
        }

        .share-options {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
        }

        .share-option {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            background: var(--dark);
            padding: 1.25rem 1rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
        }

        .share-option:hover {
            background: var(--primary);
            transform: translateY(-5px);
            border-color: rgba(255,255,255,0.2);
            box-shadow: 0 5px 20px rgba(255, 0, 80, 0.3);
        }

        .share-option:active {
            transform: translateY(-2px);
        }

        .share-option i {
            font-size: 1.5rem;
            transition: all 0.3s;
        }

        .share-option:hover i {
            transform: scale(1.1);
        }

        .share-option span {
            font-size: 0.8rem;
            font-weight: 500;
        }

        .share-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1999;
            display: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .share-overlay.active {
            display: block;
            opacity: 1;
        }

        /* ==================== TOAST NOTIFICATION ==================== */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--card);
            color: var(--text);
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 500;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            z-index: 3000;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--border);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success {
            border-color: var(--success);
            background: rgba(0, 208, 132, 0.15);
        }

        /* ==================== MOBILE OPTIMIZATIONS ==================== */
        @media (max-width: 768px) {
            .video-title {
                font-size: 1rem;
            }

            .action-btn .icon-wrapper {
                width: 48px;
                height: 48px;
                font-size: 1.3rem;
            }

            .action-btn .count {
                font-size: 0.75rem;
            }

            .share-options {
                grid-template-columns: repeat(4, 1fr);
                gap: 0.75rem;
            }

            .share-option {
                padding: 1rem 0.75rem;
            }
        }

        /* ==================== SKELETON LOADING ==================== */
        .skeleton {
            background: linear-gradient(90deg, var(--dark) 25%, var(--card) 50%, var(--dark) 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
            border-radius: 8px;
        }

        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ==================== DOUBLE TAP LIKE ==================== */
        .double-tap-heart {
            position: absolute;
            font-size: 6rem;
            color: var(--primary);
            pointer-events: none;
            opacity: 0;
            transform: translate(-50%, -50%) scale(0);
            z-index: 25;
        }

        .double-tap-heart.animate {
            animation: doubleTapLike 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes doubleTapLike {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0) rotate(-15deg);
            }
            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.2) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1) rotate(15deg);
            }
        }
    </style>
</head>
<body>
    <!-- ==================== LOADING SCREEN ==================== -->
    <div class="loading-container" id="loadingScreen">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading shorts...</div>
    </div>

    <!-- ==================== ERROR SCREEN ==================== -->
    <div class="error-container" id="errorScreen">
        <i class="fas fa-exclamation-triangle error-icon"></i>
        <div class="error-title">Failed to load shorts</div>
        <div class="error-message" id="errorMessage">Please check your connection and try again</div>
        <button class="retry-btn" onclick="loadShorts()">
            <i class="fas fa-redo"></i> Retry
        </button>
    </div>

    <!-- ==================== TOP NAVIGATION ==================== -->
    <nav class="top-nav">
        <button class="back-btn" onclick="goBack()" aria-label="Go back">
            <i class="fas fa-arrow-left"></i>
        </button>
        <button class="search-btn" onclick="openSearch()" aria-label="Search">
            <i class="fas fa-search"></i>
        </button>
    </nav>

    <!-- ==================== SHORTS CONTAINER ==================== -->
    <div class="shorts-container" id="shortsContainer">
        <!-- Shorts will be loaded here dynamically -->
    </div>

    <!-- ==================== SHARE MODAL ==================== -->
    <div class="share-overlay" id="shareOverlay" onclick="closeShareModal()"></div>
    <div class="share-modal" id="shareModal">
        <div class="share-modal-header">
            <div class="share-modal-title">Share this short</div>
            <button class="share-modal-close" onclick="closeShareModal()">&times;</button>
        </div>
        <div class="share-options">
            <div class="share-option" onclick="copyLink()">
                <i class="fas fa-link"></i>
                <span>Copy Link</span>
            </div>
            <div class="share-option" onclick="shareToWhatsApp()">
                <i class="fab fa-whatsapp"></i>
                <span>WhatsApp</span>
            </div>
            <div class="share-option" onclick="shareToTwitter()">
                <i class="fab fa-twitter"></i>
                <span>Twitter</span>
            </div>
            <div class="share-option" onclick="shareMore()">
                <i class="fas fa-share-alt"></i>
                <span>More</span>
            </div>
        </div>
    </div>

    <!-- ==================== TOAST NOTIFICATION ==================== -->
    <div class="toast" id="toast"></div>

    <script>
        // ==================== CONFIGURATION ====================
        const CONFIG = {
            apiEndpoint: 'https://xplitleaks-api.dylancoral.workers.dev/api',
            cdnHost: 'xplit-leaks-media.b-cdn.net',
            storagePath: 'Xplit_vids/shorts'
        };

        // ==================== STATE ====================
        let shorts = [];
        let currentIndex = 0;
        let isLoading = false;
        let currentShort = null;
        let sessionId = localStorage.getItem('sessionId') || generateSessionId();
        let viewQueue = [];
        let viewTrackTimer = null;
        let lastTapTime = 0;
        let lastTapIndex = -1;

        // Save session ID
        localStorage.setItem('sessionId', sessionId);

        // ==================== INITIALIZATION ====================
        document.addEventListener('DOMContentLoaded', () => {
            loadShorts();
            setupScrollListener();
            setupKeyboardShortcuts();
            setupPreventZoom();
        });

        function generateSessionId() {
            return 'sess_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
        }

        // ==================== LOAD SHORTS ====================
        async function loadShorts() {
            showLoading();
            hideError();

            try {
                // Fetch recommended shorts (uses our recommendation algorithm)
                const response = await fetch(`${CONFIG.apiEndpoint}/shorts/recommend?limit=20&sessionId=${sessionId}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                shorts = data;

                if (shorts.length === 0) {
                    showError('No shorts available yet');
                    return;
                }

                renderShorts();
                hideLoading();

                // Track view for first short (if meaningful)
                if (shorts[0]) {
                    // Don't track immediately, wait for watch time
                }

            } catch (error) {
                console.error('Load shorts error:', error);
                showError('Failed to load shorts: ' + error.message);
            }
        }

        // ==================== RENDER SHORTS ====================
        function renderShorts() {
            const container = document.getElementById('shortsContainer');
            container.innerHTML = '';

            shorts.forEach((short, index) => {
                const shortEl = createShortElement(short, index);
                container.appendChild(shortEl);
            });
        }

        function createShortElement(short, index) {
            const div = document.createElement('div');
            div.className = 'short-video';
            div.dataset.index = index;
            div.dataset.id = short.numericId;

            const tags = JSON.parse(short.tags || '[]');

            div.innerHTML = `
                <video 
                    class="video-player" 
                    src="${short.videoUrl}" 
                    poster="${short.thumbnail || ''}" 
                    loop 
                    playsinline 
                    preload="metadata"
                    data-index="${index}"
                    muted
                ></video>
                
                <div class="video-progress">
                    <div class="video-progress-bar" data-index="${index}"></div>
                </div>

                <i class="fas fa-play play-pause-indicator" data-index="${index}"></i>
                
                <div class="double-tap-heart" data-index="${index}">
                    <i class="fas fa-heart"></i>
                </div>

                <div class="action-buttons">
                    <button class="action-btn like-btn" data-index="${index}" onclick="handleLike(${index}, event)" aria-label="Like">
                        <div class="icon-wrapper">
                            <i class="${isLiked(short.numericId) ? 'fas' : 'far'} fa-heart"></i>
                        </div>
                        <span class="count" data-like-count="${short.likes || 0}">${formatNumber(short.likes || 0)}</span>
                    </button>

                    <button class="action-btn comment-btn" data-index="${index}" onclick="openComments(${index})" aria-label="Comment">
                        <div class="icon-wrapper">
                            <i class="fas fa-comment"></i>
                        </div>
                        <span class="count">${formatNumber(short.comments || 0)}</span>
                    </button>

                    <button class="action-btn share-btn" data-index="${index}" onclick="handleShare(${index}, event)" aria-label="Share">
                        <div class="icon-wrapper">
                            <i class="fas fa-share"></i>
                        </div>
                        <span class="count">${formatNumber(short.shares || 0)}</span>
                    </button>
                </div>

                <div class="video-overlay">
                    <div class="video-info">
                        <div class="video-title">${short.title}</div>
                        <div class="video-meta">
                            ${short.category ? `<span class="video-category">${short.category}</span>` : ''}
                            <span><i class="fas fa-clock"></i> ${short.duration || '0:00'}</span>
                            ${tags.length > 0 ? `<span class="video-tag">#${tags[0]}</span>` : ''}
                        </div>
                    </div>
                </div>
            `;

            // Setup video player
            const video = div.querySelector('video');
            setupVideoPlayer(video, index, short);

            // Setup double-tap to like
            div.addEventListener('click', (e) => handleDoubleTap(e, index, div));

            return div;
        }

        // ==================== VIDEO PLAYER ====================
        function setupVideoPlayer(video, index, short) {
            const shortEl = video.parentElement;
            let isPlaying = false;

            // Play when in view (Intersection Observer)
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        currentIndex = index;
                        currentShort = short;
                        
                        // Auto-play with sound on (user interaction required first)
                        video.play().then(() => {
                            isPlaying = true;
                            updatePlayPauseIcon(index, true);
                        }).catch(() => {
                            // Auto-play failed (no user interaction yet)
                            video.muted = true;
                            video.play().catch(() => {});
                        });
                        
                        // Start tracking view
                        startViewTracking(short.numericId, video);
                    } else {
                        video.pause();
                        isPlaying = false;
                        updatePlayPauseIcon(index, false);
                        // Reset video to start
                        video.currentTime = 0;
                    }
                });
            }, { threshold: 0.7 });

            observer.observe(shortEl);

            // Click to play/pause (not on buttons)
            shortEl.addEventListener('click', (e) => {
                // Don't trigger if clicking on action buttons or overlay
                if (e.target.closest('.action-buttons') || 
                    e.target.closest('.video-overlay') ||
                    e.target.closest('.top-nav')) {
                    return;
                }

                togglePlayPause(video, index);
            });

            // Update progress bar
            video.addEventListener('timeupdate', () => {
                const progressBar = document.querySelector(`.video-progress-bar[data-index="${index}"]`);
                if (progressBar && video.duration) {
                    const progress = (video.currentTime / video.duration) * 100;
                    progressBar.style.width = `${progress}%`;
                }
            });

            // Track completion
            video.addEventListener('ended', () => {
                queueViewTrack(short.numericId, 1, video.duration, true);
                updatePlayPauseIcon(index, false);
            });

            // Show controls on interaction
            let controlsTimeout;
            shortEl.addEventListener('mousemove', () => {
                shortEl.style.cursor = 'pointer';
                clearTimeout(controlsTimeout);
                controlsTimeout = setTimeout(() => {
                    shortEl.style.cursor = 'default';
                }, 2000);
            });
        }

        function togglePlayPause(video, index) {
            const shortEl = video.parentElement;
            const indicator = shortEl.querySelector('.play-pause-indicator');

            if (video.paused) {
                video.play();
                indicator.className = 'play-pause-indicator visible fas fa-play';
                queueViewTrack(currentShort?.numericId, video.currentTime / video.duration, video.currentTime);
            } else {
                video.pause();
                indicator.className = 'play-pause-indicator visible fas fa-pause';
            }

            setTimeout(() => {
                indicator.classList.remove('visible');
            }, 500);
        }

        function updatePlayPauseIcon(index, isPlaying) {
            const indicator = document.querySelector(`.play-pause-indicator[data-index="${index}"]`);
            if (indicator) {
                indicator.className = `play-pause-indicator fas ${isPlaying ? 'fa-play' : 'fa-pause'}`;
            }
        }

        // ==================== DOUBLE TAP TO LIKE ====================
        function handleDoubleTap(e, index, shortEl) {
            // Ignore if clicking on buttons
            if (e.target.closest('.action-buttons') || 
                e.target.closest('.video-overlay') ||
                e.target.closest('.top-nav')) {
                return;
            }

            const now = Date.now();
            const heartEl = shortEl.querySelector('.double-tap-heart');

            // Check if double tap (within 300ms)
            if (now - lastTapTime < 300 && index === lastTapIndex) {
                // Double tap detected!
                if (!isLiked(shorts[index].numericId)) {
                    handleLike(index, e);
                }

                // Show heart animation
                const rect = shortEl.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                heartEl.style.left = `${x}px`;
                heartEl.style.top = `${y}px`;
                heartEl.classList.add('animate');

                setTimeout(() => {
                    heartEl.classList.remove('animate');
                }, 800);

                lastTapTime = 0;
                lastTapIndex = -1;
            } else {
                lastTapTime = now;
                lastTapIndex = index;
            }
        }

        // ==================== LIKE HANDLER (REAL-TIME) ====================
        async function handleLike(index, event) {
            if (event) event.stopPropagation();
            
            const short = shorts[index];
            const btn = document.querySelector(`.like-btn[data-index="${index}"]`);
            const icon = btn.querySelector('i');
            const countEl = btn.querySelector('.count');

            if (!short.numericId) return;

            const wasLiked = isLiked(short.numericId);

            try {
                const response = await fetch(`${CONFIG.apiEndpoint}/short/like`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Session-Id': sessionId
                    },
                    body: JSON.stringify({ shortId: short.numericId })
                });

                if (response.ok) {
                    const data = await response.json();
                    
                    if (data.action === 'liked') {
                        // Update UI
                        btn.classList.add('liked');
                        icon.className = 'fas fa-heart';
                        short.likes = (short.likes || 0) + 1;
                        markAsLiked(short.numericId);
                        
                        // Create particle effects
                        createLikeParticles(btn);
                        createHeartBurst(btn);
                        
                        // Animate count
                        animateCount(countEl, short.likes);
                        
                        showToast('Liked! ❤️', 'success');
                    } else {
                        // Unlike
                        btn.classList.remove('liked');
                        icon.className = 'far fa-heart';
                        short.likes = Math.max((short.likes || 0) - 1, 0);
                        markAsUnliked(short.numericId);
                        
                        // Animate count
                        animateCount(countEl, short.likes);
                    }
                }
            } catch (error) {
                console.error('Like error:', error);
                // Revert UI on error
                if (wasLiked) {
                    btn.classList.add('liked');
                    icon.className = 'fas fa-heart';
                } else {
                    btn.classList.remove('liked');
                    icon.className = 'far fa-heart';
                }
            }
        }

        // ==================== SHARE HANDLER (REAL-TIME) ====================
        async function handleShare(index, event) {
            if (event) event.stopPropagation();
            
            const short = shorts[index];
            const btn = document.querySelector(`.share-btn[data-index="${index}"]`);
            const countEl = btn.querySelector('.count');

            if (!short.numericId) return;

            try {
                const response = await fetch(`${CONFIG.apiEndpoint}/short/share`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Session-Id': sessionId
                    },
                    body: JSON.stringify({ shortId: short.numericId })
                });

                if (response.ok) {
                    // Update UI
                    btn.classList.add('shared');
                    short.shares = (short.shares || 0) + 1;
                    
                    // Animate count
                    animateCount(countEl, short.shares);
                    
                    // Remove shared class after animation
                    setTimeout(() => {
                        btn.classList.remove('shared');
                    }, 500);
                    
                    // Open share modal
                    openShareModal(index);
                    
                    showToast('Share counted! ↗️', 'success');
                }
            } catch (error) {
                console.error('Share error:', error);
                // Still open modal even if tracking fails
                openShareModal(index);
            }
        }

        // ==================== HYBRID VIEW TRACKING ====================
        function startViewTracking(shortId, video) {
            const trackInterval = setInterval(() => {
                if (video.paused || video.ended) {
                    clearInterval(trackInterval);
                    return;
                }

                const watchDuration = video.currentTime / video.duration;
                const watchTime = video.currentTime;

                // Queue for batch tracking (hybrid method)
                // Only track if meaningful (>50% or >15s)
                if (watchDuration >= 0.5 || watchTime >= 15) {
                    queueViewTrack(shortId, watchDuration, watchTime);
                }
            }, 5000); // Check every 5 seconds

            // Clear on video end
            video.addEventListener('ended', () => clearInterval(trackInterval));
        }

        function queueViewTrack(shortId, watchDuration, watchTime, isComplete = false) {
            // Add to queue
            viewQueue.push({ 
                shortId, 
                watchDuration, 
                watchTime, 
                isComplete,
                timestamp: Date.now() 
            });
            
            // Send batch every 30 seconds
            if (!viewTrackTimer) {
                viewTrackTimer = setInterval(sendBatchViews, 30000);
            }
        }

        async function sendBatchViews() {
            if (viewQueue.length === 0) {
                clearInterval(viewTrackTimer);
                viewTrackTimer = null;
                return;
            }
            
            try {
                const views = [...viewQueue];
                viewQueue = [];
                
                await fetch(`${CONFIG.apiEndpoint}/short/view/batch`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Session-Id': sessionId
                    },
                    body: JSON.stringify({ views })
                });
            } catch (error) {
                console.error('Batch view error:', error);
                // Keep items in queue for retry on next interval
            }
        }

        // ==================== PARTICLE EFFECTS ====================
        function createLikeParticles(btn) {
            const rect = btn.getBoundingClientRect();
            const colors = ['#ff0050', '#00f2ea', '#ffffff', '#ffab00'];
            
            for (let i = 0; i < 8; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.width = `${Math.random() * 8 + 4}px`;
                particle.style.height = particle.style.width;
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                particle.style.left = `${rect.left + rect.width / 2}px`;
                particle.style.top = `${rect.top + rect.height / 2}px`;
                particle.style.setProperty('--tx', `${(Math.random() - 0.5) * 100}px`);
                particle.style.setProperty('--ty', `${(Math.random() - 0.5) * 100}px`;
                
                document.body.appendChild(particle);
                
                setTimeout(() => particle.remove(), 1000);
            }
        }

        function createHeartBurst(btn) {
            const rect = btn.getBoundingClientRect();
            
            for (let i = 0; i < 5; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart-burst';
                heart.innerHTML = '<i class="fas fa-heart"></i>';
                heart.style.left = `${rect.left + rect.width / 2}px`;
                heart.style.top = `${rect.top + rect.height / 2}px`;
                heart.style.setProperty('--tx', `${(Math.random() - 0.5) * 150}px`);
                heart.style.setProperty('--ty', `${(Math.random() - 0.5) * 150}px`;
                heart.style.fontSize = `${Math.random() * 1 + 0.5}rem`;
                heart.style.animationDelay = `${i * 0.1}s`;
                
                document.body.appendChild(heart);
                
                setTimeout(() => heart.remove(), 800);
            }
        }

        function animateCount(element, newCount) {
            element.textContent = formatNumber(newCount);
            element.classList.add('updated');
            setTimeout(() => {
                element.classList.remove('updated');
            }, 400);
        }

        // ==================== LIKE STATE MANAGEMENT ====================
        function isLiked(shortId) {
            const liked = localStorage.getItem('likedShorts');
            return liked ? JSON.parse(liked).includes(shortId) : false;
        }

        function markAsLiked(shortId) {
            const liked = JSON.parse(localStorage.getItem('likedShorts') || '[]');
            if (!liked.includes(shortId)) {
                liked.push(shortId);
                localStorage.setItem('likedShorts', JSON.stringify(liked));
            }
        }

        function markAsUnliked(shortId) {
            const liked = JSON.parse(localStorage.getItem('likedShorts') || '[]');
            const index = liked.indexOf(shortId);
            if (index > -1) {
                liked.splice(index, 1);
                localStorage.setItem('likedShorts', JSON.stringify(liked));
            }
        }

        // ==================== SHARE MODAL ====================
        function openShareModal(index) {
            currentShort = shorts[index];
            document.getElementById('shareOverlay').classList.add('active');
            document.getElementById('shareModal').classList.add('active');
        }

        function closeShareModal() {
            document.getElementById('shareOverlay').classList.remove('active');
            document.getElementById('shareModal').classList.remove('active');
        }

        function copyLink() {
            if (!currentShort) return;
            const url = `${window.location.origin}/shorts.html?id=${currentShort.numericId}`;
            navigator.clipboard.writeText(url).then(() => {
                showToast('Link copied! 📋', 'success');
                closeShareModal();
            });
        }

        function shareToWhatsApp() {
            if (!currentShort) return;
            const url = encodeURIComponent(`${window.location.origin}/shorts.html?id=${currentShort.numericId}`);
            const text = encodeURIComponent(`Check out this short: ${currentShort.title}`);
            window.open(`https://wa.me/?text=${text}%20${url}`, '_blank');
            closeShareModal();
        }

        function shareToTwitter() {
            if (!currentShort) return;
            const url = encodeURIComponent(`${window.location.origin}/shorts.html?id=${currentShort.numericId}`);
            const text = encodeURIComponent(`Check out this short: ${currentShort.title}`);
            window.open(`https://twitter.com/intent/tweet?text=${text}&url=${url}`, '_blank');
            closeShareModal();
        }

        function shareMore() {
            if (!currentShort) return;
            const url = `${window.location.origin}/shorts.html?id=${currentShort.numericId}`;
            if (navigator.share) {
                navigator.share({
                    title: currentShort.title,
                    url: url
                }).catch(() => {});
            } else {
                copyLink();
            }
            closeShareModal();
        }

        function openComments(index) {
            showToast('Comments coming soon! 💬', 'success');
        }

        // ==================== NAVIGATION ====================
        function goBack() {
            if (document.referrer) {
                window.history.back();
            } else {
                window.location.href = 'index.html';
            }
        }

        function openSearch() {
            showToast('Search coming soon! 🔍', 'success');
        }

        // ==================== UI HELPERS ====================
        function showLoading() {
            document.getElementById('loadingScreen').style.display = 'flex';
        }

        function hideLoading() {
            document.getElementById('loadingScreen').style.display = 'none';
        }

        function showError(message) {
            document.getElementById('errorMessage').textContent = message;
            document.getElementById('errorScreen').classList.add('active');
            hideLoading();
        }

        function hideError() {
            document.getElementById('errorScreen').classList.remove('active');
        }

        function showToast(message, type = '') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        function formatNumber(num) {
            if (num >= 1000000) {
                return (num / 1000000).toFixed(1) + 'M';
            } else if (num >= 1000) {
                return (num / 1000).toFixed(1) + 'K';
            }
            return num.toString();
        }

        // ==================== SCROLL LISTENER ====================
        function setupScrollListener() {
            const container = document.getElementById('shortsContainer');
            let ticking = false;

            container.addEventListener('scroll', () => {
                if (!ticking) {
                    window.requestAnimationFrame(() => {
                        updateCurrentIndex();
                        loadMoreIfNeeded();
                        ticking = false;
                    });
                    ticking = true;
                }
            });
        }

        function updateCurrentIndex() {
            const container = document.getElementById('shortsContainer');
            const scrollTop = container.scrollTop;
            const windowHeight = window.innerHeight;
            const newIndex = Math.round(scrollTop / windowHeight);

            if (newIndex !== currentIndex && shorts[newIndex]) {
                currentIndex = newIndex;
                currentShort = shorts[currentIndex];
            }
        }

        function loadMoreIfNeeded() {
            const container = document.getElementById('shortsContainer');
            const scrollPosition = container.scrollTop + container.clientHeight;
            const scrollHeight = container.scrollHeight;

            // Load more when within 2 videos of the end
            if (scrollHeight - scrollPosition < windowHeight * 2 && !isLoading) {
                loadMoreShorts();
            }
        }

        async function loadMoreShorts() {
            if (isLoading) return;
            isLoading = true;

            try {
                const response = await fetch(`${CONFIG.apiEndpoint}/shorts/recommend?limit=10&sessionId=${sessionId}`);
                const data = await response.json();

                if (data.length > 0) {
                    data.forEach(short => {
                        if (!shorts.find(s => s.numericId === short.numericId)) {
                            shorts.push(short);
                            const shortEl = createShortElement(short, shorts.length - 1);
                            document.getElementById('shortsContainer').appendChild(shortEl);
                        }
                    });
                }
            } catch (error) {
                console.error('Load more error:', error);
            }

            isLoading = false;
        }

        // ==================== KEYBOARD SHORTCUTS ====================
        function setupKeyboardShortcuts() {
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowDown' || e.key === 'j' || e.key === 'J') {
                    e.preventDefault();
                    document.getElementById('shortsContainer').scrollBy({ 
                        top: window.innerHeight, 
                        behavior: 'smooth' 
                    });
                }
                if (e.key === 'ArrowUp' || e.key === 'k' || e.key === 'K') {
                    e.preventDefault();
                    document.getElementById('shortsContainer').scrollBy({ 
                        top: -window.innerHeight, 
                        behavior: 'smooth' 
                    });
                }
                if (e.key === 'l' || e.key === 'L') {
                    handleLike(currentIndex);
                }
                if (e.key === ' ') {
                    e.preventDefault();
                    const video = document.querySelector(`.video-player[data-index="${currentIndex}"]`);
                    if (video) {
                        togglePlayPause(video, currentIndex);
                    }
                }
            });
        }

        // ==================== PREVENT ZOOM ON DOUBLE TAP ====================
        function setupPreventZoom() {
            let lastTouchEnd = 0;
            document.addEventListener('touchend', (e) => {
                const now = Date.now();
                if (now - lastTouchEnd <= 300) {
                    e.preventDefault();
                }
                lastTouchEnd = now;
            }, { passive: false });
        }

        // ==================== CLEANUP ====================
        window.addEventListener('beforeunload', () => {
            // Send any remaining queued views
            if (viewQueue.length > 0) {
                sendBatchViews();
            }
        });
    </script>
</body>
</html>
