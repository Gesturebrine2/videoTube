name: Add Storage Video

on:
  workflow_dispatch:
    inputs:
      video_filename:
        description: 'Video filename (e.g., video.mp4) - NO folder path'
        required: true
      video_title:
        description: 'Video Title'
        required: true
      video_duration:
        description: 'Duration (e.g., 5:30)'
        required: true
      thumbnail_filename:
        description: 'Thumbnail filename (optional) - NO folder path'
        required: false
      category:
        description: 'Category (e.g., teen, mature, interracial, anal, lesbian, amateur, homemade, bbc, etc.)'
        required: false
      custom_id:
        description: 'Custom ID (optional - leave empty for auto-generated numeric ID)'
        required: false

jobs:
  add-video:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Add video to JSON
        run: |
          cat > add-video.js << 'EOF'
          const fs = require('fs');

          let videoFile = process.env.VIDEO_FILENAME.trim();
          const title = process.env.VIDEO_TITLE.trim();
          const duration = process.env.VIDEO_DURATION.trim();
          let thumbFile = process.env.THUMB_FILENAME?.trim() || '';
          const category = process.env.CATEGORY?.trim() || '';
          const customId = process.env.CUSTOM_ID?.trim() || '';
          const cdnHost = process.env.CDN_HOST.trim();

          // Auto-add .mp4 if missing
          if (!videoFile.toLowerCase().endsWith('.mp4')) {
            videoFile += '.mp4';
          }

          const videoPath = `Xplit_vids/${videoFile}`;
          const baseFileName = videoFile.replace(/\.[^/.]+$/, "");

          // Thumbnail path
          let thumbnailPath;
          if (thumbFile) {
            if (!thumbFile.toLowerCase().match(/\.(jpg|jpeg|png|webp)$/)) {
              thumbFile += '.jpg';
            }
            thumbnailPath = `Xplit_vids/thumbnails/${thumbFile}`;
          } else {
            thumbnailPath = `Xplit_vids/thumbnails/${baseFileName}.jpg`;
          }

          const videoUrl = `https://${cdnHost}/${videoPath}`;
          const thumbnailUrl = `https://${cdnHost}/${thumbnailPath}`;

          let videos = [];
          if (fs.existsSync('videos.json')) {
            try {
              videos = JSON.parse(fs.readFileSync('videos.json', 'utf8'));
              if (!Array.isArray(videos)) videos = [];
            } catch (e) {
              console.log('Error reading videos.json, starting fresh');
              videos = [];
            }
          }

          // Generate numeric ID
          let numericId;
          if (customId) {
            numericId = customId;
            if (videos.find(v => v.numericId === numericId || v.id === numericId)) {
              console.error('❌ Custom ID already exists!');
              process.exit(1);
            }
          } else {
            const existingIds = videos.map(v => parseInt(v.numericId)).filter(n => !isNaN(n));
            const maxId = existingIds.length > 0 ? Math.max(...existingIds) : 0;
            numericId = String(maxId + 1).padStart(6, '0');
          }

          // Create URL-friendly ID from title (fallback)
          const urlFriendlyId = title
            .toLowerCase()
            .replace(/[^a-z0-9]+/g, '-')
            .replace(/^-+|-+$/g, '')
            .substring(0, 50) || `video-${numericId}`;

          // Check for duplicate video files
          if (videos.find(v => v.videoUrl === videoUrl)) {
            console.error('❌ Video file already exists in library!');
            process.exit(1);
          }

          // Normalize category (lowercase, no special chars)
          const normalizedCategory = category 
            ? category.toLowerCase().replace(/[^a-z0-9]/g, '') 
            : '';

          const newVideo = {
            id: urlFriendlyId,
            numericId: numericId,
            title: title,
            videoUrl: videoUrl,
            thumbnail: thumbnailUrl,
            duration: duration,
            uploadDate: new Date().toISOString().split('T')[0],
            type: 'storage',
            category: normalizedCategory || 'uncategorized',
            addedAt: new Date().toISOString()
          };

          videos.unshift(newVideo);
          fs.writeFileSync('videos.json', JSON.stringify(videos, null, 2));

          console.log('✅ Video added successfully!');
          console.log('');
          console.log('📊 Details:');
          console.log('  Numeric ID:', numericId);
          console.log('  Title:', title);
          console.log('  Category:', normalizedCategory || 'uncategorized');
          console.log('  Duration:', duration);
          console.log('');
          console.log('🔗 URLs:');
          console.log('  Video Page:', `https://xplitleaks.qzz.io/video.html?id=${numericId}`);
          console.log('  Video:', videoUrl);
          console.log('  Thumbnail:', thumbnailUrl);
          console.log('');
          console.log('💡 Tips:');
          console.log('  - Category is used for smart recommendations');
          console.log('  - Videos with same category will be recommended together');
          console.log('  - Upload thumbnail to:', `Xplit_vids/thumbnails/${baseFileName}.jpg`);
          EOF
          
          node add-video.js
        env:
          VIDEO_FILENAME: ${{ github.event.inputs.video_filename }}
          VIDEO_TITLE: ${{ github.event.inputs.video_title }}
          VIDEO_DURATION: ${{ github.event.inputs.video_duration }}
          THUMB_FILENAME: ${{ github.event.inputs.thumbnail_filename }}
          CATEGORY: ${{ github.event.inputs.category }}
          CUSTOM_ID: ${{ github.event.inputs.custom_id }}
          CDN_HOST: ${{ secrets.BUNNY_STORAGE_HOST }}
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add videos.json
          git commit -m "Add video: ${{ github.event.inputs.video_title }} [${{ github.event.inputs.category || 'uncategorized' }}] [ID: ${{ github.event.inputs.custom_id || 'auto' }}]" || exit 0
          git push
