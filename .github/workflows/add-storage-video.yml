name: Add Storage Video

on:
  workflow_dispatch:
    inputs:
      video_filename:
        description: 'Video filename (e.g., video.mp4) - NO folder path'
        required: true
      video_title:
        description: 'Video Title'
        required: true
      video_duration:
        description: 'Duration (e.g., 5:30)'
        required: true
      thumbnail_filename:
        description: 'Thumbnail filename (optional, e.g., video.jpg) - NO folder path'
        required: false
      custom_id:
        description: 'Custom ID (optional - leave empty for auto-generated numeric ID)'
        required: false

jobs:
  add-video:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Add video to JSON
        run: |
          cat > add-video.js << 'EOF'
          const fs = require('fs');
          const crypto = require('crypto');
          
          let videoFile = process.env.VIDEO_FILENAME.trim();
          const title = process.env.VIDEO_TITLE.trim();
          const duration = process.env.VIDEO_DURATION.trim();
          let thumbFile = process.env.THUMB_FILENAME?.trim() || '';
          const customId = process.env.CUSTOM_ID?.trim() || '';
          const cdnHost = process.env.CDN_HOST.trim();
          
          // Auto-add .mp4 if missing
          if (!videoFile.toLowerCase().endsWith('.mp4')) {
            videoFile += '.mp4';
          }
          
          // Build full paths with your folder structure
          const videoPath = `Xplit_vids/${videoFile}`;
          const baseFileName = videoFile.replace(/\.[^/.]+$/, "");
          
          // Thumbnail path
          let thumbnailPath;
          if (thumbFile) {
            // Auto-add .jpg if no extension
            if (!thumbFile.toLowerCase().match(/\.(jpg|jpeg|png|webp)$/)) {
              thumbFile += '.jpg';
            }
            thumbnailPath = `Xplit_vids/thumbnails/${thumbFile}`;
          } else {
            // Default thumbnail same name as video
            thumbnailPath = `Xplit_vids/thumbnails/${baseFileName}.jpg`;
          }
          
          // Build full URLs
          const videoUrl = `https://${cdnHost}/${videoPath}`;
          const thumbnailUrl = `https://${cdnHost}/${thumbnailPath}`;
          
          let videos = [];
          if (fs.existsSync('videos.json')) {
            try {
              videos = JSON.parse(fs.readFileSync('videos.json', 'utf8'));
              if (!Array.isArray(videos)) videos = [];
            } catch (e) {
              videos = [];
            }
          }
          
          // Generate numeric ID
          let numericId;
          if (customId) {
            // Use custom ID if provided
            numericId = customId;
            // Check for duplicates
            if (videos.find(v => v.numericId === numericId || v.id === numericId)) {
              console.error('❌ Custom ID already exists!');
              process.exit(1);
            }
          } else {
            // Auto-generate sequential numeric ID
            const existingIds = videos
              .map(v => parseInt(v.numericId))
              .filter(n => !isNaN(n));
            const maxId = existingIds.length > 0 ? Math.max(...existingIds) : 0;
            numericId = String(maxId + 1).padStart(6, '0'); // Format: 000001, 000002, etc.
          }
          
          // Create URL-friendly ID from title (for backwards compatibility)
          const urlFriendlyId = title
            .toLowerCase()
            .replace(/[^a-z0-9]+/g, '-')
            .replace(/^-+|-+$/g, '')
            .substring(0, 50);
          
          // Check for duplicate video files
          if (videos.find(v => v.videoUrl === videoUrl)) {
            console.error('❌ Video file already exists in library!');
            process.exit(1);
          }
          
          const newVideo = {
            id: urlFriendlyId, // Keep for backwards compatibility
            numericId: numericId, // New clean numeric ID for URLs
            title: title,
            videoUrl: videoUrl,
            thumbnail: thumbnailUrl,
            duration: duration,
            uploadDate: new Date().toISOString().split('T')[0],
            type: 'storage',
            fileSize: null, // Can be updated manually if needed
            addedAt: new Date().toISOString()
          };
          
          videos.unshift(newVideo);
          fs.writeFileSync('videos.json', JSON.stringify(videos, null, 2));
          
          console.log('✅ Video added successfully!');
          console.log('Numeric ID:', numericId);
          console.log('URL:', `https://xplitleaks.qzz.io/video.html?id=${numericId}`);
          console.log('Video:', videoUrl);
          console.log('Thumbnail:', thumbnailUrl);
          EOF
          
          node add-video.js
        env:
          VIDEO_FILENAME: ${{ github.event.inputs.video_filename }}
          VIDEO_TITLE: ${{ github.event.inputs.video_title }}
          VIDEO_DURATION: ${{ github.event.inputs.video_duration }}
          THUMB_FILENAME: ${{ github.event.inputs.thumbnail_filename }}
          CUSTOM_ID: ${{ github.event.inputs.custom_id }}
          CDN_HOST: ${{ secrets.BUNNY_STORAGE_HOST }}
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add videos.json
          git commit -m "Add video: ${{ github.event.inputs.video_title }} [ID: auto-generated]" || exit 0
          git push
