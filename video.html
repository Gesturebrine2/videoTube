<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#0a0a0a">
    <title id="pageTitle">Loading... - Xplitleaks</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Config with Custom Colors -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#ff0050',
                        secondary: '#00f2ea',
                        dark: '#0a0a0a',
                        darker: '#050505',
                        card: '#1a1a1a',
                        border: '#333333',
                        muted: '#888888',
                        success: '#00d084',
                        warning: '#ffab00',
                        danger: '#ff0050'
                    }
                }
            }
        }
    </script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Vidstack CSS -->
    <link rel="stylesheet" href="https://cdn.vidstack.io/player/theme.css" />
    
    <!-- Custom Styles for Vidstack & Animations -->
    <style>
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #ff0050;
        }
        
        /* Smooth transitions */
        * {
            transition-property: background-color, border-color, color, fill, stroke;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            transition-duration: 150ms;
        }
        
        /* Hide scrollbar for carousel but keep functionality */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* Vidstack theme customization */
        .vidstack-player {
            --media-brand: #ff0050;
            --media-focus-ring: 0 0 0 3px rgba(255, 0, 80, 0.4);
        }
    </style>
</head>
<body class="bg-darker text-white font-sans antialiased min-h-screen overflow-x-hidden">

    <!-- ==================== TOAST CONTAINER ==================== -->
    <div id="toastContainer" class="fixed top-24 right-5 z-[9999] flex flex-col gap-3"></div>

    <!-- ==================== HEADER ==================== -->
    <header class="bg-dark border-b border-border sticky top-0 z-[1000] px-4 md:px-8 py-4 flex justify-between items-center">
        <div class="text-2xl font-bold bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">
            Xplitleaks
        </div>
        <a href="index.html" class="inline-flex items-center gap-2 px-4 py-2 bg-card border border-border rounded-lg text-sm hover:bg-primary hover:border-primary hover:-translate-x-1 transition-all">
            <i class="fas fa-arrow-left"></i>
            <span>Back to Home</span>
        </a>
    </header>

    <!-- ==================== MAIN CONTENT ==================== -->
    <main class="max-w-[1200px] mx-auto px-4 md:px-8 py-8">
        
        <!-- Loading State -->
        <div id="loadingState" class="text-center py-16 text-muted">
            <div class="w-12 h-12 border-4 border-white/10 border-t-primary rounded-full animate-spin mx-auto mb-4"></div>
            <p>Loading video...</p>
        </div>

        <!-- Error State -->
        <div id="errorState" class="hidden text-center py-16 bg-card border border-border rounded-xl">
            <i class="fas fa-exclamation-triangle text-6xl text-danger mb-4"></i>
            <h2 class="text-2xl font-bold mb-2">Video Not Found</h2>
            <p id="errorMessage" class="text-muted mb-6">The video you're looking for doesn't exist or has been removed.</p>
            <a href="index.html" class="inline-flex items-center gap-2 px-6 py-3 bg-card border border-border rounded-lg hover:bg-primary hover:border-primary transition-all">
                <i class="fas fa-home"></i>
                <span>Back to Home</span>
            </a>
        </div>

        <!-- Video Content -->
        <div id="videoContent" class="hidden">
            
            <!-- ==================== VIDEO PLAYER SECTION ==================== -->
            <section class="mb-8 max-w-[1000px] mx-auto">
                <!-- Vidstack Player Container -->
                <div class="bg-dark rounded-xl overflow-hidden border border-border mb-6 aspect-video relative">
                    <media-player 
                        id="videoPlayer" 
                        class="w-full h-full"
                        title="Video Player"
                        src=""
                        poster=""
                        crossorigin
                        playsinline
                    >
                        <media-video-layout></media-video-layout>
                    </media-player>
                </div>

                <!-- Video Error Message -->
                <div id="videoErrorMessage" class="hidden bg-danger/10 border border-danger text-danger p-4 rounded-lg mb-6 text-center"></div>

                <!-- Video Info Card -->
                <div class="bg-card border border-border rounded-xl p-6 mb-6">
                    <h1 id="videoTitle" class="text-2xl font-bold mb-4">Loading...</h1>
                    
                    <!-- Video Metadata -->
                    <div class="flex flex-wrap gap-4 items-center text-sm text-muted mb-4">
                        <span id="videoCategory" class="bg-primary text-white px-3 py-1 rounded-full text-xs font-semibold">Category</span>
                        <span class="flex items-center gap-2">
                            <i class="fas fa-eye text-primary"></i>
                            <span id="videoViews">0</span> views
                        </span>
                        <span class="flex items-center gap-2">
                            <i class="fas fa-clock text-primary"></i>
                            <span id="videoDuration">0:00</span>
                        </span>
                        <span class="flex items-center gap-2">
                            <i class="fas fa-calendar text-primary"></i>
                            <span id="videoDate">N/A</span>
                        </span>
                    </div>

                    <!-- Engagement Buttons -->
                    <div class="flex flex-wrap gap-3 py-4 border-t border-border mt-4">
                        <button id="likeBtn" onclick="toggleLike()" class="flex items-center gap-2 px-5 py-3 bg-dark border border-border rounded-lg hover:bg-primary hover:border-primary hover:-translate-y-0.5 transition-all">
                            <i class="far fa-heart"></i>
                            <span>Like</span>
                            <span id="likeCount" class="text-muted text-sm">0</span>
                        </button>
                        <button id="shareBtn" onclick="shareVideo()" class="flex items-center gap-2 px-5 py-3 bg-dark border border-border rounded-lg hover:bg-primary hover:border-primary hover:-translate-y-0.5 transition-all">
                            <i class="fas fa-share"></i>
                            <span>Share</span>
                        </button>
                        <button onclick="copyLink()" class="flex items-center gap-2 px-5 py-3 bg-dark border border-border rounded-lg hover:bg-primary hover:border-primary hover:-translate-y-0.5 transition-all">
                            <i class="fas fa-link"></i>
                            <span>Copy Link</span>
                        </button>
                        <button onclick="openReportModal()" class="ml-auto flex items-center gap-2 px-5 py-3 bg-dark border border-border rounded-lg hover:bg-primary hover:border-primary hover:-translate-y-0.5 transition-all">
                            <i class="fas fa-flag"></i>
                            <span>Report</span>
                        </button>
                    </div>

                    <!-- Video Description -->
                    <div id="videoDescription" class="text-muted leading-relaxed mt-4 pt-4 border-t border-border hidden"></div>
                    
                    <!-- Tags Container -->
                    <div id="tagsContainer" class="flex flex-wrap gap-2 mt-4 pt-4 border-t border-border hidden"></div>
                </div>
            </section>

            <!-- ==================== SHORTS CAROUSEL ==================== -->
            <section class="mb-12 relative">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold flex items-center gap-3">
                        <i class="fas fa-mobile-alt text-primary"></i>
                        Related Shorts
                    </h2>
                    <a href="shorts.html" class="text-primary hover:text-secondary font-medium flex items-center gap-1">
                        View All <i class="fas fa-arrow-right"></i>
                    </a>
                </div>
                
                <div class="relative">
                    <!-- Scroll Buttons -->
                    <button onclick="scrollShorts('left')" class="absolute left-0 top-1/2 -translate-y-1/2 z-10 w-10 h-10 bg-primary/80 rounded-full flex items-center justify-center opacity-0 hover:opacity-100 hover:bg-primary transition-all group-hover:opacity-100">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <button onclick="scrollShorts('right')" class="absolute right-0 top-1/2 -translate-y-1/2 z-10 w-10 h-10 bg-primary/80 rounded-full flex items-center justify-center opacity-0 hover:opacity-100 hover:bg-primary transition-all group-hover:opacity-100">
                        <i class="fas fa-chevron-right"></i>
                    </button>

                    <!-- Shorts Carousel -->
                    <div id="shortsCarousel" class="flex gap-4 overflow-x-auto no-scrollbar scroll-smooth pb-4">
                        <div class="text-center py-16 w-full text-muted">
                            <div class="w-12 h-12 border-4 border-white/10 border-t-primary rounded-full animate-spin mx-auto mb-4"></div>
                            <p>Loading shorts...</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- ==================== RECOMMENDED VIDEOS ==================== -->
            <section class="mb-12">
                <h2 class="text-2xl font-bold flex items-center gap-3 mb-6">
                    <i class="fas fa-th-large text-primary"></i>
                    Recommended for You
                </h2>
                
                <div id="recommendedVideos" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                    <div class="text-center py-16 col-span-full text-muted">
                        <div class="w-12 h-12 border-4 border-white/10 border-t-primary rounded-full animate-spin mx-auto mb-4"></div>
                        <p>Loading recommendations...</p>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- ==================== REPORT MODAL ==================== -->
    <div id="reportModal" class="hidden fixed inset-0 bg-black/80 z-[2000] flex items-center justify-center p-4">
        <div class="bg-card border border-border rounded-xl p-8 max-w-[500px] w-full max-h-[90vh] overflow-y-auto animate-[modalPop_0.3s_ease-out]">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold flex items-center gap-2">
                    <i class="fas fa-flag text-primary"></i>
                    Report Video
                </h3>
                <button onclick="closeReportModal()" class="text-muted hover:text-danger hover:rotate-90 transition-all text-2xl">
                    &times;
                </button>
            </div>
            
            <form id="reportForm" onsubmit="submitReport(event)">
                <div class="mb-5">
                    <label for="reportReason" class="block mb-2 text-sm text-muted">Reason *</label>
                    <select id="reportReason" required class="w-full px-3 py-3 bg-dark border border-border rounded-lg text-white focus:outline-none focus:border-primary">
                        <option value="">Select a reason</option>
                        <option value="inappropriate">Inappropriate Content</option>
                        <option value="copyright">Copyright Violation</option>
                        <option value="spam">Spam or Misleading</option>
                        <option value="quality">Poor Quality</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                
                <div class="mb-5">
                    <label for="reportDetails" class="block mb-2 text-sm text-muted">Additional Details</label>
                    <textarea id="reportDetails" rows="4" placeholder="Please provide more details about your report..." class="w-full px-3 py-3 bg-dark border border-border rounded-lg text-white focus:outline-none focus:border-primary resize-y"></textarea>
                </div>
                
                <button type="submit" class="w-full flex items-center justify-center gap-2 px-6 py-3 bg-danger border border-danger rounded-lg hover:bg-danger/90 transition-all">
                    <i class="fas fa-paper-plane"></i>
                    Submit Report
                </button>
            </form>
        </div>
    </div>

    <!-- ==================== VIDSTACK PLAYER SCRIPT ==================== -->
    <script type="module">
        import { MediaProvider } from 'https://cdn.vidstack.io/player';
        
        // Initialize Vidstack player
        const player = document.getElementById('videoPlayer');
        
        // Export player to window for global access
        window.vidstackPlayer = player;
        
        // Listen for player events
        player?.addEventListener('loaded-data', () => {
            console.log('✅ Video loaded successfully');
        });
        
        player?.addEventListener('error', (e) => {
            console.error('❌ Video error:', e);
        });
    </script>

    <!-- ==================== JAVASCRIPT ==================== -->
    <script>
        // ==================== CONFIGURATION ====================
        const CONFIG = {
            apiEndpoint: 'https://xplitleaks-api.dylancoral.workers.dev/api',
            sessionId: localStorage.getItem('sessionId') || generateSessionId()
        };
        localStorage.setItem('sessionId', CONFIG.sessionId);

        // ==================== STATE ====================
        let currentVideo = null;
        let viewTracked = false;

        // ==================== INITIALIZATION ====================
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🚀 Page loaded, initializing...');
            loadVideo();
        });

        function generateSessionId() {
            return 'sess_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
        }

        // ==================== LOAD VIDEO ====================
        async function loadVideo() {
            const urlParams = new URLSearchParams(window.location.search);
            const videoId = urlParams.get('id');
            console.log('📹 Video ID from URL:', videoId);
            
            if (!videoId) {
                showError('Video ID is required. Please use: video.html?id=VIDEO_ID');
                return;
            }
            
            try {
                console.log('📡 Fetching video from API...');
                const response = await fetch(`${CONFIG.apiEndpoint}/video/${videoId}`);
                console.log('✅ API Response status:', response.status);
                
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('❌ API Error:', errorText);
                    throw new Error(`API returned ${response.status}: ${errorText}`);
                }
                
                const data = await response.json();
                console.log('📦 Video data received:', data);
                
                // 🔥 FIX: Clean URLs - remove double slashes and trim spaces
                const cleanedData = {
                    ...data,
                    videoUrl: (data.videoUrl || '').replace(/\/+/g, '/').trim(),
                    thumbnail: (data.thumbnail || '').replace(/\/+/g, '/').trim(),
                    title: (data.title || '').trim(),
                    description: (data.description || '').trim()
                };
                
                console.log('🧹 Cleaned videoUrl:', cleanedData.videoUrl);
                
                if (!cleanedData || !cleanedData.videoUrl) {
                    console.error('❌ Missing video URL in response');
                    throw new Error('Video URL is missing from API response');
                }
                
                currentVideo = cleanedData;
                
                // Update page title
                document.getElementById('pageTitle').textContent = `${cleanedData.title} - Xplitleaks`;
                
                // Setup player
                setupPlayer(cleanedData);
                
                // Update info
                updateVideoInfo(cleanedData);
                
                // Load related content
                loadRelatedShorts(cleanedData);
                loadRecommendedVideos(cleanedData);
                
                // Track view (after 10 seconds or 50% watched)
                setTimeout(() => trackView(false), 10000);
                
                // 🔥 FIX: Hide error state BEFORE showing content
                console.log('👁️ Showing video content...');
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('errorState').classList.add('hidden');
                document.getElementById('videoContent').classList.remove('hidden');
                
                console.log('✅ Video content displayed successfully');
                
            } catch (error) {
                console.error('💥 Load video error:', error);
                showError('Failed to load video: ' + error.message);
            }
        }

        // ==================== SETUP VIDSTACK PLAYER ====================
        function setupPlayer(video) {
            const player = document.getElementById('videoPlayer');
            console.log('🎬 Setting up Vidstack player...');
            console.log('🔗 Video URL:', video.videoUrl);
            
            if (!player) {
                console.error('❌ Player element not found!');
                return;
            }
            
            // Set video source
            player.src = video.videoUrl;
            
            // Set poster if available
            if (video.thumbnail) {
                player.setAttribute('poster', video.thumbnail);
            }
            
            // Error handling
            player.addEventListener('error', (e) => {
                console.error('❌ Video element error:', e);
                showVideoError('Failed to load video file. The file may be unavailable.');
            });
            
            // Success handling
            player.addEventListener('loaded-data', () => {
                console.log('✅ Video loaded successfully');
            });
            
            player.addEventListener('can-play', () => {
                console.log('✅ Video can play');
            });
            
            // Track view on video end
            player.addEventListener('ended', () => {
                console.log('⏹️ Video ended, tracking view');
                trackView(true);
            });
            
            // Track progress for view tracking
            player.addEventListener('time-update', () => {
                if (player.duration > 0 && !viewTracked) {
                    const progress = player.currentTime / player.duration;
                    if (progress >= 0.5) {
                        console.log('📊 50% watched, tracking view');
                        trackView(false);
                    }
                }
            });
        }

        function showVideoError(message) {
            const errorDiv = document.getElementById('videoErrorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.remove('hidden');
            showToast('Video playback error', 'error');
        }

        // ==================== UPDATE VIDEO INFO ====================
        function updateVideoInfo(video) {
            document.getElementById('videoTitle').textContent = video.title;
            document.getElementById('videoCategory').textContent = video.category || 'Uncategorized';
            document.getElementById('videoViews').textContent = formatNumber(video.views || 0);
            document.getElementById('videoDuration').textContent = video.duration || '0:00';
            document.getElementById('videoDate').textContent = video.uploadDate || 'N/A';
            
            // Description
            const descEl = document.getElementById('videoDescription');
            if (video.description) {
                descEl.textContent = video.description;
                descEl.classList.remove('hidden');
            }
            
            // Like count
            document.getElementById('likeCount').textContent = formatNumber(video.likes || 0);
            
            // Update like button state
            const videoId = video.numericId || video.id;
            const likeBtn = document.getElementById('likeBtn');
            if (isLiked(videoId)) {
                likeBtn.classList.add('bg-primary', 'border-primary');
                likeBtn.querySelector('i').className = 'fas fa-heart';
            }
            
            // Load tags
            const tags = JSON.parse(video.tags || '[]');
            const tagsContainer = document.getElementById('tagsContainer');
            if (tags.length > 0) {
                tagsContainer.innerHTML = tags.map(tag =>
                    `<a href="index.html?tag=${encodeURIComponent(tag)}" class="bg-dark border border-border text-muted px-3 py-1 rounded-full text-sm hover:border-primary hover:text-primary transition-all">#${tag}</a>`
                ).join('');
                tagsContainer.classList.remove('hidden');
            }
        }

        // ==================== ENGAGEMENT TRACKING ====================
        async function toggleLike() {
            if (!currentVideo) return;
            const btn = document.getElementById('likeBtn');
            const icon = btn.querySelector('i');
            const countEl = document.getElementById('likeCount');
            const wasLiked = btn.classList.contains('bg-primary');
            const videoId = currentVideo.numericId || currentVideo.id;
            
            try {
                console.log('❤️ Toggling like for video:', videoId);
                const response = await fetch(`${CONFIG.apiEndpoint}/short/like`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Session-Id': CONFIG.sessionId
                    },
                    body: JSON.stringify({ shortId: videoId })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.action === 'liked') {
                        btn.classList.add('bg-primary', 'border-primary');
                        icon.className = 'fas fa-heart';
                        currentVideo.likes = (currentVideo.likes || 0) + 1;
                        markAsLiked(videoId);
                        showToast('Liked! ❤️', 'success');
                    } else {
                        btn.classList.remove('bg-primary', 'border-primary');
                        icon.className = 'far fa-heart';
                        currentVideo.likes = Math.max((currentVideo.likes || 0) - 1, 0);
                        markAsUnliked(videoId);
                    }
                    countEl.textContent = formatNumber(currentVideo.likes);
                }
            } catch (error) {
                console.error('❌ Like error:', error);
                if (wasLiked) {
                    btn.classList.add('bg-primary', 'border-primary');
                    icon.className = 'fas fa-heart';
                } else {
                    btn.classList.remove('bg-primary', 'border-primary');
                    icon.className = 'far fa-heart';
                }
                showToast('Failed to update like', 'error');
            }
        }

        async function trackView(isComplete) {
            if (viewTracked || !currentVideo) return;
            try {
                const videoId = currentVideo.numericId || currentVideo.id;
                const player = document.getElementById('videoPlayer');
                const watchDuration = isComplete ? 1 : (player?.currentTime / player?.duration) || 0.5;
                const watchTime = player?.currentTime || 0;
                
                await fetch(`${CONFIG.apiEndpoint}/short/view`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Session-Id': CONFIG.sessionId
                    },
                    body: JSON.stringify({
                        shortId: videoId,
                        watchDuration,
                        watchTime
                    })
                });
                
                viewTracked = true;
                console.log('✅ View tracked successfully');
            } catch (error) {
                console.error('❌ Track view error:', error);
            }
        }

        async function shareVideo() {
            const btn = document.getElementById('shareBtn');
            const videoId = currentVideo.numericId || currentVideo.id;
            
            try {
                await fetch(`${CONFIG.apiEndpoint}/short/share`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Session-Id': CONFIG.sessionId
                    },
                    body: JSON.stringify({ shortId: videoId })
                });
                
                btn.classList.add('bg-success', 'border-success');
                showToast('Share counted! ↗️', 'success');
                
                setTimeout(() => {
                    btn.classList.remove('bg-success', 'border-success');
                }, 500);
                
                if (navigator.share) {
                    navigator.share({
                        title: currentVideo.title,
                        url: window.location.href
                    }).catch(() => {});
                } else {
                    copyLink();
                }
            } catch (error) {
                console.error('❌ Share error:', error);
                copyLink();
            }
        }

        function copyLink() {
            navigator.clipboard.writeText(window.location.href).then(() => {
                showToast('Link copied! 📋', 'success');
            }).catch(() => {
                showToast('Failed to copy link', 'error');
            });
        }

        // ==================== LIKE STATE MANAGEMENT ====================
        function isLiked(videoId) {
            const liked = localStorage.getItem('likedVideos');
            return liked ? JSON.parse(liked).includes(videoId) : false;
        }

        function markAsLiked(videoId) {
            const liked = JSON.parse(localStorage.getItem('likedVideos') || '[]');
            if (!liked.includes(videoId)) {
                liked.push(videoId);
                localStorage.setItem('likedVideos', JSON.stringify(liked));
            }
        }

        function markAsUnliked(videoId) {
            const liked = JSON.parse(localStorage.getItem('likedVideos') || '[]');
            const index = liked.indexOf(videoId);
            if (index > -1) {
                liked.splice(index, 1);
                localStorage.setItem('likedVideos', JSON.stringify(liked));
            }
        }

        // ==================== LOAD RELATED SHORTS ====================
        async function loadRelatedShorts(video) {
            const carousel = document.getElementById('shortsCarousel');
            try {
                console.log('📱 Loading related shorts...');
                const response = await fetch(`${CONFIG.apiEndpoint}/shorts?limit=10`);
                let shorts = await response.json();
                
                if (shorts && shorts.length > 0) {
                    const category = video.category;
                    let related = shorts.filter(s => s.category === category);
                    if (related.length < 10) {
                        const remaining = shorts.filter(s => s.category !== category);
                        related = [...related, ...remaining].slice(0, 10);
                    }
                    carousel.innerHTML = related.map(short => createShortCard(short)).join('');
                } else {
                    carousel.innerHTML = `
                        <div class="text-center py-16 w-full text-muted">
                            <i class="fas fa-video text-4xl mb-3"></i>
                            <p>No shorts available</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('❌ Load shorts error:', error);
                carousel.innerHTML = `
                    <div class="text-center py-16 w-full text-muted">
                        <i class="fas fa-exclamation-triangle text-4xl mb-3"></i>
                        <p>Failed to load shorts</p>
                    </div>
                `;
            }
        }

        function createShortCard(short) {
            return `
                <a href="shorts.html?id=${short.numericId}" class="flex-none w-[180px] bg-card border border-border rounded-xl overflow-hidden hover:-translate-y-1 hover:border-primary hover:shadow-[0_5px_20px_rgba(255,0,80,0.3)] transition-all group">
                    <div class="relative aspect-[9/16]">
                        <img src="${short.thumbnail || ''}"
                            alt="${short.title}"
                            class="w-full h-full object-cover bg-dark"
                            onerror="this.src='image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22180%22 height=%22320%22%3E%3Crect fill=%22%23333%22 width=%22180%22 height=%22320%22/%3E%3Ctext fill=%22%23888%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22%3ENo%20Thumbnail%3C/text%3E%3C/svg%3E'">
                        <span class="absolute bottom-2 right-2 bg-black/80 text-white px-2 py-1 rounded text-xs font-semibold">
                            ${short.duration || '0:00'}
                        </span>
                        <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex flex-col justify-end p-4">
                            <div class="text-sm font-semibold mb-2 line-clamp-2">${short.title}</div>
                            <div class="flex gap-3 text-xs text-muted">
                                <span class="flex items-center gap-1"><i class="fas fa-eye text-primary"></i> ${formatNumber(short.views || 0)}</span>
                                <span class="flex items-center gap-1"><i class="fas fa-heart text-primary"></i> ${formatNumber(short.likes || 0)}</span>
                            </div>
                        </div>
                        <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                            <div class="w-12 h-12 bg-primary/90 rounded-full flex items-center justify-center text-xl scale-100 group-hover:scale-110 transition-transform">
                                <i class="fas fa-play ml-1"></i>
                            </div>
                        </div>
                    </div>
                </a>
            `;
        }

        function scrollShorts(direction) {
            const carousel = document.getElementById('shortsCarousel');
            const scrollAmount = direction === 'left' ? -400 : 400;
            carousel.scrollBy({ left: scrollAmount, behavior: 'smooth' });
        }

        // ==================== LOAD RECOMMENDED VIDEOS ====================
        async function loadRecommendedVideos(video) {
            const container = document.getElementById('recommendedVideos');
            try {
                console.log('🎬 Loading recommended videos...');
                const response = await fetch(`${CONFIG.apiEndpoint}/videos?limit=8`);
                const videos = await response.json();
                
                if (videos && videos.length > 0) {
                    const currentId = currentVideo.numericId || currentVideo.id;
                    const filtered = videos.filter(v =>
                        (v.numericId || v.id) !== currentId
                    );
                    container.innerHTML = filtered.map(v => createVideoCard(v)).join('');
                } else {
                    container.innerHTML = `
                        <div class="text-center py-16 col-span-full text-muted">
                            <i class="fas fa-video text-4xl mb-3"></i>
                            <p>No recommendations available</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('❌ Load recommendations error:', error);
                container.innerHTML = `
                    <div class="text-center py-16 col-span-full text-muted">
                        <i class="fas fa-exclamation-triangle text-4xl mb-3"></i>
                        <p>Failed to load recommendations</p>
                    </div>
                `;
            }
        }

        function createVideoCard(video) {
            return `
                <a href="video.html?id=${video.numericId || video.id}" class="bg-card border border-border rounded-xl overflow-hidden hover:-translate-y-1 hover:border-primary hover:shadow-[0_5px_20px_rgba(255,0,80,0.2)] transition-all group">
                    <div class="relative aspect-video">
                        <img src="${video.thumbnail || ''}"
                            alt="${video.title}"
                            class="w-full h-full object-cover bg-dark"
                            onerror="this.src='image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22280%22 height=%22180%22%3E%3Crect fill=%22%23333%22 width=%22280%22 height=%22180%22/%3E%3Ctext fill=%22%23888%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22%3ENo%20Thumbnail%3C/text%3E%3C/svg%3E'">
                        <span class="absolute bottom-2 right-2 bg-black/80 text-white px-2 py-1 rounded text-xs font-semibold">
                            ${video.duration || '0:00'}
                        </span>
                    </div>
                    <div class="p-4">
                        <h3 class="font-semibold mb-2 line-clamp-2">${video.title}</h3>
                        <div class="flex flex-wrap gap-3 text-sm text-muted">
                            <span class="flex items-center gap-1"><i class="fas fa-eye text-primary"></i> ${formatNumber(video.views || 0)}</span>
                            <span class="flex items-center gap-1"><i class="fas fa-clock text-primary"></i> ${video.uploadDate || 'N/A'}</span>
                        </div>
                    </div>
                </a>
            `;
        }

        // ==================== REPORT MODAL ====================
        function openReportModal() {
            document.getElementById('reportModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeReportModal() {
            document.getElementById('reportModal').classList.add('hidden');
            document.getElementById('reportForm').reset();
            document.body.style.overflow = '';
        }

        async function submitReport(event) {
            event.preventDefault();
            const reason = document.getElementById('reportReason').value;
            const details = document.getElementById('reportDetails').value;
            const videoId = currentVideo.numericId || currentVideo.id;
            
            try {
                await fetch(`${CONFIG.apiEndpoint}/report`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Session-Id': CONFIG.sessionId
                    },
                    body: JSON.stringify({
                        videoId,
                        videoType: 'video',
                        reason: reason + (details ? ': ' + details : '')
                    })
                });
                
                showToast('Report submitted successfully', 'success');
                closeReportModal();
            } catch (error) {
                console.error('❌ Submit report error:', error);
                showToast('Failed to submit report', 'error');
            }
        }

        // ==================== ERROR HANDLING ====================
        function showError(message) {
            console.error('❌ Showing error:', message);
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('errorState').classList.remove('hidden');
            document.getElementById('errorMessage').textContent = message;
        }

        // ==================== TOAST NOTIFICATIONS ====================
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            
            const colors = {
                success: 'border-success',
                error: 'border-danger',
                info: 'border-primary'
            };
            
            const icons = {
                success: 'fa-check-circle text-success',
                error: 'fa-exclamation-circle text-danger',
                info: 'fa-info-circle text-primary'
            };
            
            toast.className = `bg-card border-l-4 ${colors[type]} border border-border rounded-lg shadow-lg p-4 flex items-center gap-3 min-w-[300px] animate-[slideInRight_0.3s_ease-out]`;
            
            toast.innerHTML = `
                <i class="fas ${icons[type]} text-xl"></i>
                <span class="flex-1">${message}</span>
                <button onclick="this.parentElement.remove()" class="text-muted hover:text-white">
                    <i class="fas fa-times"></i>
                </button>
            `;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // ==================== UTILITIES ====================
        function formatNumber(num) {
            if (num >= 1000000) {
                return (num / 1000000).toFixed(1) + 'M';
            } else if (num >= 1000) {
                return (num / 1000).toFixed(1) + 'K';
            }
            return num.toString();
        }

        // Close modal on outside click
        document.getElementById('reportModal')?.addEventListener('click', (e) => {
            if (e.target.id === 'reportModal') {
                closeReportModal();
            }
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeReportModal();
            }
        });

        // Add CSS animations
        const style = document.createElement('style');
        style.textContent = `
            @keyframes modalPop {
                from { opacity: 0; transform: scale(0.9); }
                to { opacity: 1; transform: scale(1); }
            }
            @keyframes slideInRight {
                from { opacity: 0; transform: translateX(100%); }
                to { opacity: 1; transform: translateX(0); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
