<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#0a0a0a">
    <title id="pageTitle">Loading... - Xplitleaks</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#ff0050',
                        secondary: '#00f2ea',
                        dark: '#0a0a0a',
                        darker: '#050505',
                        card: '#1a1a1a',
                        border: '#333333',
                        muted: '#888888'
                    }
                }
            }
        }
    </script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #ff0050; }
        
        /* Custom Video Player Styles */
        .video-player-wrapper {
            position: relative;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 16/9;
        }
        
        .video-player-wrapper video {
            width: 100%;
            height: 100%;
            display: block;
            cursor: pointer;
        }
        
        /* Custom Controls Container */
        .video-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
            padding: 1rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        .video-player-wrapper:hover .video-controls,
        .video-player-wrapper.paused .video-controls {
            opacity: 1;
        }
        
        .video-controls > * {
            pointer-events: auto;
        }
        
        /* Progress Bar */
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            cursor: pointer;
            margin-bottom: 1rem;
            position: relative;
        }
        
        .progress-fill {
            height: 100%;
            background: #ff0050;
            border-radius: 2px;
            width: 0%;
            position: relative;
        }
        
        .progress-fill::after {
            content: '';
            position: absolute;
            right: -8px;
            top: 50%;
            transform: translateY(-50%) scale(0);
            width: 16px;
            height: 16px;
            background: #ff0050;
            border-radius: 50%;
            transition: transform 0.2s;
        }
        
        .progress-bar:hover .progress-fill::after {
            transform: translateY(-50%) scale(1);
        }
        
        /* Controls Row */
        .controls-row {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .control-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0.4rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .control-btn:hover {
            color: #ff0050;
            transform: scale(1.1);
        }
        
        .time-display {
            color: white;
            font-size: 0.85rem;
            font-family: monospace;
            margin: 0 0.5rem;
        }
        
        .spacer {
            flex: 1;
        }
        
        /* Big Play Button */
        .big-play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: rgba(255, 0, 80, 0.95);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            pointer-events: auto;
        }
        
        .big-play-button:hover {
            transform: translate(-50%, -50%) scale(1.1);
            background: rgba(255, 0, 80, 1);
        }
        
        .big-play-button.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .big-play-button i {
            font-size: 2rem;
            color: white;
            margin-left: 0.3rem;
        }
        
        /* Volume Slider */
        .volume-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .volume-slider {
            width: 0;
            overflow: hidden;
            transition: width 0.3s;
        }
        
        .volume-container:hover .volume-slider {
            width: 80px;
        }
        
        .volume-slider input[type="range"] {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
        }
        
        .volume-slider input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #ff0050;
            border-radius: 50%;
            cursor: pointer;
        }
        
        /* Speed Menu */
        .speed-menu {
            position: relative;
        }
        
        .speed-dropdown {
            position: absolute;
            bottom: 100%;
            right: 0;
            background: rgba(0,0,0,0.95);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 0.5rem 0;
            min-width: 100px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            margin-bottom: 0.5rem;
        }
        
        .speed-menu.active .speed-dropdown {
            opacity: 1;
            pointer-events: auto;
        }
        
        .speed-option {
            padding: 0.5rem 1rem;
            color: white;
            cursor: pointer;
            transition: background 0.2s;
            text-align: center;
        }
        
        .speed-option:hover {
            background: rgba(255, 0, 80, 0.3);
        }
        
        .speed-option.active {
            background: rgba(255, 0, 80, 0.5);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-darker text-white font-sans antialiased min-h-screen overflow-x-hidden">

    <!-- Toast Notifications -->
    <div id="toastContainer" class="fixed top-24 right-5 z-[9999] flex flex-col gap-3"></div>

    <!-- Header -->
    <header class="bg-dark border-b border-border sticky top-0 z-[1000] px-4 py-3 flex justify-between items-center">
        <div class="text-xl md:text-2xl font-bold bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">Xplitleaks</div>
        <a href="index.html" class="inline-flex items-center gap-2 px-3 md:px-4 py-2 bg-card border border-border rounded-lg text-xs md:text-sm hover:bg-primary hover:border-primary transition-all">
            <i class="fas fa-arrow-left"></i><span class="hidden sm:inline">Back to Home</span><span class="sm:hidden">Back</span>
        </a>
    </header>

    <!-- Main Content -->
    <main class="max-w-[1400px] mx-auto px-3 md:px-6 py-4 md:py-8">
        
        <!-- Loading State -->
        <div id="loadingState" class="text-center py-16 text-muted">
            <div class="w-12 h-12 border-4 border-white/10 border-t-primary rounded-full animate-spin mx-auto mb-4"></div>
            <p>Loading video...</p>
        </div>

        <!-- Error State -->
        <div id="errorState" class="hidden text-center py-16 bg-card border border-border rounded-xl animate-fade-in">
            <i class="fas fa-exclamation-triangle text-5xl md:text-6xl text-danger mb-4"></i>
            <h2 class="text-xl md:text-2xl font-bold mb-2">Video Not Found</h2>
            <p id="errorMessage" class="text-muted mb-6 px-4">The video you're looking for doesn't exist or has been removed.</p>
            <a href="index.html" class="inline-flex items-center gap-2 px-6 py-3 bg-card border border-border rounded-lg hover:bg-primary hover:border-primary transition-all">
                <i class="fas fa-home"></i><span>Back to Home</span>
            </a>
        </div>

        <!-- Video Content -->
        <div id="videoContent" class="hidden animate-fade-in">
            
            <div class="grid grid-cols-1 xl:grid-cols-4 gap-4 md:gap-6">
                
                <!-- Main Column -->
                <div class="xl:col-span-3 space-y-4 md:space-y-6">
                    
                    <!-- Custom HTML5 Video Player -->
                    <div class="video-player-wrapper paused" id="videoPlayerWrapper">
                        <video id="videoPlayer" preload="metadata" playsinline>
                            Your browser does not support the video tag.
                        </video>
                        
                        <!-- Big Play Button -->
                        <div class="big-play-button" id="bigPlayButton">
                            <i class="fas fa-play"></i>
                        </div>
                        
                        <!-- Custom Controls -->
                        <div class="video-controls">
                            <!-- Progress Bar -->
                            <div class="progress-bar" id="progressBar">
                                <div class="progress-fill" id="progressFill"></div>
                            </div>
                            
                            <!-- Controls Row -->
                            <div class="controls-row">
                                <!-- Play/Pause -->
                                <button class="control-btn" id="playPauseBtn" title="Play/Pause (Space)">
                                    <i class="fas fa-play"></i>
                                </button>
                                
                                <!-- Volume -->
                                <div class="volume-container">
                                    <button class="control-btn" id="muteBtn" title="Mute (M)">
                                        <i class="fas fa-volume-high"></i>
                                    </button>
                                    <div class="volume-slider">
                                        <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="1" title="Volume">
                                    </div>
                                </div>
                                
                                <!-- Time Display -->
                                <div class="time-display">
                                    <span id="currentTime">0:00</span> / <span id="duration">0:00</span>
                                </div>
                                
                                <div class="spacer"></div>
                                
                                <!-- Playback Speed -->
                                <div class="speed-menu" id="speedMenu">
                                    <button class="control-btn" id="speedBtn" title="Playback Speed">
                                        <span class="text-sm" id="speedText">1x</span>
                                    </button>
                                    <div class="speed-dropdown">
                                        <div class="speed-option" data-speed="0.5">0.5x</div>
                                        <div class="speed-option active" data-speed="1">1x</div>
                                        <div class="speed-option" data-speed="1.5">1.5x</div>
                                        <div class="speed-option" data-speed="2">2x</div>
                                    </div>
                                </div>
                                
                                <!-- Fullscreen -->
                                <button class="control-btn" id="fullscreenBtn" title="Fullscreen (F)">
                                    <i class="fas fa-expand"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Video Info -->
                    <div class="bg-card border border-border rounded-xl p-4 md:p-6">
                        <h1 id="videoTitle" class="text-lg md:text-2xl font-bold mb-3 leading-tight">Loading...</h1>
                        
                        <!-- Stats Row -->
                        <div class="flex flex-wrap items-center gap-3 md:gap-4 text-xs md:text-sm text-muted mb-4 pb-4 border-b border-border">
                            <span id="videoCategory" class="bg-primary/10 text-primary px-2 md:px-3 py-1 rounded-full text-xs font-semibold">Category</span>
                            <span class="flex items-center gap-1">
                                <i class="fas fa-eye text-primary"></i>
                                <span id="videoViews">0</span> views
                            </span>
                            <span class="flex items-center gap-1">
                                <i class="fas fa-clock text-primary"></i>
                                <span id="videoDuration">0:00</span>
                            </span>
                            <span class="flex items-center gap-1">
                                <i class="fas fa-calendar text-primary"></i>
                                <span id="videoDate">N/A</span>
                            </span>
                        </div>

                        <!-- Action Buttons -->
                        <div class="flex flex-wrap gap-2 md:gap-3 mb-4">
                            <button id="likeBtn" onclick="toggleLike()" 
                                    class="flex items-center gap-2 px-3 md:px-4 py-2 bg-dark border border-border rounded-lg hover:bg-primary/20 hover:border-primary transition-all text-xs md:text-sm flex-1 md:flex-none justify-center">
                                <i class="far fa-heart"></i>
                                <span>Like</span>
                                <span id="likeCount" class="text-muted">0</span>
                            </button>
                            <button onclick="shareVideo()" 
                                    class="flex items-center gap-2 px-3 md:px-4 py-2 bg-dark border border-border rounded-lg hover:bg-primary/20 hover:border-primary transition-all text-xs md:text-sm flex-1 md:flex-none justify-center">
                                <i class="fas fa-share"></i>
                                <span class="hidden sm:inline">Share</span>
                            </button>
                            <button onclick="copyLink()" 
                                    class="flex items-center gap-2 px-3 md:px-4 py-2 bg-dark border border-border rounded-lg hover:bg-primary/20 hover:border-primary transition-all text-xs md:text-sm flex-1 md:flex-none justify-center">
                                <i class="fas fa-link"></i>
                                <span class="hidden sm:inline">Copy</span>

                            <button onclick="openReportModal()" 
                                    class="ml-auto flex items-center gap-2 px-3 md:px-4 py-2 text-muted hover:text-danger transition-all text-xs md:text-sm">
                                <i class="fas fa-flag"></i>
                                <span class="hidden sm:inline">Report</span>
                            </button>

                        <!-- Tags -->
                        <div id="tagsContainer" class="flex flex-wrap gap-2 hidden"></div>

                        <!-- Description -->
                        <div id="videoDescription" class="mt-4 pt-4 border-t border-border text-muted text-sm md:text-base leading-relaxed hidden"></div>
                    </div>

                    <!-- Related Videos Grid -->
                    <section class="mb-6 md:mb-8">
                        <h2 class="text-lg md:text-xl font-bold mb-4 flex items-center gap-2">
                            <i class="fas fa-th-large text-primary"></i>
                            Related Videos

                        <div id="relatedVideosGrid" class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-3 md:gap-4"></div>

                </div>

                <!-- Sidebar Column -->
                <aside class="hidden xl:block xl:col-span-1 space-y-4 md:space-y-6">

                    Related Shorts
                </h2>
                <div class="relative">
                    <div id="shortsCarousel" class="flex gap-3 overflow-x-auto no-scrollbar scroll-smooth pb-2"></div>

    <!-- Report Modal -->
    <div id="reportModal" class="hidden fixed inset-0 bg-black/80 z-[2000] flex items-center justify-center p-4">
        <div class="bg-card border border-border rounded-xl p-6 max-w-[500px] w-full max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-lg md:text-xl font-bold flex items-center gap-2"><i class="fas fa-flag text-primary"></i>Report Video</h3>
                <button onclick="closeReportModal()" class="text-muted hover:text-danger transition-all text-2xl">&times;</button>
            </div>
            <form id="reportForm" onsubmit="submitReport(event)">
                <div class="mb-4 md:mb-5">

                    <select id="reportReason" required class="w-full px-3 py-2 md:py-3 bg-dark border border-border rounded-lg text-white focus:outline-none focus:border-primary text-sm">
                        <option value="">Select a reason</option>
                        <option value="inappropriate">Inappropriate Content</option>
                        <option value="copyright">Copyright Violation</option>
                        <option value="spam">Spam or Misleading</option>
                        <option value="quality">Poor Quality</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="mb-4 md:mb-5">
                    <label for="reportDetails" class="block mb-2 text-sm text-muted">Additional Details</label>
                    <textarea id="reportDetails" rows="4" placeholder="Please provide more details..." class="w-full px-3 py-2 md:py-3 bg-dark border border-border rounded-lg text-white focus:outline-none focus:border-primary resize-y text-sm"></textarea>
                </div>
                <button type="submit" class="w-full flex items-center justify-center gap-2 px-6 py-3 bg-danger border border-danger rounded-lg hover:bg-danger/90 transition-all text-sm md:text-base">
                    <i class="fas fa-paper-plane"></i>Submit Report
                </button>
            </form>
        </div>
    </div>

    <script>
        const CONFIG = {
            apiEndpoint: 'https://xplitleaks-api.dylancoral.workers.dev/api',
            sessionId: localStorage.getItem('sessionId') || generateSessionId()
        };
        localStorage.setItem('sessionId', CONFIG.sessionId);

        let currentVideo = null;
        let videoPlayer = null;
        let viewTracked = false;
        let isPlaying = false;

        document.addEventListener('DOMContentLoaded', () => {
            console.log('🚀 Page loaded, initializing custom player...');
            initCustomPlayer();
            loadVideo();
        });

        // Initialize Custom HTML5 Player
        function initCustomPlayer() {
            videoPlayer = document.getElementById('videoPlayer');
            const wrapper = document.getElementById('videoPlayerWrapper');
            const bigPlayBtn = document.getElementById('bigPlayButton');
            const playPauseBtn = document.getElementById('playPauseBtn');
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            const currentTimeEl = document.getElementById('currentTime');
            const durationEl = document.getElementById('duration');
            const muteBtn = document.getElementById('muteBtn');
            const volumeSlider = document.getElementById('volumeSlider');
            const speedBtn = document.getElementById('speedBtn');
            const speedText = document.getElementById('speedText');
            const speedMenu = document.getElementById('speedMenu');
            const speedOptions = document.querySelectorAll('.speed-option');
            const fullscreenBtn = document.getElementById('fullscreenBtn');

            // Big Play Button
            bigPlayBtn.addEventListener('click', () => {
                if (videoPlayer.paused) {
                    videoPlayer.play().catch(err => console.error('Play error:', err));
                } else {
                    videoPlayer.pause();
                }
            });

            // Play/Pause Button
            playPauseBtn.addEventListener('click', () => {
                if (videoPlayer.paused) {
                    videoPlayer.play().catch(err => console.error('Play error:', err));
                } else {
                    videoPlayer.pause();
                }
            });

            // Video click to toggle play/pause
            videoPlayer.addEventListener('click', (e) => {
                if (e.target.closest('.video-controls')) return;
                if (videoPlayer.paused) {
                    videoPlayer.play().catch(err => console.error('Play error:', err));
                } else {
                    videoPlayer.pause();
                }
            });

            // Update play button icon and state
            videoPlayer.addEventListener('play', () => {
                isPlaying = true;
                bigPlayBtn.classList.add('hidden');
                wrapper.classList.remove('paused');
                playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
            });

            videoPlayer.addEventListener('pause', () => {
                isPlaying = false;
                bigPlayBtn.classList.remove('hidden');
                bigPlayBtn.innerHTML = '<i class="fas fa-play"></i>';
                wrapper.classList.add('paused');
                playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
            });

            videoPlayer.addEventListener('ended', () => {
                isPlaying = false;
                bigPlayBtn.classList.remove('hidden');
                bigPlayBtn.innerHTML = '<i class="fas fa-redo"></i>';
                playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
                trackView(true);
            });

            // Progress Bar
            videoPlayer.addEventListener('timeupdate', () => {
                if (videoPlayer.duration) {
                    const progress = (videoPlayer.currentTime / videoPlayer.duration) * 100;
                    progressFill.style.width = progress + '%';
                    currentTimeEl.textContent = formatTime(videoPlayer.currentTime);
                    
                    if (!viewTracked) {
                        const progressRatio = videoPlayer.currentTime / videoPlayer.duration;
                        if (progressRatio >= 0.5) {
                            trackView(false);
                        }
                    }
                }
            });

            videoPlayer.addEventListener('loadedmetadata', () => {
                durationEl.textContent = formatTime(videoPlayer.duration);
            });

            // Click on progress bar to seek
            progressBar.addEventListener('click', (e) => {
                if (videoPlayer.duration) {
                    const rect = progressBar.getBoundingClientRect();
                    const pos = (e.clientX - rect.left) / rect.width;
                    videoPlayer.currentTime = pos * videoPlayer.duration;
                }
            });

            // Volume Control
            muteBtn.addEventListener('click', () => {
                videoPlayer.muted = !videoPlayer.muted;
                updateVolumeIcon();
            });

            volumeSlider.addEventListener('input', (e) => {
                videoPlayer.volume = parseFloat(e.target.value);
                videoPlayer.muted = false;
                updateVolumeIcon();
            });

            function updateVolumeIcon() {
                const icon = muteBtn.querySelector('i');
                if (videoPlayer.muted || videoPlayer.volume === 0) {
                    icon.className = 'fas fa-volume-xmark';
                } else if (videoPlayer.volume < 0.5) {
                    icon.className = 'fas fa-volume-low';
                } else {
                    icon.className = 'fas fa-volume-high';
                }
            }

            // Playback Speed
            speedBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                speedMenu.classList.toggle('active');
            });

            speedOptions.forEach(option => {
                option.addEventListener('click', () => {
                    const speed = parseFloat(option.dataset.speed);
                    videoPlayer.playbackRate = speed;
                    speedText.textContent = speed + 'x';
                    speedOptions.forEach(opt => opt.classList.remove('active'));
                    option.classList.add('active');
                    speedMenu.classList.remove('active');
                });
            });

            // Close speed menu when clicking outside
            document.addEventListener('click', (e) => {
                if (!speedMenu.contains(e.target)) {
                    speedMenu.classList.remove('active');
                }
            });

            // Fullscreen
            fullscreenBtn.addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    wrapper.requestFullscreen().catch(err => console.error('Fullscreen error:', err));
                    fullscreenBtn.innerHTML = '<i class="fas fa-compress"></i>';
                } else {
                    document.exitFullscreen();
                    fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i>';
                }
            });

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                
                switch(e.key.toLowerCase()) {
                    case ' ':
                    case 'k':
                        e.preventDefault();
                        if (videoPlayer.paused) {
                            videoPlayer.play().catch(err => console.error('Play error:', err));
                        } else {
                            videoPlayer.pause();
                        }
                        break;
                    case 'f':
                        if (!document.fullscreenElement) {
                            wrapper.requestFullscreen().catch(err => console.error('Fullscreen error:', err));
                            fullscreenBtn.innerHTML = '<i class="fas fa-compress"></i>';
                        } else {
                            document.exitFullscreen();
                            fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i>';
                        }
                        break;
                    case 'm':
                        videoPlayer.muted = !videoPlayer.muted;
                        updateVolumeIcon();
                        break;
                    case 'arrowleft':
                        videoPlayer.currentTime = Math.max(0, videoPlayer.currentTime - 5);
                        break;
                    case 'arrowright':
                        videoPlayer.currentTime = Math.min(videoPlayer.duration, videoPlayer.currentTime + 5);
                        break;
                }
            });

            // Set default volume
            videoPlayer.volume = 1;
        }

        function formatTime(seconds) {
            if (isNaN(seconds) || !isFinite(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function generateSessionId() {
            return 'sess_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
        }

        async function loadVideo() {
            const urlParams = new URLSearchParams(window.location.search);
            const videoId = urlParams.get('id');
            
            if (!videoId) {
                showError('Video ID is required');
                return;
            }
            
            try {
                const response = await fetch(`${CONFIG.apiEndpoint}/video/${videoId}`);
                
                if (!response.ok) {
                    throw new Error(`API returned ${response.status}`);
                }
                
                const data = await response.json();
                
                if (!data || !data.videoUrl) {
                    throw new Error('Video URL is missing from API response');
                }
                
                currentVideo = data;
                document.getElementById('pageTitle').textContent = `${data.title} - Xplitleaks`;
                
                // Set video source - using URL directly from API, no cleaning
                const source = document.createElement('source');
                source.src = data.videoUrl;
                source.type = 'video/mp4';
                videoPlayer.appendChild(source);
                
                // Set poster if available
                if (data.thumbnail) {
                    videoPlayer.setAttribute('poster', data.thumbnail);
                }
                
                // Load the video
                videoPlayer.load();
                
                updateVideoInfo(data);
                loadRelatedShorts(data);
                loadRelatedVideos(data);
                setTimeout(() => trackView(false), 10000);
                
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('errorState').classList.add('hidden');
                document.getElementById('videoContent').classList.remove('hidden');
                
            } catch (error) {
                console.error('Load video error:', error);
                showError('Failed to load video: ' + error.message);
            }
        }

        function updateVideoInfo(video) {
            document.getElementById('videoTitle').textContent = video.title;
            document.getElementById('videoCategory').textContent = video.category || 'Uncategorized';
            document.getElementById('videoViews').textContent = formatNumber(video.views || 0);
            document.getElementById('videoDuration').textContent = video.duration || '0:00';
            document.getElementById('videoDate').textContent = video.uploadDate || 'N/A';
            
            const descEl = document.getElementById('videoDescription');
            if (video.description) {
                descEl.textContent = video.description;
                descEl.classList.remove('hidden');
            }
            
            document.getElementById('likeCount').textContent = formatNumber(video.likes || 0);
            
            const videoId = video.numericId || video.id;
            const likeBtn = document.getElementById('likeBtn');
            if (isLiked(videoId)) {
                likeBtn.classList.add('bg-primary', 'border-primary');
                likeBtn.querySelector('i').className = 'fas fa-heart';
            }
            
            const tags = JSON.parse(video.tags || '[]');
            const tagsContainer = document.getElementById('tagsContainer');
            if (tags.length > 0) {
                tagsContainer.innerHTML = tags.map(tag =>
                    `<a href="index.html?tag=${encodeURIComponent(tag)}" class="bg-dark border border-border text-muted px-2 md:px-3 py-1 rounded-full text-xs hover:border-primary hover:text-primary transition-all">#${tag}</a>`
                ).join('');
                tagsContainer.classList.remove('hidden');
            }
        }

        async function toggleLike() {
            if (!currentVideo) return;
            const btn = document.getElementById('likeBtn');
            const icon = btn.querySelector('i');
            const countEl = document.getElementById('likeCount');
            const wasLiked = btn.classList.contains('bg-primary');
            const videoId = currentVideo.numericId || currentVideo.id;
            
            try {
                const response = await fetch(`${CONFIG.apiEndpoint}/short/like`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Session-Id': CONFIG.sessionId },
                    body: JSON.stringify({ shortId: videoId })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.action === 'liked') {
                        btn.classList.add('bg-primary', 'border-primary');
                        icon.className = 'fas fa-heart';
                        currentVideo.likes = (currentVideo.likes || 0) + 1;
                        markAsLiked(videoId);
                        showToast('Liked! ❤️', 'success');
                    } else {
                        btn.classList.remove('bg-primary', 'border-primary');
                        icon.className = 'far fa-heart';
                        currentVideo.likes = Math.max((currentVideo.likes || 0) - 1, 0);
                        markAsUnliked(videoId);
                    }
                    countEl.textContent = formatNumber(currentVideo.likes);
                }
            } catch (error) {
                console.error('Like error:', error);
                showToast('Failed to update like', 'error');
            }
        }

        async function trackView(isComplete) {
            if (viewTracked || !currentVideo) return;
            try {
                const videoId = currentVideo.numericId || currentVideo.id;
                const watchDuration = isComplete ? 1 : (videoPlayer?.currentTime / videoPlayer?.duration) || 0.5;
                const watchTime = videoPlayer?.currentTime || 0;
                
                await fetch(`${CONFIG.apiEndpoint}/short/view`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Session-Id': CONFIG.sessionId },
                    body: JSON.stringify({ shortId: videoId, watchDuration, watchTime })
                });
                
                viewTracked = true;
            } catch (error) {
                console.error('Track view error:', error);
            }
        }

        async function shareVideo() {
            const btn = document.getElementById('shareBtn');
            const videoId = currentVideo.numericId || currentVideo.id;
            
            try {
                await fetch(`${CONFIG.apiEndpoint}/short/share`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Session-Id': CONFIG.sessionId },
                    body: JSON.stringify({ shortId: videoId })
                });
                
                btn.classList.add('bg-success', 'border-success');
                showToast('Share counted! ↗️', 'success');
                setTimeout(() => btn.classList.remove('bg-success', 'border-success'), 500);
                
                if (navigator.share) {
                    navigator.share({ title: currentVideo.title, url: window.location.href }).catch(() => {});
                } else {
                    copyLink();
                }
            } catch (error) {
                copyLink();
            }
        }

        function copyLink() {
            navigator.clipboard.writeText(window.location.href)
                .then(() => showToast('Link copied! 📋', 'success'))
                .catch(() => showToast('Failed to copy link', 'error'));
        }

        function isLiked(videoId) {
            const liked = localStorage.getItem('likedVideos');
            return liked ? JSON.parse(liked).includes(videoId) : false;
        }

        function markAsLiked(videoId) {
            const liked = JSON.parse(localStorage.getItem('likedVideos') || '[]');
            if (!liked.includes(videoId)) {
                liked.push(videoId);
                localStorage.setItem('likedVideos', JSON.stringify(liked));
            }
        }

        function markAsUnliked(videoId) {
            const liked = JSON.parse(localStorage.getItem('likedVideos') || '[]');
            const index = liked.indexOf(videoId);
            if (index > -1) {
                liked.splice(index, 1);
                localStorage.setItem('likedVideos', JSON.stringify(liked));
            }
        }

        async function loadRelatedShorts(video) {
            const carousel = document.getElementById('shortsCarousel');
            const sidebar = document.getElementById('shortsSidebar');
            
            try {
                const response = await fetch(`${CONFIG.apiEndpoint}/shorts?limit=10`);
                let shorts = await response.json();
                
                if (shorts && shorts.length > 0) {
                    const category = video.category;
                    let related = shorts.filter(s => s.category === category);
                    if (related.length < 10) {
                        const remaining = shorts.filter(s => s.category !== category);
                        related = [...related, ...remaining].slice(0, 10);
                    }
                    
                    if (carousel) {
                        carousel.innerHTML = related.slice(0, 8).map(short => createShortCardCompact(short)).join('');
                    }
                    
                    if (sidebar) {
                        sidebar.innerHTML = related.slice(0, 6).map(short => createShortSidebarItem(short)).join('');
                    }
                }
            } catch (error) {
                console.error('Load shorts error:', error);
            }
        }

        function createShortCardCompact(short) {
            return `<a href="shorts.html?id=${short.numericId}" class="flex-none w-[120px] md:w-[140px] bg-card border border-border rounded-lg overflow-hidden hover:border-primary transition-all group">
                <div class="relative aspect-[9/16]">
                    <img src="${short.thumbnail || ''}" alt="${short.title}" class="w-full h-full object-cover"
                        onerror="this.onerror=null; this.src='image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22120%22 height=%22200%22><rect fill=%22%23333%22 width=%22120%22 height=%22200%22/><text fill=%22%23888%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22>No Thumb</text></svg>';">
                    <span class="absolute bottom-1 right-1 bg-black/80 text-white px-1 py-0.5 rounded text-xs">${short.duration || '0:00'}</span>
                </div>
                <div class="p-2">
                    <h4 class="text-xs font-semibold line-clamp-2 group-hover:text-primary">${short.title}</h4>
                    <div class="flex items-center gap-1 text-xs text-muted mt-1">
                        <span><i class="fas fa-eye text-[10px]"></i> ${formatNumber(short.views || 0)}</span>
                    </div>
                </div>
            </a>`;
        }

        function createShortSidebarItem(short) {
            return `<a href="shorts.html?id=${short.numericId}" class="flex gap-3 group">
                <div class="relative w-20 h-28 flex-shrink-0 rounded-lg overflow-hidden">
                    <img src="${short.thumbnail || ''}" alt="${short.title}" class="w-full h-full object-cover"
                        onerror="this.onerror=null; this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22150%22><rect fill=%22%23333%22 width=%22100%22 height=%22150%22/><text fill=%22%23888%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22>No Thumb</text></svg>';">
                    <span class="absolute bottom-1 right-1 bg-black/80 text-white px-1 py-0.5 rounded text-xs">${short.duration || '0:00'}</span>
                </div>
                <div class="flex-1 min-w-0">
                    <h4 class="text-sm font-semibold line-clamp-2 group-hover:text-primary transition-colors">${short.title}</h4>
                    <div class="flex items-center gap-2 text-xs text-muted mt-1">
                        <span><i class="fas fa-eye"></i> ${formatNumber(short.views || 0)}</span>
                    </div>
                </div>
            </a>`;
        }

        async function loadRelatedVideos(video) {
            const container = document.getElementById('relatedVideosGrid');
            
            try {
                const response = await fetch(`${CONFIG.apiEndpoint}/videos?limit=12`);
                const videos = await response.json();
                
                if (videos && videos.length > 0) {
                    const currentId = currentVideo.numericId || currentVideo.id;
                    const filtered = videos.filter(v => (v.numericId || v.id) !== currentId).slice(0, 12);
                    container.innerHTML = filtered.map(v => createVideoCardResponsive(v)).join('');
                }
            } catch (error) {
                console.error('Load recommendations error:', error);
            }
        }

        function createVideoCardResponsive(video) {
            return `<a href="video.html?id=${video.numericId || video.id}" class="group block">
                <div class="relative aspect-video rounded-lg overflow-hidden mb-2 bg-dark">
                    <img src="${video.thumbnail || ''}" alt="${video.title}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
                        onerror="this.onerror=null; this.src='image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22280%22 height=%22180%22><rect fill=%22%23333%22 width=%22280%22 height=%22180%22/><text fill=%22%23888%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22>No Thumbnail</text></svg>';">
                    <span class="absolute bottom-2 right-2 bg-black/80 text-white px-1.5 py-0.5 rounded text-xs font-semibold">${video.duration || '0:00'}</span>
                </div>
                <h3 class="text-sm font-semibold line-clamp-2 group-hover:text-primary transition-colors leading-tight">${video.title}</h3>
                <div class="flex items-center gap-2 text-xs text-muted mt-1">
                    <span><i class="fas fa-eye"></i> ${formatNumber(video.views || 0)}</span>
                    <span>•</span>
                    <span>${video.uploadDate || 'N/A'}</span>
                </div>
            </a>`;
        }

        function openReportModal() {
            document.getElementById('reportModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeReportModal() {
            document.getElementById('reportModal').classList.add('hidden');
            document.getElementById('reportForm').reset();
            document.body.style.overflow = '';
        }

        async function submitReport(event) {
            event.preventDefault();
            const reason = document.getElementById('reportReason').value;
            const details = document.getElementById('reportDetails').value;
            const videoId = currentVideo.numericId || currentVideo.id;
            
            try {
                await fetch(`${CONFIG.apiEndpoint}/report`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Session-Id': CONFIG.sessionId },
                    body: JSON.stringify({ videoId, videoType: 'video', reason: reason + (details ? ': ' + details : '') })
                });
                showToast('Report submitted successfully', 'success');
                closeReportModal();
            } catch (error) {
                showToast('Failed to submit report', 'error');
            }
        }

        function showError(message) {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('errorState').classList.remove('hidden');
            document.getElementById('errorMessage').textContent = message;
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const colors = { success: 'border-success', error: 'border-danger', info: 'border-primary' };
            const icons = { success: 'fa-check-circle text-success', error: 'fa-exclamation-circle text-danger', info: 'fa-info-circle text-primary' };
            
            toast.className = `bg-card border-l-4 ${colors[type]} border border-border rounded-lg shadow-lg p-4 flex items-center gap-3 min-w-[280px]`;
            toast.innerHTML = `<i class="fas ${icons[type]} text-xl"></i><span class="flex-1 text-sm">${message}</span><button onclick="this.parentElement.remove()" class="text-muted hover:text-white"><i class="fas fa-times"></i></button>`;
            
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        document.getElementById('reportModal')?.addEventListener('click', (e) => {
            if (e.target.id === 'reportModal') closeReportModal();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeReportModal();
        });
    </script>
</body>
</html>
