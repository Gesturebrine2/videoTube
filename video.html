<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xplitleaks</title>
    <meta name="description" content="Watch exclusive content on Xplitleaks">
    
    <meta property="og:type" content="video.other">
    <meta property="og:url" content="https://xplitleaks.qzz.io/video.html">
    <meta property="og:title" content="Xplitleaks">
    <meta property="og:description" content="Watch exclusive content">
    <meta property="og:image" content="">
    <meta property="og:site_name" content="Xplitleaks">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Xplitleaks">
    <meta name="twitter:description" content="Watch exclusive content">
    <meta name="twitter:image" content="">
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=GA_MEASUREMENT_ID"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'GA_MEASUREMENT_ID', {
            'send_page_view': true,
            'anonymize_ip': true
        });
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
        }

        .header {
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #1a1a24;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 15, 0.9);
        }

        .back-btn {
            color: #888;
            text-decoration: none;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.2s;
        }

        .back-btn:hover {
            color: #fff;
        }

        .logo {
            font-weight: 700;
            font-size: 1.25rem;
            background: linear-gradient(135deg, #00b3ff 0%, #0088ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .share-btn {
            background: rgba(0, 179, 255, 0.1);
            color: #00b3ff;
            border: 1px solid rgba(0, 179, 255, 0.3);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .share-btn:hover {
            background: rgba(0, 179, 255, 0.2);
            border-color: rgba(0, 179, 255, 0.5);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        .player-wrapper {
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 1.5rem;
            position: relative;
            aspect-ratio: 16 / 9;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
        }

        .plyr {
            --plyr-color-main: #00b3ff;
            --plyr-video-background: #000;
            --plyr-control-radius: 8px;
            --plyr-control-spacing: 10px;
            --plyr-video-control-background-hover: rgba(0, 179, 255, 0.2);
            --plyr-range-fill-background: #00b3ff;
            --plyr-range-thumb-background: #00b3ff;
            --plyr-range-thumb-shadow: 0 0 10px rgba(0, 179, 255, 0.5);
            --plyr-tooltip-background: rgba(0, 0, 0, 0.9);
            --plyr-tooltip-color: #fff;
            --plyr-font-size-time: 13px;
            --plyr-font-size-menu: 14px;
            height: 100%;
            border-radius: 16px;
        }

        .plyr__control--overlaid {
            background: rgba(0, 179, 255, 0.9);
            padding: 20px;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(0, 179, 255, 0.5);
            transition: all 0.3s ease;
        }

        .plyr__control--overlaid:hover {
            background: #00b3ff;
            transform: scale(1.1);
            box-shadow: 0 0 40px rgba(0, 179, 255, 0.7);
        }

        .plyr__control--overlaid svg {
            width: 24px;
            height: 24px;
            left: 2px;
            position: relative;
        }

        .plyr--video .plyr__controls {
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.8));
            padding: 20px;
            padding-top: 60px;
        }

        .plyr__menu__container {
            background: rgba(20, 20, 30, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .video-info {
            padding: 1.5rem;
            background: linear-gradient(135deg, rgba(20, 20, 30, 0.8) 0%, rgba(10, 10, 15, 0.8) 100%);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 2rem;
        }

        .video-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            line-height: 1.3;
            background: linear-gradient(135deg, #fff 0%, #a0a0a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .video-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            color: #888;
            font-size: 0.875rem;
            flex-wrap: wrap;
        }

        .video-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.375rem 0.875rem;
            background: rgba(0, 179, 255, 0.15);
            border: 1px solid rgba(0, 179, 255, 0.3);
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #00b3ff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .video-stats {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* RELATED VIDEOS - FORCE VISIBLE */
        .related {
            margin-top: 2rem;
            display: block !important; /* Force show */
            visibility: visible !important;
            opacity: 1 !important;
        }

        .related-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .related h2 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #fff;
        }

        .related-subtitle {
            color: #666;
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }

        .related-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        @media (max-width: 640px) {
            .related-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            
            .video-title {
                font-size: 1.125rem;
            }
        }

        .related-card {
            text-decoration: none;
            color: inherit;
            background: rgba(20, 20, 30, 0.5);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: block; /* Ensure visible */
        }

        .related-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            border-color: rgba(0, 179, 255, 0.3);
        }

        .related-thumb {
            aspect-ratio: 16 / 9;
            background: #1a1a24;
            overflow: hidden;
            position: relative;
        }

        .related-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s ease;
        }

        .related-card:hover .related-thumb img {
            transform: scale(1.05);
        }

        .related-type {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(0, 179, 255, 0.9);
            color: #000;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.625rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .related-duration {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .related-info {
            padding: 1rem;
        }

        .related-title {
            font-size: 0.9375rem;
            font-weight: 500;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            color: #fff;
            margin-bottom: 0.5rem;
        }

        .related-meta {
            font-size: 0.8125rem;
            color: #666;
        }

        /* Loading & Error */
        .loading {
            text-align: center;
            padding: 4rem;
            color: #666;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 179, 255, 0.2);
            border-top-color: #00b3ff;
            border-radius: 50%;
            margin: 0 auto 1rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            text-align: center;
            padding: 4rem;
            color: #888;
        }

        .error a {
            color: #00b3ff;
            text-decoration: none;
            font-weight: 500;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(20, 20, 30, 0.95);
            color: #fff;
            padding: 1rem 2rem;
            border-radius: 12px;
            border: 1px solid rgba(0, 179, 255, 0.3);
            backdrop-filter: blur(10px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            pointer-events: none;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 500;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast-icon {
            color: #00b3ff;
        }

        /* Debug info */
        .debug-info {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid red;
            color: red;
            padding: 1rem;
            margin: 1rem 0;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html" class="back-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Back
        </a>
        <span class="logo">Xplitleaks</span>
        <button class="share-btn" onclick="shareVideo()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: inline-block; vertical-align: middle; margin-right: 4px;">
                <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
                <polyline points="16 6 12 2 8 6"/>
                <line x1="12" y1="2" x2="12" y2="15"/>
            </svg>
            Share
        </button>
    </header>

    <main class="container">
        <div id="loading" class="loading">
            <div class="loading-spinner"></div>
            <p>Loading video...</p>
        </div>
        
        <div id="error" class="error" style="display: none;">
            <p>Video not found</p>
            <a href="index.html">Back to home</a>
        </div>

        <div id="content" style="display: none;">
            <div class="player-wrapper" id="playerContainer"></div>

            <div class="video-info">
                <h1 class="video-title" id="videoTitle">...</h1>
                <div class="video-meta">
                    <span class="video-badge">HD</span>
                    <span class="video-stats">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <polyline points="12 6 12 12 16 14"/>
                        </svg>
                        <span id="videoDuration">--:--</span>
                    </span>
                    <span>•</span>
                    <span id="videoDate">--</span>
                </div>
            </div>

            <!-- RELATED SECTION - ALWAYS IN DOM -->
            <div class="related" id="relatedSection">
                <div class="related-header">
                    <div>
                        <h2 id="relatedTitle">More Videos</h2>
                        <div class="related-subtitle" id="relatedSubtitle">Loading recommendations...</div>
                    </div>
                </div>
                <div class="related-grid" id="relatedGrid">
                    <!-- Content injected here -->
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="toast">
        <svg class="toast-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 6L9 17l-5-5"/>
        </svg>
        <span>Link copied to clipboard!</span>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    
    <script>
        const GA_MEASUREMENT_ID = 'G-XXXXXXXXXX';
        
        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('id');
        let player = null;
        let currentVideo = null;
        let allVideos = [];
        let watchTime = 0;
        let watchInterval = null;

        console.log('🔍 Video ID from URL:', videoId);

        document.addEventListener('DOMContentLoaded', () => {
            console.log('📄 DOM loaded');
            
            const gaScript = document.querySelector('script[src*="googletagmanager"]');
            if (gaScript) {
                gaScript.src = `https://www.googletagmanager.com/gtag/js?id=${GA_MEASUREMENT_ID}`;
            }
            gtag('config', GA_MEASUREMENT_ID);
            
            if (!videoId) {
                console.error('❌ No video ID provided');
                showError();
                return;
            }
            
            // Force show related section initially
            const relatedSection = document.getElementById('relatedSection');
            if (relatedSection) {
                relatedSection.style.display = 'block';
                console.log('✅ Related section found and shown');
            } else {
                console.error('❌ Related section not found in DOM');
            }
            
            loadVideo();
        });

        async function loadVideo() {
            console.log('🚀 Loading video...');
            
            try {
                console.log('📡 Fetching videos.json...');
                const response = await fetch('./videos.json?v=' + Date.now());
                console.log('📡 Response status:', response.status);
                
                allVideos = await response.json();
                console.log('📊 Total videos loaded:', allVideos.length);
                console.log('📊 First few videos:', allVideos.slice(0, 3).map(v => ({id: v.id, numericId: v.numericId, title: v.title.substring(0, 30)})));

                // Try to find video by numericId first, then by id
                currentVideo = allVideos.find(v => v.numericId === videoId) || 
                              allVideos.find(v => v.id === videoId);
                
                console.log('🎯 Current video found:', currentVideo ? 'YES' : 'NO');
                if (currentVideo) {
                    console.log('🎯 Video details:', {
                        id: currentVideo.id,
                        numericId: currentVideo.numericId,
                        title: currentVideo.title
                    });
                }

                if (!currentVideo) {
                    console.error('❌ Video not found in library');
                    showError();
                    return;
                }

                renderVideo();
                initPremiumPlayer();
                
                console.log('🎨 Rendering recommendations...');
                renderRecommendations();
                
                trackVideoAnalytics();

                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                console.log('✅ Content shown');

            } catch (err) {
                console.error('❌ Error in loadVideo:', err);
                showError();
            }
        }

        function renderVideo() {
            console.log('📝 Rendering video info...');
            document.getElementById('videoTitle').textContent = currentVideo.title;
            document.getElementById('videoDuration').textContent = currentVideo.duration || '--:--';
            document.getElementById('videoDate').textContent = formatDate(currentVideo.uploadDate);
            document.title = currentVideo.title + ' - Xplitleaks';
            
            document.querySelector('meta[property="og:title"]').content = currentVideo.title;
            document.querySelector('meta[property="og:description"]').content = 'Watch ' + currentVideo.title;
            document.querySelector('meta[property="og:image"]').content = currentVideo.thumbnail || '';
        }

        function initPremiumPlayer() {
            console.log('🎬 Initializing player...');
            const container = document.getElementById('playerContainer');
            const videoUrl = currentVideo.videoUrl;
            
            container.innerHTML = `
                <video id="plyrPlayer" playsinline controls poster="${currentVideo.thumbnail || ''}">
                    <source src="${videoUrl}" type="video/mp4" />
                </video>
            `;
            
            player = new Plyr('#plyrPlayer', {
                title: currentVideo.title,
                controls: [
                    'play-large', 'play', 'progress', 'current-time',
                    'duration', 'mute', 'volume', 'captions',
                    'settings', 'pip', 'airplay', 'fullscreen'
                ],
                settings: ['captions', 'quality', 'speed', 'loop'],
                keyboard: { focused: true, global: true },
                tooltips: { controls: true, seek: true },
                ratio: '16:9'
            });

            player.on('play', () => {
                gtag('event', 'video_play', {
                    'event_category': 'engagement',
                    'event_label': currentVideo.id
                });
                startWatchTimeTracking();
            });
        }

        function renderRecommendations() {
            console.log('🔥 renderRecommendations() called');
            console.log('📊 allVideos length:', allVideos.length);
            
            const relatedSection = document.getElementById('relatedSection');
            const relatedGrid = document.getElementById('relatedGrid');
            const relatedTitle = document.getElementById('relatedTitle');
            const relatedSubtitle = document.getElementById('relatedSubtitle');
            
            if (!relatedSection || !relatedGrid) {
                console.error('❌ Related elements not found:', {relatedSection, relatedGrid});
                return;
            }
            
            // Filter out current video
            const candidates = allVideos.filter(v => {
                const isDifferent = v.id !== currentVideo.id && v.numericId !== currentVideo.numericId;
                return isDifferent;
            });
            
            console.log('🎯 Candidates after filtering:', candidates.length);
            
            if (candidates.length === 0) {
                console.log('⚠️ No other videos found');
                relatedTitle.textContent = 'No Recommendations';
                relatedSubtitle.textContent = 'Add more videos to see recommendations';
                relatedGrid.innerHTML = '<p style="color: #666; padding: 2rem;">No other videos available</p>';
                relatedSection.style.display = 'block';
                return;
            }
            
            // Simple shuffle for variety
            const shuffled = candidates.sort(() => 0.5 - Math.random());
            const related = shuffled.slice(0, 6);
            
            console.log('🎨 Rendering', related.length, 'related videos');
            
            relatedTitle.textContent = 'Recommended for You';
            relatedSubtitle.textContent = 'More videos you might enjoy';
            
            relatedGrid.innerHTML = related.map((v, index) => {
                const vidId = v.numericId || v.id;
                console.log(`🎨 Rendering card ${index + 1}:`, vidId);
                
                return `
                    <a href="video.html?id=${encodeURIComponent(vidId)}" class="related-card">
                        <div class="related-thumb">
                            <img src="${v.thumbnail || ''}" 
                                 alt="${escapeHtml(v.title)}" 
                                 loading="lazy" 
                                 onerror="this.style.display='none'"
                                 onload="console.log('✅ Image loaded for ${vidId}')">
                            <span class="related-type">HD</span>
                            ${v.duration ? `<span class="related-duration">${v.duration}</span>` : ''}
                        </div>
                        <div class="related-info">
                            <div class="related-title">${escapeHtml(v.title)}</div>
                            <div class="related-meta">${formatDate(v.uploadDate)}</div>
                        </div>
                    </a>
                `;
            }).join('');
            
            // Force show
            relatedSection.style.display = 'block';
            relatedSection.style.visibility = 'visible';
            relatedSection.style.opacity = '1';
            
            console.log('✅ Recommendations rendered and shown');
        }

        function startWatchTimeTracking() {
            watchInterval = setInterval(() => { watchTime += 1; }, 1000);
        }

        function trackVideoAnalytics() {
            gtag('event', 'page_view', {
                'page_title': currentVideo.title,
                'page_location': window.location.href
            });
        }

        function shareVideo() {
            if (!currentVideo) return;
            navigator.clipboard.writeText(window.location.href).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);
            });
        }

        function showError() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            const now = new Date();
            const days = Math.floor((now - date) / (1000 * 60 * 60 * 24));
            
            if (days === 0) return 'Today';
            if (days === 1) return 'Yesterday';
            if (days < 7) return days + ' days ago';
            if (days < 30) return Math.floor(days/7) + ' weeks ago';
            return Math.floor(days/30) + ' months ago';
        }
    </script>
</body>
</html>
