<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xplitleaks - Video Player</title>
    
    <!-- Fluid Player CSS -->
    <link rel="stylesheet" href="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.css" type="text/css"/>
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-sec: #aaaaaa;
            --accent: #ff0050; /* TikTok/Shorts red */
            --btn-hover: #333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 50px;
        }

        /* Header */
        header {
            padding: 15px 20px;
            background: var(--card-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--text-main);
        }
        .logo span { color: var(--accent); }

        .back-btn {
            background: transparent;
            border: 1px solid var(--text-sec);
            color: var(--text-main);
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.9rem;
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        /* Left Column (Player & Info) */
        .main-content {
            flex: 3;
            min-width: 300px;
        }

        /* Right Column (Sidebar for Desktop) */
        .sidebar-content {
            flex: 1;
            min-width: 300px;
        }

        /* Video Player Wrapper */
        .video-wrapper {
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 15px;
            aspect-ratio: 16/9;
        }

        /* Video Info */
        .video-info h1 {
            font-size: 1.4rem;
            margin-bottom: 10px;
        }

        .meta-tags {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .tag {
            background: #333;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            color: var(--text-sec);
        }
        .tag.red { color: var(--accent); background: rgba(255, 0, 80, 0.1); }

        .stats {
            color: var(--text-sec);
            font-size: 0.9rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Action Buttons */
        .action-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            overflow-x: auto; /* Allow scroll on very small screens */
            padding-bottom: 5px;
        }

        .action-btn {
            background: var(--card-bg);
            border: none;
            color: var(--text-main);
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .action-btn:hover {
            background: var(--btn-hover);
        }

        .action-btn i {
            font-size: 1.1rem;
        }

        .action-btn.like:hover { color: #2ba640; }
        .action-btn.dislike:hover { color: #ff4e45; }
        .action-btn.report:hover { color: var(--accent); }

        /* Sections (Shorts & Related) */
        .section-title {
            font-size: 1.2rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title i { color: var(--accent); }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .video-card {
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            text-decoration: none;
            color: white;
            display: block;
        }

        .thumbnail {
            width: 100%;
            aspect-ratio: 9/16; /* Shorts aspect ratio */
            background: #333;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
        }
        
        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .duration {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: rgba(0,0,0,0.8);
            padding: 2px 5px;
            border-radius: 4px;
            font-size: 0.7rem;
        }

        .card-info {
            padding: 10px;
        }
        .card-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-meta {
            font-size: 0.8rem;
            color: var(--text-sec);
        }

        /* Related Videos (Standard 16:9) */
        .related-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }
        .related-card .thumbnail {
            aspect-ratio: 16/9;
        }

        /* Report Modal */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0;
            top: 0;
            width: 100%; 
            height: 100%; 
            background-color: rgba(0,0,0,0.8); 
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-sec);
        }

        .modal h3 { margin-bottom: 15px; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: var(--text-sec); }
        .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            background: #333;
            border: 1px solid #444;
            color: white;
            border-radius: 6px;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-cancel { background: transparent; border: 1px solid #555; color: white; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .btn-submit { background: var(--accent); border: none; color: white; padding: 8px 16px; border-radius: 6px; cursor: pointer; }

        /* MOBILE RESPONSIVENESS */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                padding: 10px;
            }

            .main-content, .sidebar-content {
                width: 100%;
                flex: auto;
            }

            /* Reordering for Mobile: Shorts First, Then Related Videos */
            .sidebar-content {
                order: -1; /* Moves this whole column to the top on mobile */
                margin-bottom: 20px;
            }
            
            /* Hide the desktop "Related Videos" header on mobile if you want Shorts to be the primary focus, 
               or keep it. Here we keep the structure but ensure flow is correct. */
            
            .video-grid {
                /* Horizontal Scroll for Shorts on Mobile looks more app-like */
                display: flex;
                overflow-x: auto;
                gap: 10px;
                padding-bottom: 10px;
            }
            
            .video-card {
                min-width: 140px;
                max-width: 140px;
            }

            .action-bar {
                justify-content: space-between;
            }
            
            .action-btn {
                flex: 1;
                justify-content: center;
                padding: 12px;
            }
            
            .action-btn span {
                display: none; /* Hide text on very small screens, show only icons */
            }
            
            .action-btn.like span, .action-btn.dislike span {
                display: inline; /* Keep text for like/dislike */
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Xplit<span>leaks</span></div>
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
    </header>

    <div class="container">
        
        <!-- Main Content: Player & Info -->
        <div class="main-content">
            <div class="video-wrapper">
                <!-- Fluid Player Container -->
                <video id="my-video">
                    <source src="https://cdn.fluidplayer.com/v3/examples/landing_page.mp4" type="video/mp4"/>
                    Your browser does not support the video tag.
                </video>
            </div>

            <div class="video-info">
                <h1>dork</h1>
                
                <div class="meta-tags">
                    <span class="tag red">teen</span>
                    <span class="tag">HD</span>
                </div>

                <div class="stats">
                    <span><i class="fas fa-eye"></i> 0 views</span>
                    <span>•</span>
                    <span><i class="far fa-clock"></i> 1 week ago</span>
                    <span>•</span>
                    <span>0:10</span>
                </div>

                <div class="action-bar">
                    <button class="action-btn like">
                        <i class="fas fa-thumbs-up"></i> <span>0</span>
                    </button>
                    <button class="action-btn dislike">
                        <i class="fas fa-thumbs-down"></i> <span>0</span>
                    </button>
                    <button class="action-btn" onclick="copyLink()">
                        <i class="fas fa-link"></i> <span>Copy</span>
                    </button>
                    <button class="action-btn" onclick="shareVideo()">
                        <i class="fas fa-share-alt"></i> <span>Share</span>
                    </button>
                    <button class="action-btn report" onclick="openModal()">
                        <i class="fas fa-flag"></i> <span>Report</span>
                    </button>
                </div>
            </div>

            <!-- Related Videos Section (Appears AFTER Shorts on Mobile due to CSS Order) -->
            <div class="related-section">
                <h2 class="section-title"><i class="fas fa-play-circle"></i> Related Videos</h2>
                <div class="video-grid related-grid">
                    <!-- Example Related Video -->
                    <a href="#" class="video-card related-card">
                        <div class="thumbnail">
                            <img src="https://via.placeholder.com/300x169/333/fff?text=Video+Thumb" alt="Thumb">
                            <span class="duration">4:20</span>
                        </div>
                        <div class="card-info">
                            <div class="card-title">Another Video Title Here</div>
                            <div class="card-meta">10K views • 2 days ago</div>
                        </div>
                    </a>
                    <a href="#" class="video-card related-card">
                        <div class="thumbnail">
                            <img src="https://via.placeholder.com/300x169/333/fff?text=Video+2" alt="Thumb">
                            <span class="duration">12:05</span>
                        </div>
                        <div class="card-info">
                            <div class="card-title">Cool Content 2024</div>
                            <div class="card-meta">5K views • 5 hours ago</div>
                        </div>
                    </a>
                </div>
            </div>
        </div>

        <!-- Sidebar Content: Shorts (Appears BEFORE Related Videos on Mobile) -->
        <div class="sidebar-content">
            <h2 class="section-title"><i class="fas fa-mobile-alt"></i> Related Shorts</h2>
            <div class="video-grid">
                <!-- Short 1 -->
                <a href="#" class="video-card">
                    <div class="thumbnail">
                        <img src="https://via.placeholder.com/150x266/222/fff?text=Short+1" alt="Short">
                        <span class="duration">0:16</span>
                    </div>
                    <div class="card-info">
                        <div class="card-title">toke</div>
                        <div class="card-meta">0 views</div>
                    </div>
                </a>
                <!-- Short 2 -->
                <a href="#" class="video-card">
                    <div class="thumbnail">
                        <div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:#333; color:#666;">No Thumb</div>
                        <span class="duration">0:21</span>
                    </div>
                    <div class="card-info">
                        <div class="card-title">Sliding in</div>
                        <div class="card-meta">0 views</div>
                    </div>
                </a>
                <!-- Short 3 -->
                <a href="#" class="video-card">
                    <div class="thumbnail">
                        <div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:#333; color:#666;">No Thumb</div>
                        <span class="duration">0:21</span>
                    </div>
                    <div class="card-info">
                        <div class="card-title">Sliding in</div>
                        <div class="card-meta">0 views</div>
                    </div>
                </a>
            </div>
        </div>

    </div>

    <!-- Report Modal -->
    <div id="reportModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h3>Report Video</h3>
            <form onsubmit="event.preventDefault(); alert('Report Submitted'); closeModal();">
                <div class="form-group">
                    <label>Reason for reporting *</label>
                    <select required>
                        <option value="" disabled selected>Select a reason...</option>
                        <option value="inappropriate">Inappropriate Content</option>
                        <option value="copyright">Copyright Violation</option>
                        <option value="spam">Spam or Misleading</option>
                        <option value="quality">Poor Quality</option>
                        <option value="underage">Underage Content</option>
                        <option value="violence">Violence or Harmful Content</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Additional Details (Optional)</label>
                    <textarea rows="3" placeholder="Describe the issue..."></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-submit">Submit Report</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Fluid Player Script -->
    <script src="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.js"></script>
    <script>
        // Initialize Fluid Player
        var myPlayer = fluidPlayer('my-video', {
            layoutControls: {
                fillToContainer: true,
                primaryColor: "#ff0050",
                posterImage: "https://via.placeholder.com/800x450/000/fff?text=Video+Loading",
                playButtonShowing: true,
                controlBar: {
                    autoHide: true,
                    autoHideTimeout: 3,
                    animated: true
                }
            }
        });

        // Modal Functions
        function openModal() {
            document.getElementById('reportModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('reportModal').style.display = 'none';
        }

        // Close modal if clicking outside
        window.onclick = function(event) {
            var modal = document.getElementById('reportModal');
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }

        // Copy Link Function
        function copyLink() {
            navigator.clipboard.writeText(window.location.href);
            alert("Link copied to clipboard!");
        }

        // Share Function
        function shareVideo() {
            if (navigator.share) {
                navigator.share({
                    title: 'Check out this video',
                    url: window.location.href
                });
            } else {
                copyLink();
            }
        }
    </script>
</body>
</html>
