<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#0a0a0a">
    <title id="pageTitle">Loading... - Xplitleaks</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#ff0050',
                        secondary: '#00f2ea',
                        dark: '#0a0a0a',
                        darker: '#050505',
                        card: '#1a1a1a',
                        border: '#333333',
                        muted: '#888888',
                        success: '#00d084',
                        warning: '#ffab00',
                        danger: '#ff0050'
                    }
                }
            }
        }
    </script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Fluid Player -->
    <script src="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.js"></script>
    
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #ff0050; }
        * { transition: background-color 0.2s, border-color 0.2s, transform 0.2s; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Video player container */
        .video-player-container {
            position: relative;
            width: 100%;
            background: #000;
        }
        .video-aspect {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
        }
        .video-aspect video,
        .video-aspect .fluid_video_wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }
        
        /* Shorts horizontal carousel */
        .shorts-carousel {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 8px;
        }
        .short-card {
            flex: 0 0 auto;
            scroll-snap-align: start;
            width: calc(50% - 6px);
            max-width: 280px;
        }
        @media (min-width: 640px) {
            .short-card {
                width: calc(33.333% - 8px);
            }
        }
        @media (min-width: 1024px) {
            .short-card {
                width: calc(25% - 9px);
                max-width: 320px;
            }
        }
        
        /* Related videos grid */
        .related-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        @media (min-width: 640px) {
            .related-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 16px;
            }
        }
        @media (min-width: 1024px) {
            .related-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-darker text-white font-sans antialiased min-h-screen overflow-x-hidden">

    <!-- Toast Notifications -->
    <div id="toastContainer" class="fixed top-24 right-5 z-[9999] flex flex-col gap-3"></div>

    <!-- Header -->
    <header class="bg-dark border-b border-border sticky top-0 z-[1000] px-4 py-3 flex justify-between items-center">
        <div class="text-xl font-bold bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">Xplitleaks</div>
        <a href="index.html" class="inline-flex items-center gap-2 px-3 py-1.5 bg-card border border-border rounded-lg text-sm hover:bg-primary hover:border-primary transition-all">
            <i class="fas fa-arrow-left"></i><span class="hidden sm:inline">Back</span>
        </a>
    </header>

    <!-- Main Content -->
    <main class="max-w-[1400px] mx-auto px-0 sm:px-4 py-4">
        
        <!-- Loading State -->
        <div id="loadingState" class="text-center py-16 text-muted">
            <div class="w-12 h-12 border-4 border-white/10 border-t-primary rounded-full animate-spin mx-auto mb-4"></div>
            <p>Loading video...</p>
        </div>

        <!-- Error State -->
        <div id="errorState" class="hidden text-center py-16 animate-fade-in px-4">
            <i class="fas fa-exclamation-triangle text-6xl text-danger mb-4"></i>
            <h2 class="text-2xl font-bold mb-2">Video Not Found</h2>
            <p id="errorMessage" class="text-muted mb-6">The video you're looking for doesn't exist or has been removed.</p>
            <a href="index.html" class="inline-flex items-center gap-2 px-6 py-3 bg-card border border-border rounded-lg hover:bg-primary hover:border-primary transition-all">
                <i class="fas fa-home"></i><span>Back to Home</span>
            </a>
        </div>

        <!-- Video Content -->
        <div id="videoContent" class="hidden animate-fade-in">
            
            <!-- Video Player Section -->
            <section class="w-full mb-4">
                <!-- Full-width Video Player -->
                <div class="video-player-container rounded-xl overflow-hidden border border-border mb-4">
                    <div class="video-aspect">
                        <video id="videoPlayer" controls playsinline preload="metadata" poster="">
                            <source src="" type="video/mp4" />
                            Your browser does not support the video tag.
                        </video>
                    </div>
                </div>

                <!-- Video Info - Adaptive Layout -->
                <div class="bg-card border border-border rounded-xl p-4 sm:p-6">
                    <!-- Title - Adaptive font size -->
                    <h1 id="videoTitle" class="text-base sm:text-lg md:text-xl lg:text-2xl font-bold mb-4 leading-tight">
                        Loading...
                    </h1>
                    
                    <!-- Category, Duration, Views, Date -->
                    <div class="flex flex-wrap items-center gap-3 mb-4">
                        <span id="videoCategory" class="bg-primary text-white px-2.5 py-1 rounded-full text-xs font-semibold">
                            Category
                        </span>
                        <span class="text-sm text-muted flex items-center gap-1">
                            <i class="far fa-clock text-xs"></i>
                            <span id="videoDuration">0:00</span>
                        </span>
                        <span class="text-sm text-muted flex items-center gap-1">
                            <i class="fas fa-eye text-xs"></i>
                            <span id="videoViews">0</span> views
                        </span>
                        <span class="text-sm text-muted flex items-center gap-1">
                            <i class="fas fa-calendar text-xs"></i>
                            <span id="videoDate">N/A</span>
                        </span>
                    </div>

                    <!-- Action Buttons - Responsive -->
                    <div class="flex flex-wrap gap-3 py-4 border-t border-border">
                        <button id="likeBtn" onclick="toggleLike()" class="flex-1 sm:flex-none flex items-center justify-center gap-2 px-5 py-3 bg-dark border border-border rounded-lg hover:bg-primary hover:border-primary hover:-translate-y-0.5 transition-all">
                            <i class="far fa-heart"></i>
                            <span>Like</span>
                            <span id="likeCount" class="text-muted text-sm">0</span>
                        </button>
                        <button id="shareBtn" onclick="shareVideo()" class="flex-1 sm:flex-none flex items-center justify-center gap-2 px-5 py-3 bg-dark border border-border rounded-lg hover:bg-primary hover:border-primary hover:-translate-y-0.5 transition-all">
                            <i class="fas fa-share"></i>
                            <span>Share</span>
                        </button>
                        <button onclick="copyLink()" class="flex-1 sm:flex-none flex items-center justify-center gap-2 px-5 py-3 bg-dark border border-border rounded-lg hover:bg-primary hover:border-primary hover:-translate-y-0.5 transition-all">
                            <i class="fas fa-link"></i>
                            <span class="hidden sm:inline">Copy Link</span>
                            <span class="sm:hidden">Copy</span>
                        </button>
                        <button onclick="openReportModal()" class="flex-1 sm:flex-none flex items-center justify-center gap-2 px-5 py-3 bg-dark border border-border rounded-lg hover:bg-primary hover:border-primary hover:-translate-y-0.5 transition-all">
                            <i class="fas fa-flag"></i>
                            <span class="hidden sm:inline">Report</span>
                        </button>
                    </div>
                    
                    <!-- Description -->
                    <div id="videoDescription" class="text-muted leading-relaxed mt-4 pt-4 border-t border-border hidden"></div>
                    
                    <!-- Tags -->
                    <div id="tagsContainer" class="flex flex-wrap gap-2 mt-4 pt-4 border-t border-border hidden"></div>
                </div>
            </section>

            <!-- Shorts Section - Horizontal Carousel -->
            <section class="mb-8">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold flex items-center gap-3">
                        <i class="fas fa-mobile-alt text-primary"></i>
                        Related Shorts
                    </h2>
                    <a href="shorts.html" class="text-primary hover:text-secondary font-medium flex items-center gap-1">
                        View All <i class="fas fa-arrow-right"></i>
                    </a>
                </div>
                
                <div id="shortsCarousel" class="shorts-carousel no-scrollbar">
                    <div class="text-center py-16 text-muted w-full">
                        <div class="w-12 h-12 border-4 border-white/10 border-t-primary rounded-full animate-spin mx-auto mb-4"></div>
                        <p>Loading shorts...</p>
                    </div>
                </div>
            </section>

            <!-- Related Videos Section -->
            <section class="mb-8">
                <h2 class="text-xl font-bold flex items-center gap-3 mb-6">
                    <i class="fas fa-th-large text-primary"></i>
                    Recommended for You
                </h2>
                
                <div id="recommendedVideos" class="related-grid">
                    <div class="text-center py-16 col-span-full text-muted">
                        <div class="w-12 h-12 border-4 border-white/10 border-t-primary rounded-full animate-spin mx-auto mb-4"></div>
                        <p>Loading recommendations...</p>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- Report Modal -->
    <div id="reportModal" class="hidden fixed inset-0 bg-black/80 z-[2000] flex items-center justify-center p-4">
        <div class="bg-card border border-border rounded-xl p-6 sm:p-8 max-w-[500px] w-full max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold flex items-center gap-2">
                    <i class="fas fa-flag text-primary"></i>Report Video
                </h3>
                <button onclick="closeReportModal()" class="text-muted hover:text-danger hover:rotate-90 transition-all text-2xl">&times;</button>
            </div>
            <form id="reportForm" onsubmit="submitReport(event)">
                <div class="mb-5">
                    <label for="reportReason" class="block mb-2 text-sm text-muted">Reason *</label>
                    <select id="reportReason" required class="w-full px-3 py-3 bg-dark border border-border rounded-lg text-white focus:outline-none focus:border-primary">
                        <option value="">Select a reason</option>
                        <option value="inappropriate">Inappropriate Content</option>
                        <option value="copyright">Copyright Violation</option>
                        <option value="spam">Spam or Misleading</option>
                        <option value="quality">Poor Quality</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="mb-5">
                    <label for="reportDetails" class="block mb-2 text-sm text-muted">Additional Details</label>
                    <textarea id="reportDetails" rows="4" placeholder="Please provide more details..." class="w-full px-3 py-3 bg-dark border border-border rounded-lg text-white focus:outline-none focus:border-primary resize-y"></textarea>
                </div>
                <button type="submit" class="w-full flex items-center justify-center gap-2 px-6 py-3 bg-danger border border-danger rounded-lg hover:bg-danger/90 transition-all">
                    <i class="fas fa-paper-plane"></i>Submit Report
                </button>
            </form>
        </div>
    </div>

    <script>
        const CONFIG = {
            apiEndpoint: 'https://xplitleaks-api.dylancoral.workers.dev/api',
            sessionId: localStorage.getItem('sessionId') || generateSessionId()
        };
        localStorage.setItem('sessionId', CONFIG.sessionId);

        let currentVideo = null;
        let videoPlayer = null;
        let viewTracked = false;

        document.addEventListener('DOMContentLoaded', () => {
            loadVideo();
        });

        function generateSessionId() {
            return 'sess_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
        }

        async function loadVideo() {
            const urlParams = new URLSearchParams(window.location.search);
            const videoId = urlParams.get('id');
            
            if (!videoId) {
                showError('Video ID is required');
                return;
            }
            
            try {
                const response = await fetch(`${CONFIG.apiEndpoint}/video/${videoId}`);
                
                if (!response.ok) throw new Error(`API returned ${response.status}`);
                
                const data = await response.json();
                
                if (!data || !data.videoUrl) {
                    throw new Error('Video URL is missing');
                }
                
                currentVideo = data;
                document.getElementById('pageTitle').textContent = `${data.title} - Xplitleaks`;
                
                setupPlayer(data);
                updateVideoInfo(data);
                loadRelatedShorts(data);
                loadRecommendedVideos(data);
                setTimeout(() => trackView(false), 10000);
                
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('errorState').classList.add('hidden');
                document.getElementById('videoContent').classList.remove('hidden');
                
            } catch (error) {
                console.error('Load video error:', error);
                showError('Failed to load video: ' + error.message);
            }
        }

        function setupPlayer(video) {
            const videoElement = document.getElementById('videoPlayer');
            if (!videoElement) return;
            
            const source = videoElement.querySelector('source');
            if (source) {
                source.src = video.videoUrl;
                source.type = 'video/mp4';
            }
            if (video.thumbnail) {
                videoElement.setAttribute('poster', video.thumbnail);
            }
            
            if (typeof fluidPlayer !== 'undefined') {
                videoPlayer = fluidPlayer('videoPlayer', {
                    layoutControls: {
                        fillToContainer: true,
                        primaryColor: '#ff0050',
                        playbackRateEnabled: true,
                        allowTheatre: false,
                        autoPlay: false,
                        controlBar: { autoHide: true, autoHideTimeout: 3 }
                    },
                    vastOptions: { adList: [], adsEnabled: false }
                });
                
                videoPlayer.on('ended', () => trackView(true));
                videoPlayer.on('timeupdate', () => {
                    if (!viewTracked) {
                        const progress = videoPlayer.getCurrentTime() / videoPlayer.getDuration();
                        if (progress >= 0.5) trackView(false);
                    }
                });
            }
        }

        function updateVideoInfo(video) {
            document.getElementById('videoTitle').textContent = video.title;
            document.getElementById('videoCategory').textContent = video.category || 'Uncategorized';
            document.getElementById('videoViews').textContent = formatNumber(video.views || 0);
            document.getElementById('videoDuration').textContent = video.duration || '0:00';
            document.getElementById('videoDate').textContent = video.uploadDate || 'N/A';
            
            const descEl = document.getElementById('videoDescription');
            if (video.description) {
                descEl.textContent = video.description;
                descEl.classList.remove('hidden');
            }
            
            document.getElementById('likeCount').textContent = formatNumber(video.likes || 0);
            
            const videoId = video.numericId || video.id;
            const likeBtn = document.getElementById('likeBtn');
            if (isLiked(videoId)) {
                likeBtn.classList.add('bg-primary', 'border-primary');
                likeBtn.querySelector('i').className = 'fas fa-heart';
            }
            
            const tags = JSON.parse(video.tags || '[]');
            const tagsContainer = document.getElementById('tagsContainer');
            if (tags.length > 0) {
                tagsContainer.innerHTML = tags.map(tag =>
                    `<a href="index.html?tag=${encodeURIComponent(tag)}" class="bg-dark border border-border text-muted px-3 py-1 rounded-full text-sm hover:border-primary hover:text-primary transition-all">#${tag}</a>`
                ).join('');
                tagsContainer.classList.remove('hidden');
            }
        }

        async function toggleLike() {
            if (!currentVideo) return;
            const btn = document.getElementById('likeBtn');
            const icon = btn.querySelector('i');
            const countEl = document.getElementById('likeCount');
            const videoId = currentVideo.numericId || currentVideo.id;
            
            try {
                const response = await fetch(`${CONFIG.apiEndpoint}/short/like`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Session-Id': CONFIG.sessionId },
                    body: JSON.stringify({ shortId: videoId })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.action === 'liked') {
                        btn.classList.add('bg-primary', 'border-primary');
                        icon.className = 'fas fa-heart';
                        currentVideo.likes = (currentVideo.likes || 0) + 1;
                        markAsLiked(videoId);
                    } else {
                        btn.classList.remove('bg-primary', 'border-primary');
                        icon.className = 'far fa-heart';
                        currentVideo.likes = Math.max((currentVideo.likes || 0) - 1, 0);
                        markAsUnliked(videoId);
                    }
                    countEl.textContent = formatNumber(currentVideo.likes);
                }
            } catch (error) {
                showToast('Failed to update like', 'error');
            }
        }

        async function trackView(isComplete) {
            if (viewTracked || !currentVideo) return;
            try {
                const videoId = currentVideo.numericId || currentVideo.id;
                const currentTime = videoPlayer?.getCurrentTime ? videoPlayer.getCurrentTime() : 0;
                const duration = videoPlayer?.getDuration ? videoPlayer.getDuration() : 1;
                const watchDuration = isComplete ? 1 : (duration > 0 ? currentTime / duration : 0.5);
                
                await fetch(`${CONFIG.apiEndpoint}/short/view`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Session-Id': CONFIG.sessionId },
                    body: JSON.stringify({ shortId: videoId, watchDuration, watchTime: currentTime })
                });
                
                viewTracked = true;
            } catch (error) {
                console.error('Track view error:', error);
            }
        }

        async function shareVideo() {
            const videoId = currentVideo.numericId || currentVideo.id;
            try {
                await fetch(`${CONFIG.apiEndpoint}/short/share`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Session-Id': CONFIG.sessionId },
                    body: JSON.stringify({ shortId: videoId })
                });
                showToast('Share counted!', 'success');
                
                if (navigator.share) {
                    navigator.share({ title: currentVideo.title, url: window.location.href }).catch(() => {});
                } else {
                    copyLink();
                }
            } catch (error) {
                copyLink();
            }
        }

        function copyLink() {
            navigator.clipboard.writeText(window.location.href)
                .then(() => showToast('Link copied!', 'success'))
                .catch(() => showToast('Failed to copy', 'error'));
        }

        function isLiked(videoId) {
            const liked = localStorage.getItem('likedVideos');
            return liked ? JSON.parse(liked).includes(videoId) : false;
        }

        function markAsLiked(videoId) {
            const liked = JSON.parse(localStorage.getItem('likedVideos') || '[]');
            if (!liked.includes(videoId)) {
                liked.push(videoId);
                localStorage.setItem('likedVideos', JSON.stringify(liked));
            }
        }

        function markAsUnliked(videoId) {
            const liked = JSON.parse(localStorage.getItem('likedVideos') || '[]');
            const index = liked.indexOf(videoId);
            if (index > -1) {
                liked.splice(index, 1);
                localStorage.setItem('likedVideos', JSON.stringify(liked));
            }
        }

        async function loadRelatedShorts(video) {
            const carousel = document.getElementById('shortsCarousel');
            try {
                const response = await fetch(`${CONFIG.apiEndpoint}/shorts?limit=10`);
                let shorts = await response.json();
                
                if (shorts && shorts.length > 0) {
                    const category = video.category;
                    let related = shorts.filter(s => s.category === category);
                    if (related.length < 10) {
                        const remaining = shorts.filter(s => s.category !== category);
                        related = [...related, ...remaining].slice(0, 10);
                    }
                    carousel.innerHTML = related.map(short => createShortCard(short)).join('');
                } else {
                    carousel.innerHTML = `<div class="text-center py-8 text-muted w-full">No shorts available</div>`;
                }
            } catch (error) {
                carousel.innerHTML = `<div class="text-center py-8 text-muted w-full">Failed to load shorts</div>`;
            }
        }

        // Shorts Card - Horizontal Carousel Style
        function createShortCard(short) {
            return `
                <a href="shorts.html?id=${short.numericId}" class="short-card bg-card border border-border rounded-xl overflow-hidden hover:-translate-y-1 hover:border-primary transition-all group">
                    <div class="relative aspect-[9/16]">
                        <img src="${short.thumbnail || ''}" 
                            alt="${short.title}" 
                            class="w-full h-full object-cover bg-dark" 
                            onerror="this.onerror=null; this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22280%22 height=%22500%22><rect fill=%22%23333%22 width=%22280%22 height=%22500%22/><text fill=%22%23888%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22>No Thumbnail</text></svg>';">
                        
                        <!-- Overlay gradient -->
                        <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-transparent"></div>
                        
                        <!-- Duration badge -->
                        <span class="absolute bottom-2 right-2 bg-black/80 text-white px-2 py-1 rounded text-xs font-semibold">
                            ${short.duration || '0:00'}
                        </span>
                        
                        <!-- Play button -->
                        <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                            <div class="w-12 h-12 bg-primary/90 rounded-full flex items-center justify-center text-xl">
                                <i class="fas fa-play ml-1"></i>
                            </div>
                        </div>
                        
                        <!-- Info overlay -->
                        <div class="absolute bottom-0 left-0 right-0 p-4">
                            <h3 class="font-semibold mb-2 line-clamp-2 text-sm">${short.title}</h3>
                            <div class="flex gap-3 text-xs text-muted">
                                <span class="flex items-center gap-1">
                                    <i class="fas fa-eye text-primary"></i> ${formatNumber(short.views || 0)}
                                </span>
                                <span class="flex items-center gap-1">
                                    <i class="fas fa-heart text-primary"></i> ${formatNumber(short.likes || 0)}
                                </span>
                            </div>
                        </div>
                    </div>
                </a>
            `;
        }

        async function loadRecommendedVideos(video) {
            const container = document.getElementById('recommendedVideos');
            try {
                const response = await fetch(`${CONFIG.apiEndpoint}/videos?limit=12`);
                const videos = await response.json();
                
                if (videos && videos.length > 0) {
                    const currentId = currentVideo.numericId || currentVideo.id;
                    const filtered = videos.filter(v => (v.numericId || v.id) !== currentId);
                    container.innerHTML = filtered.map(v => createVideoCard(v)).join('');
                } else {
                    container.innerHTML = `<div class="text-center py-8 col-span-full text-muted">No recommendations</div>`;
                }
            } catch (error) {
                container.innerHTML = `<div class="text-center py-8 col-span-full text-muted">Failed to load</div>`;
            }
        }

        // Video Card - Grid Style
        function createVideoCard(video) {
            return `
                <a href="video.html?id=${video.numericId || video.id}" class="bg-card border border-border rounded-xl overflow-hidden hover:-translate-y-1 hover:border-primary transition-all group">
                    <div class="relative aspect-video">
                        <img src="${video.thumbnail || ''}" 
                            alt="${video.title}" 
                            class="w-full h-full object-cover bg-dark" 
                            onerror="this.onerror=null; this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22280%22 height=%22180%22><rect fill=%22%23333%22 width=%22280%22 height=%22180%22/><text fill=%22%23888%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22>No Thumbnail</text></svg>';">
                        
                        <!-- Duration -->
                        <span class="absolute bottom-2 right-2 bg-black/80 text-white px-2 py-1 rounded text-xs font-semibold">
                            ${video.duration || '0:00'}
                        </span>
                        
                        <!-- Hover overlay -->
                        <div class="absolute inset-0 bg-primary/20 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    </div>
                    
                    <div class="p-4">
                        <h3 class="font-semibold mb-2 line-clamp-2">${video.title}</h3>
                        <div class="flex flex-wrap gap-3 text-sm text-muted">
                            <span class="flex items-center gap-1">
                                <i class="fas fa-eye text-primary"></i> ${formatNumber(video.views || 0)}
                            </span>
                            <span class="flex items-center gap-1">
                                <i class="fas fa-clock text-primary"></i> ${video.uploadDate || 'N/A'}
                            </span>
                        </div>
                    </div>
                </a>
            `;
        }

        function openReportModal() {
            document.getElementById('reportModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeReportModal() {
            document.getElementById('reportModal').classList.add('hidden');
            document.getElementById('reportForm').reset();
            document.body.style.overflow = '';
        }

        async function submitReport(event) {
            event.preventDefault();
            const reason = document.getElementById('reportReason').value;
            const details = document.getElementById('reportDetails').value;
            const videoId = currentVideo.numericId || currentVideo.id;
            
            try {
                await fetch(`${CONFIG.apiEndpoint}/report`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Session-Id': CONFIG.sessionId },
                    body: JSON.stringify({ videoId, videoType: 'video', reason: reason + (details ? ': ' + details : '') })
                });
                showToast('Report submitted', 'success');
                closeReportModal();
            } catch (error) {
                showToast('Failed to submit report', 'error');
            }
        }

        function showError(message) {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('errorState').classList.remove('hidden');
            document.getElementById('errorMessage').textContent = message;
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const colors = { success: 'border-success', error: 'border-danger', info: 'border-primary' };
            const icons = { success: 'fa-check-circle text-success', error: 'fa-exclamation-circle text-danger', info: 'fa-info-circle text-primary' };
            
            toast.className = `bg-card border-l-4 ${colors[type]} border border-border rounded-lg shadow-lg p-4 flex items-center gap-3 min-w-[280px]`;
            toast.innerHTML = `<i class="fas ${icons[type]} text-xl"></i><span class="flex-1">${message}</span><button onclick="this.parentElement.remove()" class="text-muted hover:text-white"><i class="fas fa-times"></i></button>`;
            
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        document.getElementById('reportModal')?.addEventListener('click', (e) => {
            if (e.target.id === 'reportModal') closeReportModal();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeReportModal();
        });
    </script>
</body>
</html>
