<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#0a0a0a">
    <title id="pageTitle">Loading... - Xplitleaks</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Video.js CSS -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    
    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#ff0050',
                        secondary: '#00f2ea',
                        dark: '#0a0a0a',
                        darker: '#050505',
                        card: '#1a1a1a',
                        border: '#333333',
                        muted: '#888888'
                    }
                }
            }
        }
    </script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #ff0050; }
        
        /* Video.js Custom Theme */
        .video-js {
            font-family: inherit;
            border-radius: 12px;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }
        
        .video-player-wrapper {
            position: relative;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 16/9;
        }
        
        /* Centered Play Button - Fixed Positioning */
        .video-js.vjs-big-play-centered .vjs-big-play-button {
            background-color: rgba(255, 0, 80, 0.95) !important;
            border: none !important;
            border-radius: 50% !important;
            width: 80px !important;
            height: 80px !important;
            line-height: 80px !important;
            font-size: 2rem !important;
            top: 50% !important;
            left: 50% !important;
            transform: translate(-50%, -50%) !important;
            transition: all 0.3s ease !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
        }
        
        .video-js.vjs-big-play-centered .vjs-big-play-button:hover {
            background-color: rgba(255, 0, 80, 1) !important;
            transform: translate(-50%, -50%) scale(1.1) !important;
            box-shadow: 0 0 30px rgba(255, 0, 80, 0.5) !important;
        }
        
        .video-js.vjs-big-play-centered .vjs-big-play-button .vjs-icon-placeholder:before {
            content: "\f04b" !important;
            font-family: "Font Awesome 6 Free" !important;
            font-weight: 900 !important;
            font-size: 2rem !important;
            margin-left: 0.2rem !important;
            color: white !important;
        }
        
        /* Hide default play button when playing */
        .video-js.vjs-playing .vjs-big-play-button {
            display: none !important;
        }
        
        /* Show play button when paused */
        .video-js.vjs-paused .vjs-big-play-button,
        .video-js:not(.vjs-playing):not(.vjs-has-started) .vjs-big-play-button {
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
        }
        
        /* Control Bar - Auto-hide like YouTube */
        .video-js .vjs-control-bar {
            background: linear-gradient(to top, rgba(0,0,0,0.95), rgba(0,0,0,0.7));
            opacity: 1;
            transition: opacity 0.3s ease;
        }
        
        .video-js.vjs-user-inactive .vjs-control-bar {
            opacity: 0;
        }
        
        .video-js .vjs-play-control,
        .video-js .vjs-volume-panel,
        .video-js .vjs-progress-control,
        .video-js .vjs-time-control,
        .video-js .vjs-playback-rate,
        .video-js .vjs-fullscreen-control {
            color: white;
            transition: color 0.2s ease, transform 0.2s ease;
        }
        
        .video-js .vjs-play-control:hover,
        .video-js .vjs-volume-panel:hover,
        .video-js .vjs-fullscreen-control:hover,
        .video-js .vjs-playback-rate:hover {
            color: #ff0050;
            transform: scale(1.1);
        }
        
        /* Enhanced Progress Bar */
        .video-js .vjs-progress-control {
            position: relative;
            height: 16px;
            bottom: 0;
        }
        
        .video-js .vjs-play-progress {
            background: linear-gradient(90deg, #ff0050, #ff3377);
            box-shadow: 0 0 10px rgba(255, 0, 80, 0.5);
        }
        
        .video-js .vjs-slider {
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
        }
        
        .video-js .vjs-load-progress {
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
        }
        
        /* Progress Bar Seek Preview Dot */
        .video-js .vjs-mouse-display {
            background: #ff0050;
            box-shadow: 0 0 10px rgba(255, 0, 80, 0.8);
        }
        
        .video-js .vjs-play-progress:before {
            content: '';
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%) scale(0);
            width: 12px;
            height: 12px;
            background: #ff0050;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(255, 0, 80, 0.8);
            transition: transform 0.2s ease;
        }
        
        .video-js .vjs-progress-control:hover .vjs-play-progress:before {
            transform: translateY(-50%) scale(1);
        }
        
        /* Volume Slider */
        .video-js .vjs-volume-level {
            background: linear-gradient(90deg, #ff0050, #ff3377);
        }
        
        .video-js .vjs-volume-horizontal {
            width: 80px;
        }
        
        /* Playback Rate Menu */
        .video-js .vjs-menu-button-popup .vjs-menu {
            background: rgba(0,0,0,0.95);
            border: 1px solid #333;
            border-radius: 8px;
            backdrop-filter: blur(10px);
        }
        
        .video-js .vjs-menu-item {
            color: white;
            text-align: center;
            padding: 8px 16px;
            transition: all 0.2s ease;
        }
        
        .video-js .vjs-menu-item:hover {
            background: rgba(255, 0, 80, 0.3);
            color: #ff0050;
        }
        
        .video-js .vjs-menu-item.vjs-selected {
            background: rgba(255, 0, 80, 0.5);
            color: white;
            font-weight: bold;
        }
        
        /* Time Display */
        .video-js .vjs-time-control {
            font-family: 'Roboto Mono', monospace;
            font-size: 0.85rem;
            min-width: 4em;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        
        /* Double-click seek indicator overlay */
        .seek-indicator {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 1.5rem;
            font-weight: bold;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            transition: opacity 0.3s ease;
        }
        
        .seek-indicator.show {
            opacity: 1;
            animation: pulse 0.5s ease;
        }
        
        .seek-indicator.left {
            left: 20%;
        }
        
        .seek-indicator.right {
            right: 20%;
        }
        
        @keyframes pulse {
            0%, 100% { transform: translateY(-50%) scale(1); }
            50% { transform: translateY(-50%) scale(1.1); }
        }
        
        /* Picture-in-Picture button styling */
        .video-js .vjs-picture-in-picture-control {
            color: white;
        }
        
        .video-js .vjs-picture-in-picture-control:hover {
            color: #ff0050;
        }
        
        /* Theater mode - expands player width */
        .video-player-wrapper.theater-mode {
            max-width: 100%;
            margin: 0 auto;
        }
        
        .video-player-wrapper.theater-mode .video-js {
            border-radius: 0;
        }
        
        /* Theater mode button */
        .theater-mode-btn {
            color: white;
            cursor: pointer;
            padding: 0 10px;
            display: flex;
            align-items: center;
        }
        
        .theater-mode-btn:hover {
            color: #ff0050;
        }
        
        /* Skip animation */
        .skip-animation {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            color: white;
            opacity: 0;
            pointer-events: none;
            z-index: 50;
        }
        
        .skip-animation.animate {
            animation: skipFade 0.8s ease;
        }
        
        @keyframes skipFade {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>

    <!-- Video.js -->
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    
    <script>
        const CONFIG = {
            apiEndpoint: 'https://xplitleaks-api.dylancoral.workers.dev/api',
            sessionId: localStorage.getItem('sessionId') || generateSessionId()
        };
        localStorage.setItem('sessionId', CONFIG.sessionId);

        let currentVideo = null;
        let videoPlayer = null;
        let viewTracked = false;

        document.addEventListener('DOMContentLoaded', () => {
            console.log('🚀 Page loaded, initializing Video.js...');
            initVideoJS();
            loadVideo();
        });

        // Initialize Video.js Player with YouTube-like features
        function initVideoJS() {
            videoPlayer = videojs('videoPlayer', {
                controls: true,
                autoplay: false,
                preload: 'metadata',
                responsive: true,
                fluid: false,
                playbackRates: [0.25, 0.5, 0.75, 1, 1.25, 1.5, 1.75, 2],
                controlBar: {
                    children: [
                        'playToggle',
                        'volumePanel',
                        'currentTimeDisplay',
                        'timeDivider',
                        'durationDisplay',
                        'progressControl',
                        'playbackRateMenuButton',
                        'pictureInPictureToggle',
                        'fullscreenToggle'
                    ],
                    volumePanel: {
                        inline: false
                    }
                },
                userActions: {
                    hotkeys: true,
                    doubleClick: true,
                    pinch: true
                }
            });

            // Add seek indicators container
            const playerContainer = document.getElementById('videoPlayerContainer');
            const seekIndicatorLeft = document.createElement('div');
            seekIndicatorLeft.className = 'seek-indicator left';
            seekIndicatorLeft.id = 'seekIndicatorLeft';
            seekIndicatorLeft.innerHTML = '<i class="fas fa-undo"></i> -10s';
            
            const seekIndicatorRight = document.createElement('div');
            seekIndicatorRight.className = 'seek-indicator right';
            seekIndicatorRight.id = 'seekIndicatorRight';
            seekIndicatorRight.innerHTML = '+10s <i class="fas fa-redo"></i>';
            
            playerContainer.appendChild(seekIndicatorLeft);
            playerContainer.appendChild(seekIndicatorRight);

            // Track view when 50% watched
            videoPlayer.on('timeupdate', () => {
                if (videoPlayer.duration() && !viewTracked) {
                    const progressRatio = videoPlayer.currentTime() / videoPlayer.duration();
                    if (progressRatio >= 0.5) {
                        trackView(false);
                    }
                }
            });

            // Track view when video ends
            videoPlayer.on('ended', () => {
                trackView(true);
            });

            // Handle fullscreen with custom container
            videoPlayer.on('fullscreenchange', () => {
                const isFullscreen = videoPlayer.isFullscreen();
                console.log('Fullscreen changed:', isFullscreen);
            });

            // Double-click to seek (YouTube-style)
            let lastClickTime = 0;
            let lastClickX = 0;
            
            videoPlayer.on('click', (event) => {
                const currentTime = Date.now();
                const clickX = event.clientX || event.changedTouches?.[0]?.clientX || 0;
                
                // Check for double-click within 300ms
                if (currentTime - lastClickTime < 300) {
                    const rect = videoPlayer.el().getBoundingClientRect();
                    const relativeX = clickX - rect.left;
                    const playerWidth = rect.width;
                    
                    if (relativeX < playerWidth / 3) {
                        // Left side - seek backward
                        skip(-10, 'left');
                    } else if (relativeX > (playerWidth * 2) / 3) {
                        // Right side - seek forward
                        skip(10, 'right');
                    } else {
                        // Center - toggle play/pause
                        if (videoPlayer.paused()) {
                            videoPlayer.play();
                        } else {
                            videoPlayer.pause();
                        }
                    }
                }
                
                lastClickTime = currentTime;
                lastClickX = clickX;
            });

            // Keyboard shortcuts (YouTube-style)
            document.addEventListener('keydown', (e) => {
                // Don't trigger if typing in input
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                
                switch(e.key.toLowerCase()) {
                    case ' ':
                    case 'k':
                        e.preventDefault();
                        if (videoPlayer.paused()) {
                            videoPlayer.play();
                        } else {
                            videoPlayer.pause();
                        }
                        break;
                    case 'arrowleft':
                        e.preventDefault();
                        skip(-5, 'left');
                        break;
                    case 'arrowright':
                        e.preventDefault();
                        skip(5, 'right');
                        break;
                    case 'j':
                        e.preventDefault();
                        skip(-10, 'left');
                        break;
                    case 'l':
                        e.preventDefault();
                        skip(10, 'right');
                        break;
                    case 'arrowup':
                        e.preventDefault();
                        increaseVolume();
                        break;
                    case 'arrowdown':
                        e.preventDefault();
                        decreaseVolume();
                        break;
                    case 'f':
                        e.preventDefault();
                        toggleFullscreen();
                        break;
                    case 'm':
                        e.preventDefault();
                        toggleMute();
                        break;
                    case 'c':
                        e.preventDefault();
                        toggleCaptions();
                        break;
                    case 't':
                        e.preventDefault();
                        toggleTheaterMode();
                        break;
                    case 'number':
                        // Number keys 0-9 to seek to percentage
                        if (e.key >= '0' && e.key <= '9') {
                            e.preventDefault();
                            const percentage = parseInt(e.key) / 10;
                            videoPlayer.currentTime(videoPlayer.duration() * percentage);
                        }
                        break;
                }
            });

            // Volume wheel control
            videoPlayer.el().addEventListener('wheel', (e) => {
                e.preventDefault();
                const currentVolume = videoPlayer.volume();
                if (e.deltaY < 0) {
                    videoPlayer.volume(Math.min(1, currentVolume + 0.1));
                } else {
                    videoPlayer.volume(Math.max(0, currentVolume - 0.1));
                }
            });

            // Show/hide controls on mouse movement
            let controlsTimeout;
            videoPlayer.el().addEventListener('mousemove', () => {
                videoPlayer.userActive(true);
                clearTimeout(controlsTimeout);
                controlsTimeout = setTimeout(() => {
                    if (!videoPlayer.paused()) {
                        videoPlayer.userActive(false);
                    }
                }, 2500);
            });

            // Auto-hide cursor when inactive
            videoPlayer.el().addEventListener('mouseleave', () => {
                if (!videoPlayer.paused()) {
                    videoPlayer.userActive(false);
                }
            });
        }

        // Skip function with animation
        function skip(seconds, direction) {
            const currentTime = videoPlayer.currentTime();
            videoPlayer.currentTime(Math.max(0, Math.min(currentTime + seconds, videoPlayer.duration())));
            
            // Show skip indicator
            const indicator = document.getElementById(direction === 'left' ? 'seekIndicatorLeft' : 'seekIndicatorRight');
            indicator.classList.add('show');
            
            setTimeout(() => {
                indicator.classList.remove('show');
            }, 800);
        }

        // Volume controls
        function increaseVolume() {
            const currentVolume = videoPlayer.volume();
            videoPlayer.volume(Math.min(1, currentVolume + 0.1));
            showToast(`Volume: ${Math.round(videoPlayer.volume() * 100)}%`);
        }

        function decreaseVolume() {
            const currentVolume = videoPlayer.volume();
            videoPlayer.volume(Math.max(0, currentVolume - 0.1));
            showToast(`Volume: ${Math.round(videoPlayer.volume() * 100)}%`);
        }

        function toggleMute() {
            videoPlayer.muted(!videoPlayer.muted());
            showToast(videoPlayer.muted() ? 'Muted' : 'Unmuted');
        }

        function toggleFullscreen() {
            if (videoPlayer.isFullscreen()) {
                videoPlayer.exitFullscreen();
            } else {
                videoPlayer.requestFullscreen();
            }
        }

        function toggleCaptions() {
            const tracks = videoPlayer.textTracks();
            for (let i = 0; i < tracks.length; i++) {
                tracks[i].mode = tracks[i].mode === 'showing' ? 'hidden' : 'showing';
            }
        }

        function toggleTheaterMode() {
            const playerContainer = document.getElementById('videoPlayerContainer');
            playerContainer.classList.toggle('theater-mode');
        }

        function formatTime(seconds) {
            if (isNaN(seconds) || !isFinite(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function generateSessionId() {
            return 'sess_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
        }

        async function loadVideo() {
            const urlParams = new URLSearchParams(window.location.search);
            const videoId = urlParams.get('id');
            
            if (!videoId) {
                showError('Video ID is required');
                return;
            }
            
            try {
                const response = await fetch(`${CONFIG.apiEndpoint}/video/${videoId}`);
                
                if (!response.ok) {
                    throw new Error(`API returned ${response.status}`);
                }
                
                const data = await response.json();
                
                if (!data || !data.videoUrl) {
                    throw new Error('Video URL is missing from API response');
                }
                
                currentVideo = data;
                document.getElementById('pageTitle').textContent = `${data.title} - Xplitleaks`;
                
                // Set video source using Video.js API
                videoPlayer.src({
                    src: data.videoUrl,
                    type: 'video/mp4'
                });
                
                // Set poster if available
                if (data.thumbnail) {
                    videoPlayer.poster(data.thumbnail);
                }
                
                updateVideoInfo(data);
                loadRelatedShorts(data);
                loadRelatedVideos(data);
                setTimeout(() => trackView(false), 10000);
                
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('errorState').classList.add('hidden');
                document.getElementById('videoContent').classList.remove('hidden');
                
            } catch (error) {
                console.error('Load video error:', error);
                showError('Failed to load video: ' + error.message);
            }
        }

        function updateVideoInfo(video) {
            document.getElementById('videoTitle').textContent = video.title;
            document.getElementById('videoCategory').textContent = video.category || 'Uncategorized';
            document.getElementById('videoViews').textContent = formatNumber(video.views || 0);
            document.getElementById('videoDuration').textContent = video.duration || '0:00';
            document.getElementById('videoDate').textContent = video.uploadDate || 'N/A';
            
            const descEl = document.getElementById('videoDescription');
            if (video.description) {
                descEl.textContent = video.description;
                descEl.classList.remove('hidden');
            }
            
            document.getElementById('likeCount').textContent = formatNumber(video.likes || 0);
            
            const videoId = video.numericId || video.id;
            const likeBtn = document.getElementById('likeBtn');
            if (isLiked(videoId)) {
                likeBtn.classList.add('bg-primary', 'border-primary');
                likeBtn.querySelector('i').className = 'fas fa-heart';
            }
            
            const tags = JSON.parse(video.tags || '[]');
            const tagsContainer = document.getElementById('tagsContainer');
            if (tags.length > 0) {
                tagsContainer.innerHTML = tags.map(tag =>
                    `<a href="index.html?tag=${encodeURIComponent(tag)}" class="bg-dark border border-border text-muted px-2 md:px-3 py-1 rounded-full text-xs hover:border-primary hover:text-primary transition-all">#${tag}</a>`
                ).join('');
                tagsContainer.classList.remove('hidden');
            }
        }

        async function toggleLike() {
            if (!currentVideo) return;
            const btn = document.getElementById('likeBtn');
            const icon = btn.querySelector('i');
            const countEl = document.getElementById('likeCount');
            const wasLiked = btn.classList.contains('bg-primary');
            const videoId = currentVideo.numericId || currentVideo.id;
            
            try {
                const response = await fetch(`${CONFIG.apiEndpoint}/short/like`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Session-Id': CONFIG.sessionId },
                    body: JSON.stringify({ shortId: videoId })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.action === 'liked') {
                        btn.classList.add('bg-primary', 'border-primary');
                        icon.className = 'fas fa-heart';
                        currentVideo.likes = (currentVideo.likes || 0) + 1;
                        markAsLiked(videoId);
                        showToast('Liked! ❤️', 'success');
                    } else {
                        btn.classList.remove('bg-primary', 'border-primary');
                        icon.className = 'far fa-heart';
                        currentVideo.likes = Math.max((currentVideo.likes || 0) - 1, 0);
                        markAsUnliked(videoId);
                    }
                    countEl.textContent = formatNumber(currentVideo.likes);
                }
            } catch (error) {
                console.error('Like error:', error);
                showToast('Failed to update like', 'error');
            }
        }

        async function trackView(isComplete) {
            if (viewTracked || !currentVideo) return;
            try {
                const videoId = currentVideo.numericId || currentVideo.id;
                const watchDuration = isComplete ? 1 : (videoPlayer?.currentTime() / videoPlayer?.duration()) || 0.5;
                const watchTime = videoPlayer?.currentTime() || 0;
                
                await fetch(`${CONFIG.apiEndpoint}/short/view`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Session-Id': CONFIG.sessionId },
                    body: JSON.stringify({ shortId: videoId, watchDuration, watchTime })
                });
                
                viewTracked = true;
            } catch (error) {
                console.error('Track view error:', error);
            }
        }

        async function shareVideo() {
            const btn = document.getElementById('shareBtn');
            const videoId = currentVideo.numericId || currentVideo.id;
            
            try {
                await fetch(`${CONFIG.apiEndpoint}/short/share`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Session-Id': CONFIG.sessionId },
                    body: JSON.stringify({ shortId: videoId })
                });
                
                btn.classList.add('bg-success', 'border-success');
                showToast('Share counted! ↗️', 'success');
                setTimeout(() => btn.classList.remove('bg-success', 'border-success'), 500);
                
                if (navigator.share) {
                    navigator.share({ title: currentVideo.title, url: window.location.href }).catch(() => {});
                } else {
                    copyLink();
                }
            } catch (error) {
                copyLink();
            }
        }

        function copyLink() {
            navigator.clipboard.writeText(window.location.href)
                .then(() => showToast('Link copied! 📋', 'success'))
                .catch(() => showToast('Failed to copy link', 'error'));
        }

        function isLiked(videoId) {
            const liked = localStorage.getItem('likedVideos');
            return liked ? JSON.parse(liked).includes(videoId) : false;
        }

        function markAsLiked(videoId) {
            const liked = JSON.parse(localStorage.getItem('likedVideos') || '[]');
            if (!liked.includes(videoId)) {
                liked.push(videoId);
                localStorage.setItem('likedVideos', JSON.stringify(liked));
            }
        }

        function markAsUnliked(videoId) {
            const liked = JSON.parse(localStorage.getItem('likedVideos') || '[]');
            const index = liked.indexOf(videoId);
            if (index > -1) {
                liked.splice(index, 1);
                localStorage.setItem('likedVideos', JSON.stringify(liked));
            }
        }

        async function loadRelatedShorts(video) {
            const carousel = document.getElementById('shortsCarousel');
            const sidebar = document.getElementById('shortsSidebar');
            
            try {
                const response = await fetch(`${CONFIG.apiEndpoint}/shorts?limit=10`);
                let shorts = await response.json();
                
                if (shorts && shorts.length > 0) {
                    const category = video.category;
                    let related = shorts.filter(s => s.category === category);
                    if (related.length < 10) {
                        const remaining = shorts.filter(s => s.category !== category);
                        related = [...related, ...remaining].slice(0, 10);
                    }
                    
                    if (carousel) {
                        carousel.innerHTML = related.slice(0, 8).map(short => createShortCardCompact(short)).join('');
                    }
                    
                    if (sidebar) {
                        sidebar.innerHTML = related.slice(0, 6).map(short => createShortSidebarItem(short)).join('');
                    }
                }
            } catch (error) {
                console.error('Load shorts error:', error);
            }
        }

        function createShortCardCompact(short) {
            return `<a href="shorts.html?id=${short.numericId}" class="flex-none w-[120px] md:w-[140px] bg-card border border-border rounded-lg overflow-hidden hover:border-primary transition-all group">
                <div class="relative aspect-[9/16]">
                    <img src="${short.thumbnail || ''}" alt="${short.title}" class="w-full h-full object-cover"
                        onerror="this.onerror=null; this.src='image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22120%22 height=%22200%22><rect fill=%22%23333%22 width=%22120%22 height=%22200%22/><text fill=%22%23888%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22>No Thumb</text></svg>';">
                    <span class="absolute bottom-1 right-1 bg-black/80 text-white px-1 py-0.5 rounded text-xs">${short.duration || '0:00'}</span>
                </div>
                <div class="p-2">
                    <h4 class="text-xs font-semibold line-clamp-2 group-hover:text-primary">${short.title}</h4>
                    <div class="flex items-center gap-1 text-xs text-muted mt-1">
                        <span><i class="fas fa-eye text-[10px]"></i> ${formatNumber(short.views || 0)}</span>
                    </div>
                </div>
            </a>`;
        }

        function createShortSidebarItem(short) {
            return `<a href="shorts.html?id=${short.numericId}" class="flex gap-3 group">
                <div class="relative w-20 h-28 flex-shrink-0 rounded-lg overflow-hidden">
                    <img src="${short.thumbnail || ''}" alt="${short.title}" class="w-full h-full object-cover"
                        onerror="this.onerror=null; this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22150%22><rect fill=%22%23333%22 width=%22100%22 height=%22150%22/><text fill=%22%23888%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22>No Thumb</text></svg>';">
                    <span class="absolute bottom-1 right-1 bg-black/80 text-white px-1 py-0.5 rounded text-xs">${short.duration || '0:00'}</span>
                </div>
                <div class="flex-1 min-w-0">
                    <h4 class="text-sm font-semibold line-clamp-2 group-hover:text-primary transition-colors">${short.title}</h4>
                    <div class="flex items-center gap-2 text-xs text-muted mt-1">
                        <span><i class="fas fa-eye"></i> ${formatNumber(short.views || 0)}</span>
                    </div>
                </div>
            </a>`;
        }

        async function loadRelatedVideos(video) {
            const container = document.getElementById('relatedVideosGrid');
            
            try {
                const response = await fetch(`${CONFIG.apiEndpoint}/videos?limit=12`);
                const videos = await response.json();
                
                if (videos && videos.length > 0) {
                    const currentId = currentVideo.numericId || currentVideo.id;
                    const filtered = videos.filter(v => (v.numericId || v.id) !== currentId).slice(0, 12);
                    container.innerHTML = filtered.map(v => createVideoCardResponsive(v)).join('');
                }
            } catch (error) {
                console.error('Load recommendations error:', error);
            }
        }

        function createVideoCardResponsive(video) {
            return `<a href="video.html?id=${video.numericId || video.id}" class="group block">
                <div class="relative aspect-video rounded-lg overflow-hidden mb-2 bg-dark">
                    <img src="${video.thumbnail || ''}" alt="${video.title}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
                        onerror="this.onerror=null; this.src='image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22280%22 height=%22180%22><rect fill=%22%23333%22 width=%22280%22 height=%22180%22/><text fill=%22%23888%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22>No Thumbnail</text></svg>';">
                    <span class="absolute bottom-2 right-2 bg-black/80 text-white px-1.5 py-0.5 rounded text-xs font-semibold">${video.duration || '0:00'}</span>
                </div>
                <h3 class="text-sm font-semibold line-clamp-2 group-hover:text-primary transition-colors leading-tight">${video.title}</h3>
                <div class="flex items-center gap-2 text-xs text-muted mt-1">
                    <span><i class="fas fa-eye"></i> ${formatNumber(video.views || 0)}</span>
                    <span>•</span>
                    <span>${video.uploadDate || 'N/A'}</span>
                </div>
            </a>`;
        }

        function openReportModal() {
            document.getElementById('reportModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeReportModal() {
            document.getElementById('reportModal').classList.add('hidden');
            document.getElementById('reportForm').reset();
            document.body.style.overflow = '';
        }

        async function submitReport(event) {
            event.preventDefault();
            const reason = document.getElementById('reportReason').value;
            const details = document.getElementById('reportDetails').value;
            const videoId = currentVideo.numericId || currentVideo.id;
            
            try {
                await fetch(`${CONFIG.apiEndpoint}/report`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Session-Id': CONFIG.sessionId },
                    body: JSON.stringify({ videoId, videoType: 'video', reason: reason + (details ? ': ' + details : '') })
                });
                showToast('Report submitted successfully', 'success');
                closeReportModal();
            } catch (error) {
                showToast('Failed to submit report', 'error');
            }
        }

        function showError(message) {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('errorState').classList.remove('hidden');
            document.getElementById('errorMessage').textContent = message;
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const colors = { success: 'border-success', error: 'border-danger', info: 'border-primary' };
            const icons = { success: 'fa-check-circle text-success', error: 'fa-exclamation-circle text-danger', info: 'fa-info-circle text-primary' };
            
            toast.className = `bg-card border-l-4 ${colors[type]} border border-border rounded-lg shadow-lg p-4 flex items-center gap-3 min-w-[280px]`;
            toast.innerHTML = `<i class="fas ${icons[type]} text-xl"></i><span class="flex-1 text-sm">${message}</span><button onclick="this.parentElement.remove()" class="text-muted hover:text-white"><i class="fas fa-times"></i></button>`;
            
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        document.getElementById('reportModal')?.addEventListener('click', (e) => {
            if (e.target.id === 'reportModal') closeReportModal();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeReportModal();
        });
    </script>
</body>
</html>
