<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#0a0a0a">
    <title id="pageTitle">Loading... - Xplitleaks</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#ff0050',
                        secondary: '#00f2ea',
                        dark: '#0a0a0a',
                        darker: '#050505',
                        card: '#1a1a1a',
                        border: '#333333',
                        muted: '#888888'
                    }
                }
            }
        }
    </script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #ff0050; }
        
        body {
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-darker text-white font-sans antialiased">

    <!-- Toast Notifications -->
    <div id="toastContainer" class="fixed top-24 right-5 z-[9999] flex flex-col gap-3"></div>

    <!-- Header -->
    <header class="bg-dark border-b border-border sticky top-0 z-[1000] px-4 py-3 flex justify-between items-center">
        <div class="text-xl md:text-2xl font-bold bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">Xplitleaks</div>
        <a href="index.html" class="inline-flex items-center gap-2 px-3 md:px-4 py-2 bg-card border border-border rounded-lg text-xs md:text-sm hover:bg-primary hover:border-primary transition-all">
            <i class="fas fa-arrow-left"></i><span class="hidden sm:inline">Back to Home</span><span class="sm:hidden">Back</span>
        </a>
    </header>

    <!-- Main Content -->
    <main class="max-w-[1400px] mx-auto px-3 md:px-6 py-4 md:py-8">
        
        <!-- Loading State -->
        <div id="loadingState" class="text-center py-16 text-muted">
            <div class="w-12 h-12 border-4 border-white/10 border-t-primary rounded-full animate-spin mx-auto mb-4"></div>
            <p>Loading video...</p>
        </div>

        <!-- Error State -->
        <div id="errorState" class="hidden text-center py-16 bg-card border border-border rounded-xl animate-fade-in">
            <i class="fas fa-exclamation-triangle text-5xl md:text-6xl text-danger mb-4"></i>
            <h2 class="text-xl md:text-2xl font-bold mb-2">Video Not Found</h2>
            <p id="errorMessage" class="text-muted mb-6 px-4">The video you're looking for doesn't exist or has been removed.</p>
            <a href="index.html" class="inline-flex items-center gap-2 px-6 py-3 bg-card border border-border rounded-lg hover:bg-primary hover:border-primary transition-all">
                <i class="fas fa-home"></i><span>Back to Home</span>
            </a>
        </div>

        <!-- Video Content -->
        <div id="videoContent" class="hidden animate-fade-in">
            
            <div class="grid grid-cols-1 xl:grid-cols-4 gap-4 md:gap-6">
                
                <!-- Main Column -->
                <div class="xl:col-span-3 space-y-4 md:space-y-6">
                    
                    <!-- HTML5 Video Player with Native Controls -->
                    <div class="w-full bg-black rounded-xl overflow-hidden aspect-video">
                        <video 
                            id="videoPlayer" 
                            class="w-full h-full"
                            preload="metadata" 
                            playsinline 
                            controls
                            crossorigin="anonymous">
                            <source src="" type="video/mp4">
                            Your browser does not support the video tag.
                        </video>
                    </div>

                    <!-- Video Info -->
                    <div class="bg-card border border-border rounded-xl p-4 md:p-6">
                        <h1 id="videoTitle" class="text-lg md:text-2xl font-bold mb-3 leading-tight">Loading...</h1>
                        
                        <!-- Stats Row -->
                        <div class="flex flex-wrap items-center gap-3 md:gap-4 text-xs md:text-sm text-muted mb-4 pb-4 border-b border-border">
                            <span id="videoCategory" class="bg-primary/10 text-primary px-2 md:px-3 py-1 rounded-full text-xs font-semibold">Category</span>
                            <span class="flex items-center gap-1">
                                <i class="fas fa-eye text-primary"></i>
                                <span id="videoViews">0</span> views
                            </span>
                            <span class="flex items-center gap-1">
                                <i class="fas fa-clock text-primary"></i>
                                <span id="videoDuration">0:00</span>
                            </span>
                            <span class="flex items-center gap-1">
                                <i class="fas fa-calendar text-primary"></i>
                                <span id="videoDate">N/A</span>
                            </span>
                        </div>

                        <!-- Action Buttons -->
                        <div class="flex flex-wrap gap-2 md:gap-3 mb-4">
                            <button id="likeBtn" onclick="toggleLike()" 
                                    class="flex items-center gap-2 px-3 md:px-4 py-2 bg-dark border border-border rounded-lg hover:bg-primary/20 hover:border-primary transition-all text-xs md:text-sm flex-1 md:flex-none justify-center">
                                <i class="far fa-heart"></i>
                                <span>Like</span>
                                <span id="likeCount" class="text-muted">0</span>
                            </button>
                            <button onclick="shareVideo()" 
                                    class="flex items-center gap-2 px-3 md:px-4 py-2 bg-dark border border-border rounded-lg hover:bg-primary/20 hover:border-primary transition-all text-xs md:text-sm flex-1 md:flex-none justify-center">
                                <i class="fas fa-share"></i>
                                <span class="hidden sm:inline">Share</span>
                            </button>
                            <button onclick="copyLink()" 
                                    class="flex items-center gap-2 px-3 md:px-4 py-2 bg-dark border border-border rounded-lg hover:bg-primary/20 hover:border-primary transition-all text-xs md:text-sm flex-1 md:flex-none justify-center">
                                <i class="fas fa-link"></i>
                                <span class="hidden sm:inline">Copy Link</span>
                            </button>
                            <button onclick="reportVideo()" 
                                    class="flex items-center gap-2 px-3 md:px-4 py-2 bg-dark border border-border rounded-lg hover:bg-primary/20 hover:border-primary transition-all text-xs md:text-sm flex-1 md:flex-none justify-center">
                                <i class="fas fa-flag"></i>
                                <span class="hidden sm:inline">Report</span>
                            </button>
                        </div>

                        <!-- Description -->
                        <div class="prose prose-invert max-w-none">
                            <p id="videoDescription" class="text-sm md:text-base text-muted whitespace-pre-line"></p>
                        </div>
                    </div>

                    <!-- Comments Section -->
                    <div class="bg-card border border-border rounded-xl p-4 md:p-6">
                        <h3 class="text-lg font-bold mb-4">Comments</h3>
                        <div id="commentsList" class="space-y-4"></div>
                    </div>
                </div>

                <!-- Sidebar - Related Videos -->
                <div class="xl:col-span-1">
                    <div class="bg-card border border-border rounded-xl p-4 sticky top-20">
                        <h3 class="text-lg font-bold mb-4">Related Videos</h3>
                        <div id="relatedVideos" class="space-y-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark border-t border-border mt-12 py-8">
        <div class="max-w-[1400px] mx-auto px-3 md:px-6 text-center text-muted text-sm">
            <p>&copy; 2024 Xplitleaks. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // Global variables
        let currentVideoId = null;
        let videoData = null;
        let isLiked = false;
        let viewTracked = false;
        let viewTrackedComplete = false;

        // Get URL parameters
        function getUrlParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        // Format time helper
        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // Show toast notification
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            
            const colors = {
                info: 'bg-card border-primary',
                success: 'bg-card border-green-500',
                error: 'bg-card border-red-500'
            };
            
            toast.className = `${colors[type]} border px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 min-w-[280px] animate-fade-in`;
            toast.innerHTML = `<span>${message}</span>`;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Load video data
        async function loadVideo() {
            const videoId = getUrlParam('id');
            
            if (!videoId) {
                showError('No video ID provided');
                return;
            }
            
            currentVideoId = videoId;
            
            try {
                const response = await fetch('videos.json');
                if (!response.ok) throw new Error('Failed to load videos');
                
                const videos = await response.json();
                const video = videos.find(v => v.id === videoId);
                
                if (!video) {
                    showError('Video not found');
                    return;
                }
                
                videoData = video;
                displayVideo(video);
                
            } catch (error) {
                console.error('Error loading video:', error);
                showError('Failed to load video data');
            }
        }

        // Display video
        function displayVideo(video) {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('videoContent').classList.remove('hidden');
            
            // Update page title
            document.getElementById('pageTitle').textContent = `${video.title} - Xplitleaks`;
            
            // Set video source
            const videoPlayer = document.getElementById('videoPlayer');
            const source = videoPlayer.querySelector('source');
            source.src = video.videoUrl || video.url;
            videoPlayer.load();
            
            // Update video info
            document.getElementById('videoTitle').textContent = video.title;
            document.getElementById('videoCategory').textContent = video.category || 'Uncategorized';
            document.getElementById('videoViews').textContent = (video.views || 0).toLocaleString();
            document.getElementById('videoDuration').textContent = formatTime(video.duration);
            document.getElementById('videoDate').textContent = video.uploadDate || 'N/A';
            document.getElementById('videoDescription').textContent = video.description || 'No description available.';
            
            // Update like count
            document.getElementById('likeCount').textContent = (video.likes || 0).toLocaleString();
            
            // Load related videos
            loadRelatedVideos(video);
            
            // Track view when video starts playing
            videoPlayer.addEventListener('play', () => {
                if (!viewTracked) {
                    trackView(false);
                    viewTracked = true;
                }
            });
            
            // Track complete view
            videoPlayer.addEventListener('ended', () => {
                trackView(true);
            });
            
            // Update duration when metadata loads
            videoPlayer.addEventListener('loadedmetadata', () => {
                document.getElementById('videoDuration').textContent = formatTime(videoPlayer.duration);
            });
        }

        // Show error
        function showError(message) {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('errorState').classList.remove('hidden');
            document.getElementById('errorMessage').textContent = message;
        }

        // Load related videos
        async function loadRelatedVideos(currentVideo) {
            try {
                const response = await fetch('videos.json');
                const videos = await response.json();
                
                const related = videos
                    .filter(v => v.id !== currentVideo.id && v.category === currentVideo.category)
                    .slice(0, 10);
                
                const container = document.getElementById('relatedVideos');
                
                if (related.length === 0) {
                    container.innerHTML = '<p class="text-muted text-sm">No related videos found.</p>';
                    return;
                }
                
                container.innerHTML = related.map(video => `
                    <a href="video.html?id=${video.id}" class="flex gap-3 group hover:bg-dark/50 p-2 rounded-lg transition-all">
                        <div class="w-32 aspect-video bg-dark rounded-lg overflow-hidden flex-shrink-0">
                            <img src="${video.thumbnail || 'data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'160\' height=\'90\'><rect fill=\'%23333\' width=\'160\' height=\'90\'/><text fill=\'%23888\' x=\'50%\' y=\'50%\' text-anchor=\'middle\' dy=\'.3em\'>No Thumb</text></svg>'}" 
                                 alt="${video.title}"
                                 class="w-full h-full object-cover group-hover:scale-105 transition-transform"
                                 onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'160\' height=\'90\'><rect fill=\'%23333\' width=\'160\' height=\'90\'/><text fill=\'%23888\' x=\'50%\' y=\'50%\' text-anchor=\'middle\' dy=\'.3em\'>No Thumb</text></svg>'">
                        </div>
                        <div class="flex-1 min-w-0">
                            <h4 class="text-sm font-semibold line-clamp-2 group-hover:text-primary transition-colors">${video.title}</h4>
                            <p class="text-xs text-muted mt-1">${(video.views || 0).toLocaleString()} views</p>
                        </div>
                    </a>
                `).join('');
                
            } catch (error) {
                console.error('Error loading related videos:', error);
            }
        }

        // Toggle like
        function toggleLike() {
            if (!currentVideoId) return;
            
            isLiked = !isLiked;
            const btn = document.getElementById('likeBtn');
            const icon = btn.querySelector('i');
            const countEl = document.getElementById('likeCount');
            
            let count = parseInt(countEl.textContent.replace(/,/g, '')) || 0;
            
            if (isLiked) {
                icon.classList.remove('far');
                icon.classList.add('fas', 'text-primary');
                count++;
                showToast('Video liked!', 'success');
            } else {
                icon.classList.remove('fas', 'text-primary');
                icon.classList.add('far');
                count--;
                showToast('Like removed', 'info');
            }
            
            countEl.textContent = count.toLocaleString();
        }

        // Share video
        function shareVideo() {
            const url = window.location.href;
            
            if (navigator.share) {
                navigator.share({
                    title: videoData?.title || 'Check out this video',
                    url: url
                }).catch(err => console.log('Share cancelled'));
            } else {
                copyLink();
            }
        }

        // Copy link
        function copyLink() {
            const url = window.location.href;
            
            navigator.clipboard.writeText(url).then(() => {
                showToast('Link copied to clipboard!', 'success');
            }).catch(() => {
                // Fallback for older browsers
                const input = document.createElement('input');
                input.value = url;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                showToast('Link copied to clipboard!', 'success');
            });
        }

        // Report video
        function reportVideo() {
            showToast('Report submitted. Thank you!', 'success');
        }

        // Track view
        async function trackView(isComplete) {
            if (!currentVideoId) return;
            
            try {
                // In a real application, this would send data to a server
                console.log('Tracking view:', { videoId: currentVideoId, isComplete });
                
                // Update local view count
                const viewsEl = document.getElementById('videoViews');
                let views = parseInt(viewsEl.textContent.replace(/,/g, '')) || 0;
                
                if (isComplete && !viewTrackedComplete) {
                    views++;
                    viewsEl.textContent = views.toLocaleString();
                    viewTrackedComplete = true;
                }
                
            } catch (error) {
                console.error('Error tracking view:', error);
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', loadVideo);
    </script>
</body>
</html>
