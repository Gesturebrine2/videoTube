<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xplitleaks</title>
    <meta name="description" content="Watch exclusive content on Xplitleaks">
    
    <meta property="og:type" content="video.other">
    <meta property="og:url" content="https://xplitleaks.qzz.io/video.html">
    <meta property="og:title" content="Xplitleaks">
    <meta property="og:description" content="Watch exclusive content">
    <meta property="og:image" content="">
    <meta property="og:site_name" content="Xplitleaks">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Xplitleaks">
    <meta name="twitter:description" content="Watch exclusive content">
    <meta name="twitter:image" content="">
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=GA_MEASUREMENT_ID"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'GA_MEASUREMENT_ID', {
            'send_page_view': true,
            'anonymize_ip': true
        });
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .header {
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #1a1a24;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 15, 0.95);
        }

        .back-btn {
            color: #888;
            text-decoration: none;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.2s;
            padding: 0.5rem;
            margin: -0.5rem;
        }

        .back-btn:hover {
            color: #fff;
        }

        .logo {
            font-weight: 700;
            font-size: 1.125rem;
            background: linear-gradient(135deg, #00b3ff 0%, #0088ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .share-btn {
            background: rgba(0, 179, 255, 0.1);
            color: #00b3ff;
            border: 1px solid rgba(0, 179, 255, 0.3);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            font-size: 0.875rem;
        }

        .share-btn:hover {
            background: rgba(0, 179, 255, 0.2);
            border-color: rgba(0, 179, 255, 0.5);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0;
        }

        /* Player Wrapper */
        .player-wrapper {
            background: #000;
            width: 100%;
            position: relative;
            aspect-ratio: 16 / 9;
            overflow: hidden;
        }

        @media (min-width: 768px) {
            .player-wrapper {
                border-radius: 16px;
                margin: 1rem;
                width: calc(100% - 2rem);
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
            }
        }

        /* Plyr Customization - Hover to show controls */
        .plyr {
            --plyr-color-main: #00b3ff;
            --plyr-video-background: #000;
            --plyr-control-radius: 6px;
            --plyr-control-spacing: 8px;
            --plyr-video-control-background-hover: rgba(0, 179, 255, 0.2);
            --plyr-range-fill-background: #00b3ff;
            --plyr-range-thumb-background: #00b3ff;
            --plyr-range-thumb-shadow: 0 0 10px rgba(0, 179, 255, 0.5);
            --plyr-tooltip-background: rgba(0, 0, 0, 0.9);
            --plyr-tooltip-color: #fff;
            --plyr-font-size-time: 12px;
            --plyr-font-size-menu: 13px;
            --plyr-control-icon-size: 16px;
            height: 100%;
            width: 100%;
        }

        @media (min-width: 768px) {
            .plyr {
                --plyr-font-size-time: 13px;
                --plyr-font-size-menu: 14px;
                --plyr-control-icon-size: 18px;
                border-radius: 16px;
            }
        }

        /* Large play button */
        .plyr__control--overlaid {
            background: rgba(0, 179, 255, 0.95);
            padding: clamp(16px, 5vw, 24px);
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(0, 179, 255, 0.6);
            transition: all 0.3s ease;
        }

        .plyr__control--overlaid:hover {
            background: #00b3ff;
            transform: scale(1.1);
            box-shadow: 0 0 40px rgba(0, 179, 255, 0.8);
        }

        .plyr__control--overlaid svg {
            width: clamp(20px, 6vw, 28px);
            height: clamp(20px, 6vw, 28px);
            left: 2px;
            position: relative;
        }

        /* Controls - Hidden by default, show on hover */
        .plyr--video .plyr__controls {
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.9));
            padding: 10px;
            padding-top: 40px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        /* Show controls on hover */
        .plyr--video:hover .plyr__controls,
        .plyr--video.plyr--paused .plyr__controls,
        .plyr--video.plyr--loading .plyr__controls {
            opacity: 1;
        }

        /* Always show controls on mobile touch */
        @media (hover: none) and (pointer: coarse) {
            .plyr--video .plyr__controls {
                opacity: 1;
            }
        }

        @media (min-width: 768px) {
            .plyr--video .plyr__controls {
                padding: 15px;
                padding-top: 50px;
            }
        }

        /* Progress bar - Larger for easier seeking */
        .plyr__progress {
            flex: 1 1 100%;
            margin: 0 0 8px 0;
            order: -1;
        }

        .plyr__progress input[type="range"] {
            height: 8px;
            border-radius: 4px;
            cursor: pointer;
        }

        @media (min-width: 768px) {
            .plyr__progress input[type="range"] {
                height: 6px;
            }
        }

        .plyr__progress__buffer {
            background: rgba(255, 255, 255, 0.25);
            border-radius: 4px;
        }

        /* Time display */
        .plyr__time {
            font-size: 11px;
            font-weight: 500;
        }

        @media (min-width: 768px) {
            .plyr__time {
                font-size: 12px;
            }
        }

        /* Control buttons */
        .plyr__control {
            padding: 8px;
        }

        @media (min-width: 768px) {
            .plyr__control {
                padding: 10px;
            }
        }

        .plyr__control svg {
            width: 16px;
            height: 16px;
        }

        @media (min-width: 768px) {
            .plyr__control svg {
                width: 18px;
                height: 18px;
            }
        }

        /* Menu */
        .plyr__menu__container {
            background: rgba(20, 20, 30, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Tooltip for seek preview */
        .plyr__tooltip {
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
        }

        /* Video Info */
        .video-info {
            padding: 1rem;
            background: linear-gradient(135deg, rgba(20, 20, 30, 0.8) 0%, rgba(10, 10, 15, 0.8) 100%);
            margin: 0.5rem 1rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        @media (min-width: 768px) {
            .video-info {
                padding: 1.5rem;
                margin: 1rem 1.5rem;
                border-radius: 16px;
            }
        }

        .video-title {
            font-size: 1.125rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            line-height: 1.3;
            color: #fff;
        }

        @media (min-width: 768px) {
            .video-title {
                font-size: 1.5rem;
                background: linear-gradient(135deg, #fff 0%, #a0a0a0 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }
        }

        .video-meta {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: #888;
            font-size: 0.8125rem;
            flex-wrap: wrap;
        }

        .video-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.25rem 0.75rem;
            background: rgba(0, 179, 255, 0.15);
            border: 1px solid rgba(0, 179, 255, 0.3);
            border-radius: 16px;
            font-size: 0.6875rem;
            font-weight: 600;
            color: #00b3ff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .video-stats {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        /* Related Videos */
        .related {
            margin-top: 1rem;
            padding: 0 1rem 2rem 1rem;
        }

        @media (min-width: 768px) {
            .related {
                margin-top: 2rem;
                padding: 0 1.5rem 3rem 1.5rem;
            }
        }

        .related-header {
            margin-bottom: 1rem;
        }

        @media (min-width: 768px) {
            .related-header {
                margin-bottom: 1.5rem;
            }
        }

        .related h2 {
            font-size: 1.125rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 0.25rem;
        }

        @media (min-width: 768px) {
            .related h2 {
                font-size: 1.25rem;
            }
        }

        .related-subtitle {
            color: #666;
            font-size: 0.875rem;
        }

        .related-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
        }

        @media (min-width: 640px) {
            .related-grid {
                grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
                gap: 1rem;
            }
        }

        @media (min-width: 1024px) {
            .related-grid {
                gap: 1.5rem;
            }
        }

        .related-card {
            text-decoration: none;
            color: inherit;
            background: rgba(20, 20, 30, 0.5);
            border-radius: 10px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: block;
        }

        .related-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            border-color: rgba(0, 179, 255, 0.3);
        }

        .related-thumb {
            aspect-ratio: 16 / 9;
            background: #1a1a24;
            overflow: hidden;
            position: relative;
        }

        .related-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s ease;
        }

        .related-card:hover .related-thumb img {
            transform: scale(1.05);
        }

        .related-type {
            position: absolute;
            top: 6px;
            left: 6px;
            background: rgba(0, 179, 255, 0.9);
            color: #000;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.5625rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .related-duration {
            position: absolute;
            bottom: 6px;
            right: 6px;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.6875rem;
            font-weight: 500;
        }

        .related-info {
            padding: 0.75rem;
        }

        @media (min-width: 768px) {
            .related-info {
                padding: 1rem;
            }
        }

        .related-title {
            font-size: 0.8125rem;
            font-weight: 500;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            color: #fff;
            margin-bottom: 0.25rem;
        }

        @media (min-width: 768px) {
            .related-title {
                font-size: 0.9375rem;
                margin-bottom: 0.5rem;
            }
        }

        .related-meta {
            font-size: 0.75rem;
            color: #666;
        }

        /* Loading & Error */
        .loading {
            text-align: center;
            padding: 4rem 2rem;
            color: #666;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 179, 255, 0.2);
            border-top-color: #00b3ff;
            border-radius: 50%;
            margin: 0 auto 1rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            text-align: center;
            padding: 4rem 2rem;
            color: #888;
        }

        .error a {
            color: #00b3ff;
            text-decoration: none;
            font-weight: 500;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 1rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(20, 20, 30, 0.98);
            color: #fff;
            padding: 0.875rem 1.5rem;
            border-radius: 12px;
            border: 1px solid rgba(0, 179, 255, 0.3);
            backdrop-filter: blur(10px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            pointer-events: none;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 500;
            font-size: 0.875rem;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast-icon {
            color: #00b3ff;
        }

        /* No recommendations */
        .no-related {
            text-align: center;
            padding: 2rem;
            color: #666;
            background: rgba(20, 20, 30, 0.3);
            border-radius: 12px;
            border: 1px dashed rgba(255, 255, 255, 0.1);
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html" class="back-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Back
        </a>
        <span class="logo">Xplitleaks</span>
        <button class="share-btn" onclick="shareVideo()">Share</button>
    </header>

    <main class="container">
        <div id="loading" class="loading">
            <div class="loading-spinner"></div>
            <p>Loading video...</p>
        </div>
        
        <div id="error" class="error" style="display: none;">
            <p>Video not found</p>
            <a href="index.html">Back to home</a>
        </div>

        <div id="content" style="display: none;">
            <div class="player-wrapper" id="playerContainer"></div>

            <div class="video-info">
                <h1 class="video-title" id="videoTitle">...</h1>
                <div class="video-meta">
                    <span class="video-badge">HD</span>
                    <span class="video-stats">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <polyline points="12 6 12 12 16 14"/>
                        </svg>
                        <span id="videoDuration">--:--</span>
                    </span>
                    <span>•</span>
                    <span id="videoDate">--</span>
                </div>
            </div>

            <div class="related" id="relatedSection">
                <div class="related-header">
                    <h2 id="relatedTitle">Recommended for You</h2>
                    <div class="related-subtitle" id="relatedSubtitle">Loading...</div>
                </div>
                <div class="related-grid" id="relatedGrid"></div>
            </div>
        </div>
    </main>

    <div id="toast" class="toast">
        <svg class="toast-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 6L9 17l-5-5"/>
        </svg>
        <span>Link copied!</span>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    
    <script>
        const GA_MEASUREMENT_ID = 'G-BK3KJL2B1F';
        
        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('id');
        let player = null;
        let currentVideo = null;
        let allVideos = [];
        let watchTime = 0;
        let watchInterval = null;

        document.addEventListener('DOMContentLoaded', () => {
            const gaScript = document.querySelector('script[src*="googletagmanager"]');
            if (gaScript) {
                gaScript.src = `https://www.googletagmanager.com/gtag/js?id=${GA_MEASUREMENT_ID}`;
            }
            gtag('config', GA_MEASUREMENT_ID);
            
            if (!videoId) {
                showError();
                return;
            }
            
            loadVideo();
        });

        async function loadVideo() {
            try {
                const response = await fetch('./videos.json?v=' + Date.now());
                allVideos = await response.json();
                
                // Try multiple matching strategies
                currentVideo = allVideos.find(v => v.numericId === videoId) || 
                              allVideos.find(v => v.id === videoId) ||
                              allVideos.find(v => encodeURIComponent(v.id) === videoId);

                if (!currentVideo) {
                    showError();
                    return;
                }

                renderVideo();
                initPlayer();
                renderSmartRecommendations();
                trackAnalytics();

                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';

            } catch (err) {
                console.error('Error:', err);
                showError();
            }
        }

        function renderVideo() {
            document.getElementById('videoTitle').textContent = currentVideo.title;
            document.getElementById('videoDuration').textContent = currentVideo.duration || '--:--';
            document.getElementById('videoDate').textContent = formatDate(currentVideo.uploadDate);
            document.title = currentVideo.title + ' - Xplitleaks';
            
            document.querySelector('meta[property="og:title"]').content = currentVideo.title;
            document.querySelector('meta[property="og:description"]').content = 'Watch ' + currentVideo.title;
            document.querySelector('meta[property="og:image"]').content = currentVideo.thumbnail || '';
        }

        function initPlayer() {
            const container = document.getElementById('playerContainer');
            
            container.innerHTML = `
                <video id="plyrPlayer" playsinline controls poster="${currentVideo.thumbnail || ''}">
                    <source src="${currentVideo.videoUrl}" type="video/mp4" />
                </video>
            `;
            
            player = new Plyr('#plyrPlayer', {
                title: currentVideo.title,
                // REMOVED: 'volume' from controls, REMOVED: 'mute' (keep only if you want mute button without slider)
                controls: [
                    'play-large',
                    'play',
                    'progress',
                    'current-time',
                    'duration',
                    'mute', // Keep mute button but no volume slider
                    'captions',
                    'settings',
                    'pip',
                    'airplay',
                    'fullscreen'
                ],
                settings: ['captions', 'quality', 'speed', 'loop'],
                speed: {
                    selected: 1,
                    options: [0.5, 0.75, 1, 1.25, 1.5, 2]
                },
                keyboard: { focused: true, global: true },
                tooltips: { controls: true, seek: true },
                displayDuration: true,
                invertTime: false,
                toggleInvert: true,
                ratio: '16:9',
                clickToPlay: true,
                // Controls hide when playing, show on hover
                hideControls: true,
                resetOnEnd: false,
                storage: { enabled: true, key: 'plyr_preferences' }
            });

            player.on('play', () => {
                gtag('event', 'video_play', {
                    'event_category': 'engagement',
                    'event_label': currentVideo.id
                });
                startWatchTimeTracking();
            });

            player.on('pause', () => {
                stopWatchTimeTracking();
            });

            player.on('ended', () => {
                stopWatchTimeTracking();
            });
        }

        function renderSmartRecommendations() {
            const relatedGrid = document.getElementById('relatedGrid');
            const relatedTitle = document.getElementById('relatedTitle');
            const relatedSubtitle = document.getElementById('relatedSubtitle');
            
            // Get all videos except current
            const currentVideoId = currentVideo.numericId || currentVideo.id;
            const others = allVideos.filter(v => {
                const otherId = v.numericId || v.id;
                return otherId !== currentVideoId;
            });
            
            if (others.length === 0) {
                relatedTitle.textContent = 'No Recommendations';
                relatedSubtitle.textContent = 'No other videos available';
                relatedGrid.innerHTML = '<div class="no-related">Check back later for more content</div>';
                return;
            }
            
            // SMART SCORING ALGORITHM
            const scored = others.map(video => {
                let score = 0;
                let reasons = [];
                
                // 1. Same category = highest priority (+100)
                if (currentVideo.category && video.category && 
                    video.category.toLowerCase() === currentVideo.category.toLowerCase()) {
                    score += 100;
                    reasons.push('same category');
                }
                
                // 2. Similar title words (+15 per common word)
                const currentWords = currentVideo.title.toLowerCase()
                    .replace(/[^\w\s]/g, '')
                    .split(/\s+/)
                    .filter(w => w.length > 3); // Only words > 3 chars
                
                const videoWords = video.title.toLowerCase()
                    .replace(/[^\w\s]/g, '')
                    .split(/\s+/)
                    .filter(w => w.length > 3);
                
                const commonWords = currentWords.filter(w => videoWords.includes(w));
                if (commonWords.length > 0) {
                    score += commonWords.length * 15;
                    reasons.push(`${commonWords.length} title matches`);
                }
                
                // 3. Recent uploads get boost (+20 if <7 days, +10 if <30 days)
                const daysSinceUpload = (new Date() - new Date(video.uploadDate)) / (1000 * 60 * 60 * 24);
                if (daysSinceUpload < 7) {
                    score += 20;
                    reasons.push('very recent');
                } else if (daysSinceUpload < 30) {
                    score += 10;
                    reasons.push('recent');
                }
                
                // 4. Random factor for variety (+0-10)
                const randomFactor = Math.random() * 10;
                score += randomFactor;
                
                return { 
                    video, 
                    score, 
                    reasons,
                    isSmart: score >= 50 // Threshold for "smart" recommendation
                };
            });
            
            // Sort by score
            scored.sort((a, b) => b.score - a.score);
            
            // Try to get smart recommendations first (score >= 50)
            let smartRecommendations = scored.filter(s => s.isSmart).slice(0, 6);
            
            // If we have less than 3 smart recommendations, fill with random high scorers
            if (smartRecommendations.length < 3) {
                const additional = scored
                    .filter(s => !s.isSmart)
                    .slice(0, 6 - smartRecommendations.length);
                smartRecommendations = smartRecommendations.concat(additional);
            }
            
            // If still no recommendations (shouldn't happen if others > 0), use random
            const finalRecommendations = smartRecommendations.length > 0 
                ? smartRecommendations 
                : scored.slice(0, 6);
            
            // Determine header text based on recommendation quality
            const hasSmartMatches = finalRecommendations.some(r => r.isSmart);
            const hasCategoryMatch = finalRecommendations.some(r => 
                r.reasons.includes('same category')
            );
            
            if (hasCategoryMatch && currentVideo.category) {
                relatedTitle.textContent = `More ${currentVideo.category}`;
                relatedSubtitle.textContent = 'Related videos from the same category';
            } else if (hasSmartMatches) {
                relatedTitle.textContent = 'Recommended for You';
                relatedSubtitle.textContent = 'Based on your viewing preferences';
            } else {
                relatedTitle.textContent = 'You Might Also Like';
                relatedSubtitle.textContent = `${others.length} more videos available`;
            }
            
            // Render cards
            relatedGrid.innerHTML = finalRecommendations.map((item, index) => {
                const v = item.video;
                const vidId = v.numericId || v.id;
                const cleanId = encodeURIComponent(vidId);
                
                // Debug info (remove in production)
                const debugScore = false; // Set to true to see scores
                const scoreBadge = debugScore ? 
                    `<span style="position:absolute;bottom:6px;left:6px;background:red;color:white;padding:2px 4px;font-size:10px;">${Math.round(item.score)}</span>` : '';
                
                return `
                    <a href="video.html?id=${cleanId}" class="related-card" 
                       onclick="trackRecommendationClick('${v.id}', '${item.reasons.join(', ')}', ${index + 1})">
                        <div class="related-thumb">
                            <img src="${v.thumbnail || ''}" 
                                 alt="" 
                                 loading="lazy" 
                                 onerror="this.style.opacity='0.5'; this.style.background='#1a1a24';">
                            <span class="related-type">HD</span>
                            ${scoreBadge}
                            ${v.duration ? `<span class="related-duration">${v.duration}</span>` : ''}
                        </div>
                        <div class="related-info">
                            <div class="related-title">${escapeHtml(v.title)}</div>
                            <div class="related-meta">${formatDate(v.uploadDate)}</div>
                        </div>
                    </a>
                `;
            }).join('');
            
            // Log for debugging
            console.log('Smart Recommendations:', finalRecommendations.map(r => ({
                title: r.video.title.substring(0, 30),
                score: Math.round(r.score),
                reasons: r.reasons,
                isSmart: r.isSmart
            })));
        }

        function trackRecommendationClick(videoId, reasons, position) {
            gtag('event', 'recommendation_click', {
                'event_category': 'navigation',
                'event_label': videoId,
                'recommendation_reason': reasons,
                'position': position,
                'source_video': currentVideo.id
            });
        }

        function startWatchTimeTracking() {
            watchInterval = setInterval(() => { watchTime += 1; }, 1000);
        }

        function stopWatchTimeTracking() {
            if (watchInterval) {
                clearInterval(watchInterval);
                watchInterval = null;
            }
        }

        function trackAnalytics() {
            gtag('event', 'page_view', {
                'page_title': currentVideo.title,
                'page_location': window.location.href
            });
        }

        function shareVideo() {
            if (!currentVideo) return;
            
            navigator.clipboard.writeText(window.location.href).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2500);
            });
        }

        function showError() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            const now = new Date();
            const days = Math.floor((now - date) / (1000 * 60 * 60 * 24));
            
            if (days === 0) return 'Today';
            if (days === 1) return 'Yesterday';
            if (days < 7) return days + 'd ago';
            if (days < 30) return Math.floor(days/7) + 'w ago';
            return Math.floor(days/30) + 'mo ago';
        }
    </script>
</body>
</html>
